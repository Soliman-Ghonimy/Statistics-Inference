                          <><label className="text-sm text-gray-400 flex justify-between"><span>Pseudo-Succ (α)</span> <span>{fmt(bayesState.prior1)}</span></label><input type="range" disabled={bayesState.type === 'jeffreys-binomial'} min="0.1" max="10" step="0.1" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', e.target.value)} className={`w-full mb-2 ${bayesState.type === 'jeffreys-binomial' ? 'opacity-50 cursor-not-allowed' : ''}`} /><label className="text-sm text-gray-400 flex justify-between"><span>Pseudo-Fail (β)</span> <span>{fmt(bayesState.prior2)}</span></label><input type="range" disabled={bayesState.type === 'jeffreys-binomial'} min="0.1" max="10" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', e.target.value)} className={`w-full ${bayesState.type === 'jeffreys-binomial' ? 'opacity-50 cursor-not-allowed' : ''}`} /></>
                        )}
                        {['gamma-poisson', 'gamma-exponential'].includes(bayesState.type) && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(bayesState.prior1)}</span></label><input type="range" min="0.1" max="20" step="0.1" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', e.target.value)} className="w-full mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Rate (β)</span> <span>{fmt(bayesState.prior2)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', e.target.value)} className="w-full" /></> )}
                        {bayesState.type === 'normal-normal' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Prior Mean (μ₀)</span> <span>{fmt(bayesState.prior1)}</span></label><input type="range" min="-5" max="10" step="0.5" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', e.target.value)} className="w-full mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prior Std Dev (σ₀)</span> <span>{fmt(bayesState.prior2)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', e.target.value)} className="w-full" /></> )}
                      </div>

                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-amber-500">
                        <h3 className="font-bold mb-2 text-amber-400">2. Observed Data</h3>
                        {['beta-binomial', 'jeffreys-binomial'].includes(bayesState.type) && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Trials (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="50" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', e.target.value)} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Successes (k)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="0" max={bayesState.data1} step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', e.target.value)} className="w-full accent-amber-500" /></> )}
                        {bayesState.type === 'gamma-poisson' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Periods (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="30" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', e.target.value)} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Events (Σx)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="0" max="100" step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', e.target.value)} className="w-full accent-amber-500" /></> )}
                        {bayesState.type === 'gamma-exponential' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Observations (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="30" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', e.target.value)} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sum of Waiting Times (Σx)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="0" max="100" step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', e.target.value)} className="w-full accent-amber-500" /></> )}
                        {bayesState.type === 'normal-normal' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Sample Size (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="50" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', e.target.value)} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sample Mean (x̄)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="-5" max="10" step="0.5" value={bayesState.data2} onChange={(e) => updateBayesState('data2', e.target.value)} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Known Pop. Std (σ)</span> <span>{fmt(bayesState.data3)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={bayesState.data3} onChange={(e) => updateBayesState('data3', e.target.value)} className="w-full accent-amber-500" /></> )}
                      </div>
                    </div>
                  </div>
                )}
                
                {(activeTab === 'explorer' || activeTab === 'bayesian') && <EquationsTable distsToRender={activeTab === 'bayesian' ? bayesianAnalysis.curves : distributions} />}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
