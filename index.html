              for (let i = 0; i <= 5; i++) {
                const yVal = minY + (maxY - minY) * (i / 5);
                gridLines.push(<g key={`grid-y-${i}`}><line x1={padding} y1={scaleY(yVal)} x2={width - padding} y2={scaleY(yVal)} stroke="#374151" strokeDasharray="4,4" /><text x={padding - 10} y={scaleY(yVal) + 4} fill="#9ca3af" fontSize="12" textAnchor="end">{fmt(yVal)}</text></g>);
              }
            }
            return (
              <div className="relative w-full overflow-hidden bg-gray-900 rounded-xl border border-gray-700 shadow-2xl p-4">
                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                  {gridLines}
                  <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />
                  <text x={width / 2} y={height - 5} fill="#d1d5db" fontSize="14" textAnchor="middle">{xLabel}</text>
                  {yConfig.show && <line x1={padding} y1={padding} x2={padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />}
                  {activeTab === 'bayesian' && bayesianAnalysis.credibleInterval && ( <rect x={scaleX(bayesianAnalysis.credibleInterval[0])} y={padding} width={scaleX(bayesianAnalysis.credibleInterval[1]) - scaleX(bayesianAnalysis.credibleInterval[0])} height={innerHeight} fill="#10b981" opacity="0.1" /> )}
                  {chartData.data.map((dist, i) => {
                    if (dist.points.length === 0) return null;
                    if (dist.isDiscrete) return ( <g key={`discrete-${i}`}>{dist.points.map((p, idx) => (<g key={idx}><line x1={scaleX(p.x)} y1={scaleY(0)} x2={scaleX(p.x)} y2={scaleY(p.y)} stroke={dist.color} strokeWidth="3" strokeDasharray={dist.isDashed ? "5,5" : "none"} opacity={0.8} /><circle cx={scaleX(p.x)} cy={scaleY(p.y)} r="4" fill={dist.color} /></g>))}</g>);
                    const pathData = dist.points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${scaleX(p.x)} ${scaleY(Math.max(minY, Math.min(maxY, p.y)))}`).join(' ');
                    return <path key={`cont-${i}`} d={pathData} fill="none" stroke={dist.color} strokeWidth="3" strokeDasharray={dist.isDashed ? "5,5" : "none"} />;
                  })}
                  {activeTab === 'bayesian' && <circle cx={scaleX(bayesState.testPoint)} cy={scaleY(bayesianAnalysis.testValue)} r="6" fill="#ef4444" stroke="white" strokeWidth="2" />}
                </svg>
                <div className="absolute top-6 right-6 flex flex-col gap-2 bg-gray-800/90 p-3 rounded-lg border border-gray-700 backdrop-blur-sm">
                  {chartData.data.map((dist, i) => (
                    <div key={i} className="flex items-center gap-2"><div className="w-4 h-1" style={{ backgroundColor: dist.color, borderBottom: dist.isDashed ? '2px dashed white' : 'none' }}></div><span className="text-gray-200 text-sm font-bold">{dist.name}</span></div>
                  ))}
                </div>
              </div>
            );
          };

          const getEquationTexts = (dist) => {
            const p = dist.params; let base = null, param = null;
            switch (dist.type) {
              case 'normal': base = <>f(x) = (1 / &sigma;&radic;(2&pi;)) e<sup>-&frac12; ((x-&mu;)/&sigma;)&sup2;</sup></>; param = <>f(x) = (1 / {fmt(p.sigma)}&radic;(2&pi;)) e<sup>-&frac12; ((x-{fmt(p.mu)})/{fmt(p.sigma)})&sup2;</sup></>; break;
              case 'beta': base = <>f(x) = [ x<sup>&alpha;-1</sup> (1-x)<sup>&beta;-1</sup> ] / B(&alpha;, &beta;)</>; param = <>f(x) = [ x<sup>{fmt(p.alpha - 1)}</sup> (1-x)<sup>{fmt(p.beta - 1)}</sup> ] / B({fmt(p.alpha)}, {fmt(p.beta)})</>; break;
              case 'gamma': base = <>f(x) = &beta;<sup>&alpha;</sup> x<sup>&alpha;-1</sup> e<sup>-&beta;x</sup> / &Gamma;(&alpha;)</>; param = <>f(x) = {fmt(p.beta)}<sup>{fmt(p.alpha)}</sup> x<sup>{fmt(p.alpha - 1)}</sup> e<sup>-{fmt(p.beta)}x</sup> / &Gamma;({fmt(p.alpha)})</>; break;
              case 'exponential': base = <>f(x) = &lambda; e<sup>-&lambda;x</sup></>; param = <>f(x) = {fmt(p.lambda)} e<sup>-{fmt(p.lambda)}x</sup></>; break;
              case 'uniform': base = <>f(x) = 1 / (b - a)</>; param = <>f(x) = 1 / ({fmt(p.b)} - {fmt(p.a)}) = {fmt(1 / (p.b - p.a))}</>; break;
              case 'laplace': base = <>f(x) = (1 / 2b) e<sup>-|x-&mu;|/b</sup></>; param = <>f(x) = (1 / {fmt(2 * p.b)}) e<sup>-|x-{fmt(p.mu)}|/{fmt(p.b)}</sup></>; break;
              case 'lognormal': base = <>f(x) = (1 / x&sigma;&radic;(2&pi;)) e<sup>-(ln(x)-&mu;)&sup2; / (2&sigma;&sup2;)</sup></>; param = <>f(x) = (1 / x({fmt(p.sigma)})&radic;(2&pi;)) e<sup>-(ln(x)-{fmt(p.mu)})&sup2; / (2({fmt(p.sigma)})&sup2;)</sup></>; break;
              case 'cauchy': base = <>f(x) = 1 / (&pi;&gamma;[1 + ((x-x₀)/&gamma;)&sup2;])</>; param = <>f(x) = 1 / (&pi;({fmt(p.gammaVal)})[1 + ((x-{fmt(p.x0)})/{fmt(p.gammaVal)})&sup2;])</>; break;
              case 'weibull': base = <>f(x) = (k/&lambda;) (x/&lambda;)<sup>k-1</sup> e<sup>-(x/&lambda;)<sup>k</sup></sup></>; param = <>f(x) = ({fmt(p.k)}/{fmt(p.lambda)}) (x/{fmt(p.lambda)})<sup>{fmt(p.k - 1)}</sup> e<sup>-(x/{fmt(p.lambda)})<sup>{fmt(p.k)}</sup></sup></>; break;
              case 'pareto': base = <>f(x) = (&alpha; x<sub>m</sub><sup>&alpha;</sup>) / x<sup>&alpha;+1</sup></>; param = <>f(x) = ({fmt(p.alpha)} &middot; {fmt(p.xm)}<sup>{fmt(p.alpha)}</sup>) / x<sup>{fmt(p.alpha + 1)}</sup></>; break;
              case 'logistic': base = <>f(x) = e<sup>-(x-&mu;)/s</sup> / (s(1 + e<sup>-(x-&mu;)/s</sup>)&sup2;)</>; param = <>f(x) = e<sup>-(x-{fmt(p.mu)})/{fmt(p.s)}</sup> / ({fmt(p.s)}(1 + e<sup>-(x-{fmt(p.mu)})/{fmt(p.s)}</sup>)&sup2;)</>; break;
              case 'rayleigh': base = <>f(x) = (x/&sigma;&sup2;) e<sup>-x&sup2;/(2&sigma;&sigma;)</sup></>; param = <>f(x) = (x/{fmt(p.sigma * p.sigma)}) e<sup>-x&sup2;/{fmt(2 * p.sigma * p.sigma)}</sup></>; break;
              case 'student_t': base = <>f(t) = C &middot; (1 + t&sup2;/&nu;)<sup>-(&nu;+1)/2</sup></>; param = <>f(t) = C &middot; (1 + t&sup2;/{fmt(p.nu)})<sup>-{fmt((p.nu + 1) / 2)}</sup></>; break;
              case 'f_dist': base = <>f(x) = C &middot; &radic;( (d<sub>1</sub>x)<sup>d<sub>1</sub></sup> d<sub>2</sub><sup>d<sub>2</sub></sup> / (d<sub>1</sub>x + d<sub>2</sub>)<sup>d<sub>1</sub>+d<sub>2</sub></sup> ) / x</>; param = <>f(x) = C &middot; &radic;( ({fmt(p.d1)}x)<sup>{fmt(p.d1)}</sup> {fmt(p.d2)}<sup>{fmt(p.d2)}</sup> / ({fmt(p.d1)}x + {fmt(p.d2)})<sup>{fmt(p.d1 + p.d2)}</sup> ) / x</>; break;
              case 'chisquare': base = <>f(x) = C &middot; x<sup>k/2 - 1</sup> e<sup>-x/2</sup></>; param = <>f(x) = C &middot; x<sup>{fmt(p.k / 2 - 1)}</sup> e<sup>-x/2</sup></>; break;
              case 'poisson': base = <>P(X=x) = &lambda;<sup>x</sup> e<sup>-&lambda;</sup> / x!</>; param = <>P(X=x) = {fmt(p.lambda)}<sup>x</sup> e<sup>-{fmt(p.lambda)}</sup> / x!</>; break;
              case 'binomial': base = <>P(X=x) = C(n, x) p<sup>x</sup> (1-p)<sup>n-x</sup></>; param = <>P(X=x) = C({fmt(p.n)}, x) {fmt(p.p)}<sup>x</sup> {fmt(1 - p.p)}<sup>{fmt(p.n)}-x</sup></>; break;
              case 'bernoulli': base = <>P(X=x) = p<sup>x</sup> (1-p)<sup>1-x</sup></>; param = <>P(X=x) = {fmt(p.p)}<sup>x</sup> {fmt(1 - p.p)}<sup>1-x</sup></>; break;
              case 'geometric': base = <>P(X=x) = p(1-p)<sup>x-1</sup></>; param = <>P(X=x) = {fmt(p.p)}({fmt(1 - p.p)})<sup>x-1</sup></>; break;
              case 'negative_binomial': base = <>P(X=x) = C(x-1, r-1) p<sup>r</sup> (1-p)<sup>x-r</sup></>; param = <>P(X=x) = C(x-1, {fmt(p.r - 1)}) {fmt(p.p)}<sup>{fmt(p.r)}</sup> {fmt(1 - p.p)}<sup>x-{fmt(p.r)}</sup></>; break;
              case 'hypergeometric': base = <>P(X=x) = [C(K,x) C(N-K, n-x)] / C(N,n)</>; param = <>P(X=x) = [C({fmt(p.K)},x) C({fmt(p.N - p.K)}, {fmt(p.n)}-x)] / C({fmt(p.N)},{fmt(p.n)})</>; break;
              case 'discrete_uniform': base = <>P(X=x) = 1 / (b - a + 1)</>; param = <>P(X=x) = 1 / ({fmt(p.b)} - {fmt(p.a)} + 1) = {fmt(1 / (p.b - p.a + 1))}</>; break;
              case 'likelihood':
              case 'likelihood_discrete':
                if (p.lType === 'binomial') { base = <>L(p|data) &prop; p<sup>k</sup> (1-p)<sup>n-k</sup></>; param = <>L(p) &prop; p<sup>{fmt(p.k)}</sup> (1-p)<sup>{fmt(p.n - p.k)}</sup></>; } 
                else if (p.lType === 'poisson') { base = <>L(&lambda;|data) &prop; &lambda;<sup>&Sigma;x</sup> e<sup>-n&lambda;</sup></>; param = <>L(&lambda;) &prop; &lambda;<sup>{fmt(p.k)}</sup> e<sup>-{fmt(p.n)}&lambda;</sup></>; } 
                else if (p.lType === 'exponential') { base = <>L(&lambda;|data) &prop; &lambda;<sup>n</sup> e<sup>-&lambda;&Sigma;x</sup></>; param = <>L(&lambda;) &prop; &lambda;<sup>{fmt(p.n)}</sup> e<sup>-{fmt(p.sumX)}&lambda;</sup></>; } 
                else if (p.lType === 'normal') { base = <>L(&mu;|data) &prop; e<sup>-(n/2&sigma;&sup2;) (x̄-&mu;)&sup2;</sup></>; param = <>L(&mu;) &prop; e<sup>-({fmt(p.n)} / 2({fmt(p.sigma)})&sup2;) ({fmt(p.xBar)} - &mu;)&sup2;</sup></>; } break;
              default: base = <>Equation not available</>; param = <>N/A</>;
            }
            return { base, param };
          };

          const EquationsTable = () => {
            if (activeTab === 'inference') return null;
            const distsToRender = activeTab === 'bayesian' ? bayesianAnalysis.curves : distributions;
            return (
              <div className="mt-8 bg-gray-900 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
                <div className="bg-gray-800 p-4 border-b border-gray-700"><h2 className="text-xl font-bold text-blue-400">Mathematical Equations</h2></div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm text-gray-300">
                    <thead className="bg-gray-800/50 text-gray-400"><tr><th className="p-4 font-semibold w-1/4">Distribution</th><th className="p-4 font-semibold w-1/3">Base Equation</th><th className="p-4 font-semibold">Parameterized Equation</th></tr></thead>
                    <tbody className="divide-y divide-gray-800">
                      {distsToRender.map((dist, idx) => {
                        const { base, param } = getEquationTexts(dist);
                        return (<tr key={idx} className="hover:bg-gray-800/20"><td className="p-4 flex items-center gap-2"><span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: dist.color}}></span><span>{dist.name}</span></td><td className="p-4 font-serif text-base md:text-lg text-pink-300">{base}</td><td className="p-4 font-serif text-base md:text-lg text-emerald-300">{param}</td></tr>);
                      })}
                      {distsToRender.length === 0 && (
                        <tr><td colSpan="3" className="p-4 text-center text-gray-500">No distributions active.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const renderDistributionParams = (dist) => {
            const p = dist.params, update = (name, val) => updateDistParam(dist.id, name, val);
            switch (dist.type) {
              case 'normal': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Mean (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Std Dev (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'student_t': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>df (ν)</span> <span>{fmt(p.nu)}</span></label><input type="range" min="1" max="30" step="1" value={p.nu} onChange={(e) => update('nu', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'f_dist': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Num df (d1)</span> <span>{fmt(p.d1)}</span></label><input type="range" min="1" max="30" step="1" value={p.d1} onChange={(e) => update('d1', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Denom df (d2)</span> <span>{fmt(p.d2)}</span></label><input type="range" min="1" max="30" step="1" value={p.d2} onChange={(e) => update('d2', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'chisquare': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>df (k)</span> <span>{fmt(p.k)}</span></label><input type="range" min="1" max="20" step="1" value={p.k} onChange={(e) => update('k', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'beta': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Alpha (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Beta (β)</span> <span>{fmt(p.beta)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={p.beta} onChange={(e) => update('beta', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'gamma': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Rate (β)</span> <span>{fmt(p.beta)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.beta} onChange={(e) => update('beta', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'exponential': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Rate (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'uniform': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Min (a)</span> <span>{fmt(p.a)}</span></label><input type="range" min="-10" max="10" step="1" value={p.a} onChange={(e) => update('a', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Max (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="-10" max="10" step="1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'laplace': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Location (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'cauchy': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Location (x₀)</span> <span>{fmt(p.x0)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.x0} onChange={(e) => update('x0', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (γ)</span> <span>{fmt(p.gammaVal)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.gammaVal} onChange={(e) => update('gammaVal', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'lognormal': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Log-Mean (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-5" max="5" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Log-Std (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="3" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'weibull': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (k)</span> <span>{fmt(p.k)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.k} onChange={(e) => update('k', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'pareto': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Min (xm)</span> <span>{fmt(p.xm)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.xm} onChange={(e) => update('xm', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'logistic': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Location (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (s)</span> <span>{fmt(p.s)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.s} onChange={(e) => update('s', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'rayleigh': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Scale (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'poisson': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Rate (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="1" max="30" step="1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'binomial': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Trials (n)</span> <span>{fmt(p.n)}</span></label><input type="range" min="1" max="50" step="1" value={p.n} onChange={(e) => update('n', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0" max="1" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'bernoulli': case 'geometric': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0.05" max="1" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'negative_binomial': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Successes (r)</span> <span>{fmt(p.r)}</span></label><input type="range" min="1" max="20" step="1" value={p.r} onChange={(e) => update('r', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0.05" max="0.95" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'hypergeometric': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Pop (N)</span> <span>{fmt(p.N)}</span></label><input type="range" min="1" max="100" step="1" value={p.N} onChange={(e) => { update('N', e.target.value); if (p.K > e.target.value) update('K', e.target.value); if (p.n > e.target.value) update('n', e.target.value); }} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Succ in Pop (K)</span> <span>{fmt(p.K)}</span></label><input type="range" min="0" max={p.N} step="1" value={p.K} onChange={(e) => update('K', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sample (n)</span> <span>{fmt(p.n)}</span></label><input type="range" min="1" max={p.N} step="1" value={p.n} onChange={(e) => update('n', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'discrete_uniform': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Min (a)</span> <span>{fmt(p.a)}</span></label><input type="range" min="-10" max="10" step="1" value={p.a} onChange={(e) => update('a', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Max (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="-10" max="20" step="1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></> );
              default: return null;
            }
          };

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans p-6" dir="ltr">
              {infoModal && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                  <div className="bg-gray-900 border border-blue-500/30 rounded-2xl max-w-2xl w-full p-6 shadow-2xl relative">
                    <button onClick={() => setInfoModal(null)} className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
                    <h2 className="text-3xl font-bold text-blue-400 mb-4">{DIST_INFO[infoModal]?.name || 'Info'}</h2>
                    <div className="space-y-4 text-gray-300">
                      <p><strong className="text-white">Description:</strong> {DIST_INFO[infoModal]?.desc}</p>
                      <p><strong className="text-white">Params:</strong> {DIST_INFO[infoModal]?.params}</p>
                      <div className="bg-gray-950 p-3 rounded font-mono text-pink-400">{DIST_INFO[infoModal]?.formula}</div>
                      <p><strong className="text-white">Uses:</strong> {DIST_INFO[infoModal]?.uses}</p>
                    </div>
                  </div>
                </div>
              )}

              <div className="max-w-7xl mx-auto">
                <header className="mb-8 text-center">
                  <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-2">
                    Advanced Statistics & Inference Lab
                  </h1>
                </header>

                <div className="flex flex-wrap justify-center gap-4 mb-8">
                  <button onClick={() => setActiveTab('explorer')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'explorer' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Distributions Explorer</button>
                  <button onClick={() => setActiveTab('inference')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'inference' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Applied Inference & Testing</button>
                  <button onClick={() => setActiveTab('bayesian')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'bayesian' ? 'bg-pink-600 text-white shadow-lg shadow-pink-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Bayesian Inference</button>
                </div>

                {activeTab === 'explorer' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                      <Plotter chartData={explorerData} domainMin={xAxisBounds.min} domainMax={xAxisBounds.max} xLabel="Variable Value (X)" yConfig={yAxisConfig} />
                      <div className="flex flex-wrap gap-4 bg-gray-900 p-4 rounded-xl border border-gray-800 justify-center items-center text-sm">
                        <span className="text-gray-400">X-Axis:</span>
                        <input type="number" value={xAxisBounds.min} onChange={e => setXAxisBounds({ ...xAxisBounds, min: parseFloat(e.target.value) || 0 })} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />
                        <span>to</span>
                        <input type="number" value={xAxisBounds.max} onChange={e => setXAxisBounds({ ...xAxisBounds, max: parseFloat(e.target.value) || 0 })} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />
                        <div className="w-px h-6 bg-gray-700 hidden md:block"></div>
                        <label className="flex items-center gap-1 cursor-pointer"><input type="checkbox" checked={yAxisConfig.show} onChange={e => setYAxisConfig({...yAxisConfig, show: e.target.checked})} className="accent-blue-500" /><span className="text-gray-400">Show Y</span></label>
                        <select value={yAxisConfig.auto ? 'auto' : 'manual'} onChange={e => setYAxisConfig({...yAxisConfig, auto: e.target.value === 'auto'})} className="bg-gray-800 border-gray-700 text-white p-1 rounded"><option value="auto">Auto</option><option value="manual">Manual Max</option></select>
                        {!yAxisConfig.auto && <input type="number" step="0.1" value={yAxisConfig.max} onChange={e => setYAxisConfig({...yAxisConfig, max: parseFloat(e.target.value) || 1})} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />}
                      </div>
                    </div>
                    
                    <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col gap-4 max-h-[800px] overflow-y-auto">
                      <div className="flex justify-between items-center border-b border-gray-700 pb-2"><h2 className="text-xl font-bold text-blue-400">Control Panel</h2><button onClick={addDistribution} className="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded shadow">+ Add Dist</button></div>
                      {distributions.map((dist) => (
                        <div key={dist.id} className="bg-gray-800 p-4 rounded-lg border border-gray-700 relative">
                          <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: dist.color}}></span>
                              <input type="text" value={dist.name} onChange={(e) => setDistributions(distributions.map(d => d.id === dist.id ? { ...d, name: e.target.value } : d))} className="bg-transparent text-white font-bold w-20 outline-none border-b border-gray-600 focus:border-blue-500 text-sm" />
                              <select value={dist.type} onChange={(e) => updateDistType(dist.id, e.target.value)} className="bg-gray-900 text-white text-xs border border-gray-600 rounded p-1 w-24">
                                <optgroup label="Continuous"><option value="normal">Normal</option><option value="beta">Beta</option><option value="gamma">Gamma</option><option value="exponential">Exponential</option><option value="uniform">Uniform</option><option value="laplace">Laplace</option><option value="lognormal">Log-Normal</option><option value="cauchy">Cauchy</option><option value="weibull">Weibull</option><option value="pareto">Pareto</option><option value="logistic">Logistic</option><option value="rayleigh">Rayleigh</option></optgroup>
                                <optgroup label="Discrete"><option value="binomial">Binomial</option><option value="poisson">Poisson</option><option value="bernoulli">Bernoulli</option><option value="geometric">Geometric</option><option value="negative_binomial">Negative Binomial</option><option value="hypergeometric">Hypergeometric</option><option value="discrete_uniform">Discrete Uniform</option></optgroup>
                                <optgroup label="Sampling"><option value="student_t">Student's t</option><option value="f_dist">F-Dist</option><option value="chisquare">Chi-Square</option></optgroup>
                              </select>
                              <button onClick={() => setInfoModal(dist.type)} className="text-blue-400 bg-gray-900 rounded-full w-5 h-5 flex justify-center items-center">ℹ</button>
                            </div>
                            <button onClick={() => removeDistribution(dist.id)} className="text-red-400 hover:text-red-300 text-xl leading-none">&times;</button>
                          </div>
                          {renderDistributionParams(dist)}
                        </div>
                      ))}
                      {distributions.length === 0 && (
                         <div className="text-center text-gray-500 py-4">Click Add to insert distributions</div>
                      )}
                    </div>
                  </div>
                )}

                {activeTab === 'inference' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div className="lg:col-span-7 space-y-6">
                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
                          <h2 className="text-xl font-bold text-purple-400 mb-4">Samples Visualization (Overlapping Scatter)</h2>
                          <div className="border border-gray-700 h-64 relative mb-4 rounded-lg bg-gray-950 flex flex-col justify-between py-2 overflow-hidden">
                              <ScatterPlot />
                          </div>
                       </div>

                       {testConfig.testType === 'anova' && testConfig.anovaTargets.length < 3 && (
                          <div className="bg-red-900/40 border border-red-500 text-red-300 p-4 rounded-lg text-center font-bold">
                              Please select at least 3 samples to perform One-Way ANOVA.
                          </div>
                       )}

                       {inferenceResults?.statVal !== 0 && !inferenceResults.error && (
                       <div className="bg-gray-900 p-6 rounded-xl border border-purple-500/30 shadow-xl">
                          <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                            <h2 className="text-xl font-bold text-purple-400 flex items-center gap-2">Hypothesis Testing Results <button onClick={() => setInfoModal(testConfig.testType)} className="text-blue-400 bg-gray-800 rounded-full w-5 h-5 flex justify-center items-center">ℹ</button></h2>
                          </div>
                          <div className="space-y-6">
                              <div className="bg-gray-800 p-4 rounded-lg">
                                <div className="text-xs text-gray-500 mb-2 uppercase font-bold">Mathematical Equations</div>
                                <div className="space-y-2 flex flex-col">
                                  <span className="font-serif text-lg text-pink-300 tracking-wider bg-gray-950 p-2 rounded">{inferenceResults.baseEq}</span>
                                  <span className="font-serif text-lg text-emerald-300 tracking-wider bg-gray-950 p-2 rounded">{inferenceResults.subEq}</span>
                                </div>
                              </div>

                              {testConfig.testType === 'anova' && inferenceResults.anovaTable && (
                                <div className="bg-gray-800 p-4 rounded-lg border-t-2 border-purple-500">
                                  <div className="text-xs text-gray-500 mb-2 uppercase font-bold">ANOVA Table</div>
                                  <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm text-gray-300 border-collapse">
                                      <thead className="bg-gray-950 text-gray-400"><tr><th className="p-2 border border-gray-700">Source</th><th className="p-2 border border-gray-700">SS</th><th className="p-2 border border-gray-700">df</th><th className="p-2 border border-gray-700">MS</th><th className="p-2 border border-gray-700">F</th><th className="p-2 border border-gray-700">P-value</th></tr></thead>
                                      <tbody className="divide-y divide-gray-700">
                                        <tr className="bg-gray-800 hover:bg-gray-750"><td className="p-2 border border-gray-700 font-medium">Treatment</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.sst)}</td><td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfT}</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.mst)}</td><td className="p-2 border border-gray-700 font-mono text-purple-400 font-bold">{fmt(inferenceResults.anovaTable.f)}</td><td className="p-2 border border-gray-700 font-mono font-bold text-amber-400">{fmt(inferenceResults.anovaTable.p)}</td></tr>
                                        <tr className="bg-gray-800 hover:bg-gray-750"><td className="p-2 border border-gray-700 font-medium">Error</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.sse)}</td><td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfE}</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.mse)}</td><td className="p-2 border border-gray-700 bg-gray-900/50"></td><td className="p-2 border border-gray-700 bg-gray-900/50"></td></tr>
                                        <tr className="bg-gray-900 font-bold"><td className="p-2 border border-gray-700">Total</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.ssTotal)}</td><td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfTotal}</td><td className="p-2 border border-gray-700 bg-gray-900/50"></td><td className="p-2 border border-gray-700 bg-gray-900/50"></td><td className="p-2 border border-gray-700 bg-gray-900/50"></td></tr>
                                      </tbody>
                                    </table>
                                  </div>
                                  <div className={`mt-3 p-2 rounded text-center text-sm font-bold ${inferenceResults.pValue < (1-testConfig.ciLevel) ? 'bg-red-900/30 text-red-400' : 'bg-emerald-900/30 text-emerald-400'}`}>{inferenceResults.decision}</div>
                                </div>
                              )}

                              {testConfig.testType !== 'anova' && (
                                <>
                                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                      <div className="bg-gray-800 p-3 rounded-lg border-l-2 border-purple-500"><div className="text-xs text-gray-400">Stat ({inferenceResults.statName})</div><div className="text-xl text-white font-mono">{fmt(inferenceResults.statVal)}</div></div>
                                      <div className="bg-gray-800 p-3 rounded-lg border-l-2 border-purple-500"><div className="text-xs text-gray-400">df</div><div className="text-xl text-white font-mono">{inferenceResults.df !== null ? fmt(inferenceResults.df) : 'N/A'}</div></div>
                                      <div className={`bg-gray-800 p-3 rounded-lg border-l-2 col-span-2 ${inferenceResults.pValue < (1-testConfig.ciLevel) ? 'border-red-500' : 'border-emerald-500'}`}><div className="text-xs text-gray-400">P-Value ({testConfig.tails} tail)</div><div className="text-xl text-white font-mono">{fmt(inferenceResults.pValue)}</div><div className="text-xs mt-1 text-gray-300">{inferenceResults.decision}</div></div>
                                  </div>

                                  {!isNaN(inferenceResults.ci[0]) && (
                                    <div className="bg-gray-800 p-4 rounded-lg border-t-2 border-blue-500 flex flex-col md:flex-row justify-between items-center gap-4">
                                      <div className="flex-grow"><div className="text-xs text-gray-500 mb-1 uppercase font-bold">{(testConfig.ciLevel * 100).toFixed(0)}% Confidence Interval</div><div className="font-serif text-sm text-pink-300 bg-gray-950 p-1.5 rounded mb-1">{inferenceResults.ciBase}</div><div className="font-serif text-sm text-emerald-300 bg-gray-950 p-1.5 rounded">{inferenceResults.ciSub}</div></div>
                                      <span className="text-xl text-blue-400 font-mono bg-gray-950 p-3 rounded-lg min-w-[150px] text-center">[{fmt(inferenceResults.ci[0])}, {fmt(inferenceResults.ci[1])}]</span>
                                    </div>
                                  )}
                                </>
                              )}
                            </div>
                       </div>
                       )}
                    </div>

                    <div className="lg:col-span-5 space-y-6 max-h-[90vh] overflow-y-auto pr-2">
                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                          <h2 className="text-xl font-bold text-blue-400 mb-4 border-b border-gray-800 pb-2">1. Configure Test</h2>
                          <div className="space-y-4">
                              <div>
                                <label className="text-xs text-gray-400 mb-1 block">Statistical Test</label>
                                <select value={testConfig.testType} onChange={(e) => setTestConfig({...testConfig, testType: e.target.value})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:border-blue-500 outline-none">
                                    <optgroup label="One Sample"><option value="1_sample_z">1-Sample Z-Test</option><option value="1_sample_t">1-Sample T-Test</option><option value="1_sample_prop">1-Proportion Z-Test</option></optgroup>
                                    <optgroup label="Two Samples"><option value="2_sample_z">2-Sample Z-Test</option><option value="2_sample_t_eq">2-Sample T-Test (Pooled)</option><option value="2_sample_t_uneq">2-Sample Welch's T-Test</option><option value="2_sample_prop">2-Proportion Z-Test</option></optgroup>
                                    <optgroup label="Multi Sample"><option value="anova">One-Way ANOVA</option></optgroup>
                                </select>
                              </div>

                              {testConfig.testType !== 'anova' ? (
                                <div className="flex gap-2">
                                  <div className="flex-1"><label className="text-xs text-gray-400 block mb-1">Sample 1</label><select value={testConfig.target1} onChange={e => setTestConfig({...testConfig, target1: e.target.value})} className="w-full bg-gray-800 text-white rounded p-2">{inferenceSamples.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                                  {testConfig.testType.startsWith('2_') && <div className="flex-1"><label className="text-xs text-gray-400 block mb-1">Sample 2</label><select value={testConfig.target2} onChange={e => setTestConfig({...testConfig, target2: e.target.value})} className="w-full bg-gray-800 text-white rounded p-2">{inferenceSamples.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>}
                                </div>
                              ) : (
                                <div>
                                  <label className="text-xs text-gray-400 block mb-1">Select Samples for ANOVA</label>
                                  <div className="flex flex-wrap gap-2">{inferenceSamples.map(s => (<label key={s.id} className="flex items-center gap-1 bg-gray-800 px-2 py-1 rounded cursor-pointer"><input type="checkbox" checked={testConfig.anovaTargets.includes(s.id)} onChange={(e) => setTestConfig({...testConfig, anovaTargets: e.target.checked ? [...testConfig.anovaTargets, s.id] : testConfig.anovaTargets.filter(id => id !== s.id)})} className="accent-blue-500" /><span className="text-sm">{s.name}</span></label>))}</div>
                                </div>
                              )}
                              
                              {testConfig.testType !== 'anova' && (
                                <div className="grid grid-cols-2 gap-4">
                                  <div><label className="text-xs text-gray-400 block mb-1">Hypo Mean (μ₀/d₀/p₀)</label><input type="number" step={testConfig.testType.includes('prop') ? 0.05 : 1} value={testConfig.hypoMean} onChange={(e) => setTestConfig({...testConfig, hypoMean: parseFloat(e.target.value) || 0})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" /></div>
                                  <div><label className="text-xs text-gray-400 block mb-1">Tails</label><select value={testConfig.tails} onChange={e => setTestConfig({...testConfig, tails: e.target.value})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700"><option value="two">Two-Tailed (≠)</option><option value="left">Left-Tailed (&lt;)</option><option value="right">Right-Tailed (&gt;)</option></select></div>
                                </div>
                              )}

                              {(testConfig.testType === '1_sample_z' || testConfig.testType === '2_sample_z') && (
                                <div className="grid grid-cols-2 gap-4">
                                  <div><label className="text-xs text-gray-400 block mb-1">Known σ₁</label><input type="number" min="0.1" value={testConfig.knownVar1} onChange={(e) => setTestConfig({...testConfig, knownVar1: parseFloat(e.target.value) || 1})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" /></div>
                                  {testConfig.testType === '2_sample_z' && <div><label className="text-xs text-gray-400 block mb-1">Known σ₂</label><input type="number" min="0.1" value={testConfig.knownVar2} onChange={(e) => setTestConfig({...testConfig, knownVar2: parseFloat(e.target.value) || 1})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" /></div>}
                                </div>
                              )}

                              <div>
                                 <label className="text-xs text-gray-400 block mb-1">Confidence Level</label>
                                 <select value={testConfig.ciLevel} onChange={(e) => setTestConfig({...testConfig, ciLevel: parseFloat(e.target.value)})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2">
                                    <option value={0.90}>90% (α = 0.10)</option><option value={0.95}>95% (α = 0.05)</option><option value={0.99}>99% (α = 0.01)</option>
                                 </select>
                              </div>
                          </div>
                       </div>

                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                          <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2"><h2 className="text-xl font-bold text-emerald-400">2. Samples Manager</h2><button onClick={addInferenceSample} className="bg-emerald-600 text-white text-xs px-3 py-1 rounded shadow">+ Add Sample</button></div>
                          <div className="space-y-4">
                            {inferenceSamples.map(samp => (
                              <div key={samp.id} className="bg-gray-800 p-3 rounded-lg relative">
                                <button onClick={() => removeInferenceSample(samp.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-300">&times;</button>
                                <div className="flex items-center gap-2 mb-2">
                                  <span className="w-3 h-3 rounded-full" style={{backgroundColor: samp.color}}></span>
                                  <input type="text" value={samp.name} onChange={e => setInferenceSamples(inferenceSamples.map(s => s.id === samp.id ? {...s, name: e.target.value} : s))} className="bg-transparent text-white font-bold w-24 outline-none border-b border-gray-600 focus:border-emerald-500" />
                                  <span className="text-xs text-gray-400 ml-auto mr-4">n=</span>
                                  <input type="number" min="2" max="1000" value={samp.size} onChange={e => setInferenceSamples(inferenceSamples.map(s => s.id === samp.id ? {...s, size: parseInt(e.target.value)||2} : s))} className="w-16 bg-gray-900 text-white p-1 rounded text-center text-xs" />
                                </div>
                                <select value={samp.type} onChange={e => updateSampleType(samp.id, e.target.value)} className="w-full bg-gray-900 text-gray-300 text-xs rounded p-1 mb-2">
                                  <option value="normal">Normal (μ, σ)</option><option value="uniform">Uniform (a, b)</option><option value="exponential">Exponential (λ)</option><option value="poisson">Poisson (λ)</option><option value="binomial">Binomial (n, p)</option>
                                </select>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                  {samp.type === 'normal' && (<><label className="flex flex-col text-gray-400">μ <input type="number" value={samp.params.mu} onChange={e => updateSampleParam(samp.id, 'mu', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label><label className="flex flex-col text-gray-400">σ <input type="number" min="0.1" value={samp.params.sigma} onChange={e => updateSampleParam(samp.id, 'sigma', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label></>)}
                                  {samp.type === 'uniform' && (<><label className="flex flex-col text-gray-400">Min <input type="number" value={samp.params.a} onChange={e => updateSampleParam(samp.id, 'a', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label><label className="flex flex-col text-gray-400">Max <input type="number" value={samp.params.b} onChange={e => updateSampleParam(samp.id, 'b', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label></>)}
                                  {samp.type === 'exponential' && (<label className="flex flex-col text-gray-400 col-span-2">Rate λ <input type="number" step="0.1" value={samp.params.lambda} onChange={e => updateSampleParam(samp.id, 'lambda', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>)}
                                  {samp.type === 'poisson' && (<label className="flex flex-col text-gray-400 col-span-2">Lambda λ <input type="number" value={samp.params.lambda} onChange={e => updateSampleParam(samp.id, 'lambda', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>)}
                                  {samp.type === 'binomial' && (<><label className="flex flex-col text-gray-400">Trials n <input type="number" value={samp.params.n} onChange={e => updateSampleParam(samp.id, 'n', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label><label className="flex flex-col text-gray-400">Prob p <input type="number" step="0.05" value={samp.params.p} onChange={e => updateSampleParam(samp.id, 'p', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label></>)}
                                </div>
                              </div>
                            ))}
                          </div>
                          <button onClick={generateDataForSamples} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded font-bold mt-4 transition-colors">GENERATE NEW DATA</button>
                       </div>
                    </div>
                  </div>
                )}

                {/* --- TAB 3: BAYESIAN --- */}
                {activeTab === 'bayesian' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                      <Plotter chartData={bayesianAnalysis.chartData} domainMin={bayesianAnalysis.domainMin} domainMax={bayesianAnalysis.domainMax} xLabel="Parameter Space (θ)" yConfig={bayesYAxisConfig} />
                      
                      <div className="bg-gray-900 p-6 rounded-xl border border-pink-500/30 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                          <h3 className="text-lg font-bold text-pink-400 mb-3 border-b border-gray-700 pb-1">Confidence & Information</h3>
                          <div className="space-y-3 text-sm">
                            <div className="flex justify-between items-center bg-gray-800 p-2 rounded">
                              <span className="text-gray-400">Credible Interval (HDI):</span>
                              <select value={bayesState.ciLevel} onChange={e => updateBayesState('ciLevel', parseFloat(e.target.value))} className="bg-gray-900 text-white border border-gray-600 rounded px-1">
                                <option value={0.90}>90%</option><option value={0.95}>95%</option><option value={0.99}>99%</option>
                              </select>
                            </div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded"><span className="text-gray-400">CI Bounds:</span><span className="font-mono text-emerald-400">[{fmt(bayesianAnalysis.credibleInterval[0])}, {fmt(bayesianAnalysis.credibleInterval[1])}]</span></div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded"><span className="text-gray-400">Posterior Mean:</span><span className="font-mono text-white">{fmt(bayesianAnalysis.posteriorMean)}</span></div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded"><span className="text-gray-400" title="Amount of information data carries about parameter">Fisher Information I(θ):</span><span className="font-mono text-amber-400">{fmt(bayesianAnalysis.fisherInfo)}</span></div>
                          </div>
                        </div>
                        <div>
                          <h3 className="text-lg font-bold text-blue-400 mb-3 border-b border-gray-700 pb-1">Hypothesis Testing</h3>
                          <div className="space-y-3 text-sm bg-gray-800 p-3 rounded">
                              <label className="flex justify-between items-center mb-2"><span className="text-gray-400">Test Point (H₀: θ = ?):</span><input type="number" step="0.05" value={bayesState.testPoint} onChange={(e) => updateBayesState('testPoint', parseFloat(e.target.value) || 0)} className="w-20 bg-gray-900 text-white p-1 border border-gray-600 rounded text-center" /></label>
                              <div className="flex justify-between items-center mt-3"><span className="text-gray-500">Status:</span>{bayesianAnalysis.isPlausible ? <span className="text-emerald-400 font-bold">Plausible ✓</span> : <span className="text-red-400 font-bold">Rejected ✗</span>}</div>
                              <div className="flex justify-between items-center mt-2"><span className="text-gray-500">Density at Point:</span><span className="font-mono text-white">{fmt(bayesianAnalysis.testValue)}</span></div>
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col gap-6 max-h-[800px] overflow-y-auto">
                      <div className="border-b border-gray-700 pb-4">
                        <h2 className="text-xl font-bold text-pink-400 mb-3">Bayesian Update Model</h2>
                        <select value={bayesState.type} onChange={(e) => switchBayesCase(e.target.value)} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-pink-500">
                          <option value="beta-binomial">Beta - Binomial</option><option value="jeffreys-binomial">Jeffreys' Prior - Binomial</option><option value="gamma-poisson">Gamma - Poisson</option><option value="gamma-exponential">Gamma - Exponential</option><option value="normal-normal">Normal - Normal (Known Var)</option>
                        </select>
                      </div>
                      
                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-gray-400">
                        <div className="flex justify-between items-center mb-2"><h3 className="font-bold text-gray-300">1. Prior Belief</h3></div>
                        {['beta-binomial', 'jeffreys-binomial'].includes(bayesState.type) && (
                          <><label className="text-sm text-gray-400 flex justify-between"><span>Pseudo-Succ (α)</span> <span>{fmt(bayesState.prior1)}</span></label><input type="range" disabled={bayesState.type === 'jeffreys-binomial'} min="0.1" max="10" step="0.1" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', parseFloat(e.target.value))} className={`w-full mb-2 ${bayesState.type === 'jeffreys-binomial' ? 'opacity-50 cursor-not-allowed' : ''}`} /><label className="text-sm text-gray-400 flex justify-between"><span>Pseudo-Fail (β)</span> <span>{fmt(bayesState.prior2)}</span></label><input type="range" disabled={bayesState.type === 'jeffreys-binomial'} min="0.1" max="10" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', parseFloat(e.target.value))} className={`w-full ${bayesState.type === 'jeffreys-binomial' ? 'opacity-50 cursor-not-allowed' : ''}`} /></>
                        )}
                        {['gamma-poisson', 'gamma-exponential'].includes(bayesState.type) && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(bayesState.prior1)}</span></label><input type="range" min="0.1" max="20" step="0.1" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', parseFloat(e.target.value))} className="w-full mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Rate (β)</span> <span>{fmt(bayesState.prior2)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', parseFloat(e.target.value))} className="w-full" /></> )}
                        {bayesState.type === 'normal-normal' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Prior Mean (μ₀)</span> <span>{fmt(bayesState.prior1)}</span></label><input type="range" min="-5" max="10" step="0.5" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', parseFloat(e.target.value))} className="w-full mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prior Std Dev (σ₀)</span> <span>{fmt(bayesState.prior2)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', parseFloat(e.target.value))} className="w-full" /></> )}
                      </div>

                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-amber-500">
                        <h3 className="font-bold mb-2 text-amber-400">2. Observed Data</h3>
                        {['beta-binomial', 'jeffreys-binomial'].includes(bayesState.type) && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Trials (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="50" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Successes (k)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="0" max={bayesState.data1} step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseInt(e.target.value))} className="w-full accent-amber-500" /></> )}
                        {bayesState.type === 'gamma-poisson' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Periods (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="30" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Events (Σx)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="0" max="100" step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseInt(e.target.value))} className="w-full accent-amber-500" /></> )}
                        {bayesState.type === 'gamma-exponential' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Observations (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="30" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sum of Waiting Times (Σx)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="0" max="100" step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseInt(e.target.value))} className="w-full accent-amber-500" /></> )}
                        {bayesState.type === 'normal-normal' && ( <><label className="text-sm text-gray-400 flex justify-between"><span>Sample Size (n)</span> <span>{fmt(bayesState.data1)}</span></label><input type="range" min="1" max="50" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sample Mean (x̄)</span> <span>{fmt(bayesState.data2)}</span></label><input type="range" min="-5" max="10" step="0.5" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseFloat(e.target.value))} className="w-full accent-amber-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Known Pop. Std (σ)</span> <span>{fmt(bayesState.data3)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={bayesState.data3} onChange={(e) => updateBayesState('data3', parseFloat(e.target.value))} className="w-full accent-amber-500" /></> )}
                      </div>
                    </div>
                  </div>
                )}
                
                {activeTab !== 'inference' && <EquationsTable />}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
