<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Math Utilities ---
        const gamma = (z) => {
          let g = 7;
          let p = [0.99999999999980993, 676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
          if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
          z -= 1;
          let x = p[0];
          for (let i = 1; i < g + 2; i++) x += p[i] / (z + i);
          let t = z + g + 0.5;
          return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
        };

        const betaFunc = (x, y) => (gamma(x) * gamma(y)) / gamma(x + y);

        const factorial = (n) => {
          if (n < 0) return 0;
          if (n === 0 || n === 1) return 1;
          let res = 1;
          for (let i = 2; i <= n; i++) res *= i;
          return res;
        };

        const combinations = (n, k) => {
          if (k < 0 || k > n) return 0;
          if (k === 0 || k === n) return 1;
          let c = 1;
          for (let i = 1; i <= k; i++) c = (c * (n - i + 1)) / i;
          return c;
        };

        const fmt = (v) => {
          if (isNaN(v) || v === null || v === undefined) return 'N/A';
          return parseFloat(Number(v).toFixed(4)).toString();
        };

        // --- Continuous PDFs ---
        const normalPDF = (x, mu, sigma) => (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
        const betaPDF = (x, alpha, beta) => (x <= 0 || x >= 1) ? 0 : (Math.pow(x, alpha - 1) * Math.pow(1 - x, beta - 1)) / betaFunc(alpha, beta);
        const exponentialPDF = (x, lambda) => x < 0 ? 0 : lambda * Math.exp(-lambda * x);
        const gammaPDF = (x, alpha, beta) => x <= 0 ? 0 : (Math.pow(beta, alpha) * Math.pow(x, alpha - 1) * Math.exp(-beta * x)) / gamma(alpha);
        const uniformPDF = (x, a, b) => (x >= a && x <= b) ? 1 / (b - a) : 0;
        const laplacePDF = (x, mu, b) => (1 / (2 * b)) * Math.exp(-Math.abs(x - mu) / b);
        const cauchyPDF = (x, x0, gammaVal) => 1 / (Math.PI * gammaVal * (1 + Math.pow((x - x0) / gammaVal, 2)));
        const lognormalPDF = (x, mu, sigma) => x <= 0 ? 0 : (1 / (x * sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-Math.pow(Math.log(x) - mu, 2) / (2 * sigma * sigma));
        const weibullPDF = (x, k, lambda) => x < 0 ? 0 : (k / lambda) * Math.pow(x / lambda, k - 1) * Math.exp(-Math.pow(x / lambda, k));
        const paretoPDF = (x, xm, alpha) => x < xm ? 0 : (alpha * Math.pow(xm, alpha)) / Math.pow(x, alpha + 1);
        const logisticPDF = (x, mu, s) => {
          const ex = Math.exp(-(x - mu) / s);
          return ex / (s * Math.pow(1 + ex, 2));
        };
        const rayleighPDF = (x, sigma) => x < 0 ? 0 : (x / (sigma * sigma)) * Math.exp(-(x * x) / (2 * sigma * sigma));

        // --- Sampling PDFs ---
        const chiSquarePDF = (x, k) => gammaPDF(x, k / 2, 0.5);
        const studentTPDF = (x, nu) => (gamma((nu + 1) / 2) / (Math.sqrt(nu * Math.PI) * gamma(nu / 2))) * Math.pow(1 + (x * x) / nu, -(nu + 1) / 2);
        const fDistPDF = (x, d1, d2) => x <= 0 ? 0 : Math.sqrt(Math.pow(d1 * x, d1) * Math.pow(d2, d2) / Math.pow(d1 * x + d2, d1 + d2)) / (x * betaFunc(d1 / 2, d2 / 2));

        // --- Discrete PMFs ---
        const binomialPMF = (x, n, p) => (x < 0 || x > n || !Number.isInteger(x)) ? 0 : combinations(n, x) * Math.pow(p, x) * Math.pow(1 - p, n - x);
        const poissonPMF = (x, lambda) => (x < 0 || !Number.isInteger(x)) ? 0 : (Math.pow(lambda, x) * Math.exp(-lambda)) / factorial(x);
        const bernoulliPMF = (x, p) => binomialPMF(x, 1, p);
        const geometricPMF = (x, p) => (x < 1 || !Number.isInteger(x)) ? 0 : p * Math.pow(1 - p, x - 1);
        const negBinomialPMF = (x, r, p) => (x < r || !Number.isInteger(x)) ? 0 : combinations(x - 1, r - 1) * Math.pow(p, r) * Math.pow(1 - p, x - r);
        const hypergeometricPMF = (x, N, K, n) => {
          if (!Number.isInteger(x) || x < Math.max(0, n - (N - K)) || x > Math.min(n, K)) return 0;
          return (combinations(K, x) * combinations(N - K, n - x)) / combinations(N, n);
        };
        const discreteUniformPMF = (x, a, b) => (x >= a && x <= b && Number.isInteger(x)) ? 1 / (b - a + 1) : 0;

        const isDiscreteDist = (type) => ['binomial', 'poisson', 'bernoulli', 'geometric', 'negative_binomial', 'hypergeometric', 'discrete_uniform'].includes(type);

        // --- Numerical Integration & CDFs ---
        const integrate = (pdf, min, max, steps = 300) => {
          let sum = 0;
          const step = (max - min) / steps;
          for (let i = 0; i < steps; i++) {
            const x = min + i * step + step / 2;
            sum += pdf(x) * step;
          }
          return sum;
        };

        const findQuantile = (pdf, min, max, targetArea) => {
          let low = min, high = max, mid;
          const totalArea = integrate(pdf, min, max, 500);
          for (let i = 0; i < 25; i++) {
            mid = (low + high) / 2;
            const area = integrate(pdf, min, mid, 300) / totalArea;
            if (area < targetArea) low = mid; else high = mid;
          }
          return mid;
        };

        const erf = (x) => {
          const sign = x >= 0 ? 1 : -1;
          x = Math.abs(x);
          const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
          const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
          const t = 1.0 / (1.0 + p * x);
          const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
          return sign * y;
        };
        const normalCDF = (x, mu = 0, sigma = 1) => 0.5 * (1 + erf((x - mu) / (sigma * Math.sqrt(2))));

        const tCDF = (t, df) => {
          if (t === 0) return 0.5;
          const absT = Math.abs(t);
          const area = integrate(x => studentTPDF(x, df), 0, absT, 1000);
          return t > 0 ? 0.5 + area : 0.5 - area;
        };

        const fCDF = (f, d1, d2) => {
          if (f <= 0) return 0;
          return integrate(x => fDistPDF(x, d1, d2), 0.00001, f, 2000);
        };

        const getZScore = (ci) => {
          if (ci === 0.90) return 1.645;
          if (ci === 0.95) return 1.960;
          if (ci === 0.99) return 2.576;
          return 1.96;
        };

        const getTCrit = (ci, df) => {
          const z = getZScore(ci);
          if (df > 100) return z;
          return z * (1 + (z*z + 1)/(4*df));
        };

        // --- Encyclopedia (English) ---
        const DIST_INFO = {
          normal: { name: "Normal (Gaussian)", desc: "The most important continuous distribution in statistics, describing symmetrical, bell-shaped data.", params: "Mean (μ) determines the center, Standard Deviation (σ) determines the spread.", formula: "f(x) = (1 / σ√(2π)) * exp(-0.5 * ((x-μ)/σ)²)", uses: "Heights, measurement errors, Central Limit Theorem.", notes: "Symmetric around the mean. Skewness and Excess Kurtosis are 0." },
          beta: { name: "Beta", desc: "Models random variables limited to intervals of 0 and 1, like probabilities or proportions.", params: "Shape parameters α and β.", formula: "f(x) ∝ x^(α-1) * (1-x)^(β-1)", uses: "Prior distribution for binomial proportions in Bayesian inference.", notes: "Uniform when α=1, β=1." },
          gamma: { name: "Gamma", desc: "Models the waiting time until α events occur in a Poisson process.", params: "Shape (α) and Rate (β).", formula: "f(x) = (β^α * x^(α-1) * e^(-βx)) / Γ(α)", uses: "Waiting times, rainfall amounts, prior for Poisson rate.", notes: "Reduces to Exponential when α=1." },
          exponential: { name: "Exponential", desc: "Models the time between events in a Poisson point process.", params: "Rate (λ).", formula: "f(x) = λ * e^(-λx)", uses: "Time until failure, queuing models.", notes: "Memoryless property." },
          uniform: { name: "Continuous Uniform", desc: "All values in an interval are equally likely.", params: "Minimum (a) and Maximum (b).", formula: "f(x) = 1 / (b - a)", uses: "Random number generation, total ignorance priors.", notes: "Rectangular shaped." },
          student_t: { name: "Student's t", desc: "Sampling distribution for estimating the mean of a normally distributed population when sample size is small.", params: "Degrees of Freedom (ν).", formula: "f(t) ∝ (1 + t²/ν)^-(ν+1)/2", uses: "T-tests, confidence intervals for small n.", notes: "Approaches Normal distribution as ν increases." },
          f_dist: { name: "F-Distribution", desc: "Sampling distribution of the ratio of two scaled chi-square variables.", params: "Numerator df (d1) and Denominator df (d2).", formula: "Based on Beta function.", uses: "ANOVA, testing equality of variances.", notes: "Always positive and right-skewed." },
          chisquare: { name: "Chi-Square", desc: "Sum of the squares of k independent standard normal random variables.", params: "Degrees of Freedom (k).", formula: "f(x) ∝ x^(k/2 - 1) * e^(-x/2)", uses: "Goodness-of-fit tests, independence tests.", notes: "Special case of the Gamma distribution." },
          poisson: { name: "Poisson", desc: "Discrete distribution for the number of events occurring in a fixed interval.", params: "Rate (λ).", formula: "P(X=x) = (λ^x * e^-λ) / x!", uses: "Call center traffic, radioactive decay.", notes: "Mean and Variance are both equal to λ." },
          binomial: { name: "Binomial", desc: "Number of successes in a sequence of n independent Bernoulli trials.", params: "Trials (n) and Probability of success (p).", formula: "P(X=x) = C(n,x) * p^x * (1-p)^(n-x)", uses: "Coin flips, quality control pass/fail.", notes: "Approaches Poisson for large n and small p." },
          laplace: { name: "Laplace (Double Exponential)", desc: "Represents the difference between two independent, identically distributed exponential variables.", params: "Location (μ) and Scale (b).", formula: "f(x) = (1 / 2b) * exp(-|x - μ| / b)", uses: "Robust regression (L1 regularization/Lasso).", notes: "Sharper peak and fatter tails than Normal." },
          cauchy: { name: "Cauchy (Lorentz)", desc: "A distribution with undefined mean and variance due to its extreme heavy tails.", params: "Location (x₀) and Scale (γ).", formula: "f(x) = 1 / (πγ * [1 + ((x-x₀)/γ)²])", uses: "Physics (resonance behavior).", notes: "Law of Large Numbers does not apply." },
          lognormal: { name: "Log-Normal", desc: "A distribution of a variable whose logarithm is normally distributed.", params: "Log-Scale Mean (μ) and Log-Scale Std Dev (σ).", formula: "f(x) = (1 / xσ√(2π)) * exp(-(ln(x) - μ)² / (2σ²))", uses: "Stock prices, income distribution.", notes: "Always positive and right-skewed." },
          weibull: { name: "Weibull", desc: "Versatile distribution used extensively in reliability engineering.", params: "Shape (k) and Scale (λ).", formula: "f(x) = (k/λ) * (x/λ)^(k-1) * e^-(x/λ)^k", uses: "Lifespan of components, wind speed.", notes: "Reduces to Exponential when k=1." },
          pareto: { name: "Pareto", desc: "Power-law distribution demonstrating the 80-20 rule.", params: "Scale/Minimum (xm) and Shape (α).", formula: "f(x) = (α * xm^α) / x^(α+1)", uses: "Wealth distribution, internet traffic.", notes: "Heavy-tailed." },
          logistic: { name: "Logistic", desc: "Similar to the normal distribution but with heavier tails.", params: "Location (μ) and Scale (s).", formula: "f(x) = e^-(x-μ)/s / (s * (1 + e^-(x-μ)/s)²)", uses: "Logistic regression.", notes: "CDF is the standard logistic function." },
          rayleigh: { name: "Rayleigh", desc: "Distribution of the magnitude of a 2D vector whose components are independent normals.", params: "Scale (σ).", formula: "f(x) = (x / σ²) * exp(-x² / 2σ²)", uses: "Wind speed, signal processing.", notes: "Related to Chi-Square." },
          bernoulli: { name: "Bernoulli", desc: "Simplest discrete distribution; represents a single trial with two outcomes.", params: "Probability of success (p).", formula: "P(X=x) = p^x * (1-p)^(1-x)", uses: "A single coin toss.", notes: "Special case of Binomial with n=1." },
          geometric: { name: "Geometric", desc: "Number of trials needed to get the first success.", params: "Probability of success (p).", formula: "P(X=x) = p * (1-p)^(x-1)", uses: "Reliability, time until first failure.", notes: "Memoryless property." },
          negative_binomial: { name: "Negative Binomial", desc: "Number of trials needed to get r successes.", params: "Target successes (r) and Probability (p).", formula: "P(X=x) = C(x-1, r-1) * p^r * (1-p)^(x-r)", uses: "Overdispersed count data.", notes: "Generalizes the geometric distribution." },
          hypergeometric: { name: "Hypergeometric", desc: "Number of successes in n draws WITHOUT replacement from a population of size N.", params: "Population (N), Successes in Pop (K), Draws (n).", formula: "P(X=x) = [C(K,x) * C(N-K, n-x)] / C(N,n)", uses: "Quality control without replacement.", notes: "Approaches Binomial when N is large." },
          discrete_uniform: { name: "Discrete Uniform", desc: "A discrete distribution where a finite number of values are equally likely.", params: "Minimum (a) and Maximum (b).", formula: "P(X=x) = 1 / (b - a + 1)", uses: "Rolling a fair die.", notes: "Mean is (a+b)/2." },
          '1_sample_z': { name: "1-Sample Z-Test", desc: "Tests if a sample mean differs from a population mean when the population variance is KNOWN.", params: "Requires Known Population Variance.", formula: "Z = (x̄ - μ₀) / (σ / √n)", uses: "Large samples or known population processes.", notes: "Relies heavily on Central Limit Theorem." },
          '1_sample_t': { name: "1-Sample T-Test", desc: "Tests if a sample mean differs from a population mean when population variance is UNKNOWN.", params: "Uses sample standard deviation (s).", formula: "t = (x̄ - μ₀) / (s / √n)", uses: "Small samples (n < 30) or unknown variance.", notes: "Assumes population is approximately normal." },
          '2_sample_z': { name: "2-Sample Z-Test", desc: "Tests if two sample means differ, assuming both population variances are KNOWN.", params: "Known variances σ₁² and σ₂².", formula: "Z = (x̄₁ - x̄₂ - d₀) / √(σ₁²/n₁ + σ₂²/n₂)", uses: "Comparing two distinct populations with historical variance data.", notes: "Rarely used in practice as variances are usually unknown." },
          '2_sample_t_eq': { name: "2-Sample T-Test (Equal Variance)", desc: "Tests if two sample means differ, assuming variances are unknown but EQUAL (Pooled).", params: "Uses Pooled Standard Deviation (Sp).", formula: "t = (x̄₁ - x̄₂ - d₀) / [Sp √(1/n₁ + 1/n₂)]", uses: "Comparing groups with similar dispersion.", notes: "Requires Levene's or F-test to confirm equal variance first." },
          '2_sample_t_uneq': { name: "2-Sample T-Test (Unequal Var / Welch's)", desc: "Tests if two sample means differ, assuming variances are unknown and UNEQUAL.", params: "Does not pool variances.", formula: "t = (x̄₁ - x̄₂ - d₀) / √(s₁²/n₁ + s₂²/n₂)", uses: "Most robust 2-sample test for means.", notes: "Default choice in most modern software." },
          '1_sample_prop': { name: "1-Proportion Z-Test", desc: "Tests if a sample proportion differs from a hypothesized population proportion.", params: "Assumes sample follows a binomial distribution.", formula: "Z = (p̂ - p₀) / √(p₀(1-p₀)/n)", uses: "Click-through rates, defect rates.", notes: "Requires n*p > 10 and n*(1-p) > 10." },
          '2_sample_prop': { name: "2-Proportion Z-Test", desc: "Tests if two sample proportions differ.", params: "Uses a pooled proportion estimate (p̂_pool) under H0.", formula: "Z = (p̂₁ - p̂₂) / √(p̂_pool(1-p̂_pool)(1/n₁ + 1/n₂))", uses: "A/B testing conversion rates.", notes: "Large sample assumption applies." },
          'anova': { name: "One-Way ANOVA", desc: "Tests if the means of 3 or more independent groups are significantly different.", params: "Assumes normality and equal variances across groups.", formula: "F = MST (Mean Square Treatment) / MSE (Mean Square Error)", uses: "Comparing multiple marketing campaigns, drug dosages.", notes: "If F is significant, post-hoc tests are needed." },
        };

        function AdvancedStatsLab() {
          const [activeTab, setActiveTab] = useState('explorer');
          const [infoModal, setInfoModal] = useState(null);
          
          // --- Explorer State ---
          const [xAxisBounds, setXAxisBounds] = useState({ min: -5, max: 10 });
          const [yAxisConfig, setYAxisConfig] = useState({ show: true, auto: true, min: 0, max: 1 });
          const [distributions, setDistributions] = useState([
            { id: 1, type: 'normal', color: '#3b82f6', params: { mu: 0, sigma: 1 }, name: 'Normal 1' },
            { id: 2, type: 'poisson', color: '#ec4899', params: { lambda: 4 }, name: 'Poisson 1' }
          ]);

          // --- Bayesian State ---
          const [bayesState, setBayesState] = useState({
            type: 'beta-binomial',
            prior1: 2, prior2: 2, data1: 10, data2: 7, data3: 1, testPoint: 0.5, ciLevel: 0.95
          });

          // --- Applied Inference State ---
          const [inferenceSamples, setInferenceSamples] = useState([
            { id: 1, name: 'Sample A', size: 50, type: 'normal', params: { mu: 100, sigma: 15 }, data: [], color: '#8b5cf6' },
            { id: 2, name: 'Sample B', size: 50, type: 'normal', params: { mu: 105, sigma: 15 }, data: [], color: '#ec4899' },
            { id: 3, name: 'Sample C', size: 50, type: 'normal', params: { mu: 110, sigma: 15 }, data: [], color: '#10b981' }
          ]);
          const [testConfig, setTestConfig] = useState({
            testType: 'anova', target1: 1, target2: 2, anovaTargets: [1, 2, 3],
            hypoMean: 100, knownVar1: 15, knownVar2: 15, tails: 'two', ciLevel: 0.95
          });

          // --- Handlers ---
          function addDistribution() {
            if (distributions.length >= 6) return;
            const newId = distributions.length > 0 ? Math.max(...distributions.map(d => d.id)) + 1 : 1;
            const colors = ['#f59e0b', '#10b981', '#8b5cf6', '#ef4444', '#06b6d4', '#f472b6'];
            setDistributions([...distributions, { id: newId, type: 'normal', color: colors[newId % colors.length], params: { mu: 0, sigma: 1 }, name: `Dist ${newId}` }]);
          }

          function removeDistribution(id) {
            setDistributions(distributions.filter(d => d.id !== id));
          }

          function updateDistType(id, newType) {
            setDistributions(distributions.map(d => {
              if (d.id === id) {
                let newParams = {};
                switch (newType) {
                  case 'normal': newParams = { mu: 0, sigma: 1 }; break;
                  case 'beta': case 'gamma': newParams = { alpha: 2, beta: 2 }; break;
                  case 'exponential': newParams = { lambda: 1 }; break;
                  case 'uniform': newParams = { a: -2, b: 2 }; break;
                  case 'laplace': newParams = { mu: 0, b: 1 }; break;
                  case 'cauchy': newParams = { x0: 0, gammaVal: 1 }; break;
                  case 'lognormal': newParams = { mu: 0, sigma: 1 }; break;
                  case 'weibull': newParams = { k: 1.5, lambda: 1 }; break;
                  case 'pareto': newParams = { xm: 1, alpha: 3 }; break;
                  case 'logistic': newParams = { mu: 0, s: 1 }; break;
                  case 'rayleigh': newParams = { sigma: 1 }; break;
                  case 'binomial': newParams = { n: 10, p: 0.5 }; break;
                  case 'poisson': newParams = { lambda: 4 }; break;
                  case 'bernoulli': case 'geometric': newParams = { p: 0.5 }; break;
                  case 'negative_binomial': newParams = { r: 3, p: 0.5 }; break;
                  case 'hypergeometric': newParams = { N: 50, K: 10, n: 10 }; break;
                  case 'discrete_uniform': newParams = { a: 1, b: 6 }; break;
                  case 'student_t': case 'chisquare': newParams = { nu: 5, k: 5 }; break;
                  case 'f_dist': newParams = { d1: 5, d2: 5 }; break;
                  default: newParams = { mu: 0, sigma: 1 };
                }
                return { ...d, type: newType, params: newParams };
              }
              return d;
            }));
          }

          function updateDistParam(id, paramName, value) {
            setDistributions(distributions.map(d => d.id === id ? { ...d, params: { ...d.params, [paramName]: parseFloat(value) || 0 } } : d));
          }

          function updateBayesState(key, value) {
            setBayesState(prev => {
              const newState = { ...prev, [key]: value };
              if (key === 'data1' && (prev.type === 'beta-binomial' || prev.type === 'jeffreys-binomial') && newState.data2 > value) {
                newState.data2 = value;
              }
              return newState;
            });
          }

          function switchBayesCase(newType) {
            switch (newType) {
              case 'beta-binomial': setBayesState(prev => ({ ...prev, type: newType, prior1: 2, prior2: 2, data1: 10, data2: 7, data3: 1, testPoint: 0.5 })); break;
              case 'gamma-poisson': setBayesState(prev => ({ ...prev, type: newType, prior1: 2, prior2: 1, data1: 5, data2: 15, data3: 1, testPoint: 3 })); break;
              case 'gamma-exponential': setBayesState(prev => ({ ...prev, type: newType, prior1: 2, prior2: 1, data1: 5, data2: 10, data3: 1, testPoint: 0.5 })); break;
              case 'normal-normal': setBayesState(prev => ({ ...prev, type: newType, prior1: 0, prior2: 2, data1: 5, data2: 2, data3: 1.5, testPoint: 1 })); break;
              case 'jeffreys-binomial': setBayesState(prev => ({ ...prev, type: newType, prior1: 0.5, prior2: 0.5, data1: 10, data2: 7, data3: 1, testPoint: 0.5 })); break;
              default: break;
            }
          }

          function addInferenceSample() {
            const newId = inferenceSamples.length > 0 ? Math.max(...inferenceSamples.map(s => s.id)) + 1 : 1;
            const colors = ['#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#ef4444'];
            setInferenceSamples([...inferenceSamples, {
              id: newId, name: `Sample ${newId}`, size: 30, type: 'normal', params: { mu: 50, sigma: 10 }, data: [], color: colors[newId % colors.length]
            }]);
          }

          function removeInferenceSample(id) {
            setInferenceSamples(inferenceSamples.filter(s => s.id !== id));
            setTestConfig(prev => ({
              ...prev,
              anovaTargets: prev.anovaTargets.filter(tid => tid !== id),
              target1: prev.target1 === id ? '' : prev.target1,
              target2: prev.target2 === id ? '' : prev.target2,
            }));
          }

          function updateSampleType(id, newType) {
            setInferenceSamples(inferenceSamples.map(s => {
              if (s.id === id) {
                let p = {};
                if (newType === 'normal') p = { mu: 50, sigma: 10 };
                else if (newType === 'uniform') p = { a: 0, b: 100 };
                else if (newType === 'exponential') p = { lambda: 0.1 };
                else if (newType === 'poisson') p = { lambda: 20 };
                else if (newType === 'binomial') p = { n: 1, p: 0.5 };
                return { ...s, type: newType, params: p, data: [] };
              }
              return s;
            }));
          }

          function updateSampleParam(id, key, val) {
            setInferenceSamples(inferenceSamples.map(s => s.id === id ? { ...s, params: { ...s.params, [key]: parseFloat(val) || 0 } } : s));
          }

          function generateDataForSamples() {
            setInferenceSamples(prev => prev.map(samp => {
              let newData = [];
              for (let i = 0; i < samp.size; i++) {
                if (samp.type === 'normal') {
                  let u = 0, v = 0;
                  while (u === 0) u = Math.random();
                  while (v === 0) v = Math.random();
                  let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                  newData.push(z * samp.params.sigma + samp.params.mu);
                } else if (samp.type === 'uniform') {
                  newData.push(Math.random() * (samp.params.b - samp.params.a) + samp.params.a);
                } else if (samp.type === 'exponential') {
                  newData.push(-Math.log(1 - Math.random()) / samp.params.lambda);
                } else if (samp.type === 'poisson') {
                  let L = Math.exp(-samp.params.lambda), k = 0, p = 1;
                  do { k++; p *= Math.random(); } while (p > L);
                  newData.push(k - 1);
                } else if (samp.type === 'binomial') {
                  let succ = 0;
                  for (let j = 0; j < samp.params.n; j++) if (Math.random() < samp.params.p) succ++;
                  newData.push(succ);
                }
              }
              return { ...samp, data: newData };
            }));
          }

          useEffect(() => {
            if (inferenceSamples[0].data.length === 0) generateDataForSamples();
          }, []);

          // --- Scatter Plot Engine (Horizontal Overlapping Jitter) ---
          const scatterPlotData = useMemo(() => {
            let allData = [];
            inferenceSamples.forEach(s => allData = allData.concat(s.data));
            if (allData.length === 0) return null;
            
            let minVal = Math.min(...allData);
            let maxVal = Math.max(...allData);
            
            const range = maxVal - minVal || 1;
            minVal -= range * 0.1;
            maxVal += range * 0.1;

            const points = [];
            inferenceSamples.forEach((samp) => {
               samp.data.forEach(val => {
                  const jitter = (Math.random() - 0.5) * 0.8;
                  points.push({ val, jitter, color: samp.color, name: samp.name });
               });
            });

            return { points, minVal, maxVal };
          }, [inferenceSamples]);

          const ScatterPlot = () => {
            if (!scatterPlotData) return <div className="text-center text-gray-600 mt-10">Generate data to visualize</div>;
            
            const width = 800;
            const height = 250;
            const paddingX = 60;
            const paddingY = 40;
            const innerWidth = width - paddingX * 2;
            const innerHeight = height - paddingY * 2;
            
            const scaleX = (val) => paddingX + ((val - scatterPlotData.minVal) / (scatterPlotData.maxVal - scatterPlotData.minVal)) * innerWidth;
            const scaleY = (jitter) => paddingY + (jitter + 0.5) * innerHeight;

            const xTicks = 10;
            const gridLines = [];
            for (let i = 0; i <= xTicks; i++) {
                const val = scatterPlotData.minVal + (i / xTicks) * (scatterPlotData.maxVal - scatterPlotData.minVal);
                gridLines.push(
                    <g key={`x-${i}`}>
                        <line x1={scaleX(val)} y1={paddingY} x2={scaleX(val)} y2={height - paddingY} stroke="#374151" strokeDasharray="4 4" />
                        <text x={scaleX(val)} y={height - paddingY + 20} fill="#9ca3af" fontSize="12" textAnchor="middle">{fmt(val)}</text>
                    </g>
                );
            }

            return (
              <div className="relative w-full h-full flex items-center justify-center">
                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                   {gridLines}
                   <line x1={paddingX} y1={height - paddingY} x2={width - paddingX} y2={height - paddingY} stroke="#6b7280" strokeWidth="2" />
                   <text x={width / 2} y={height - 5} fill="#d1d5db" fontSize="14" textAnchor="middle">Value</text>
                   {scatterPlotData.points.map((p, i) => (
                      <circle key={`pt-${i}`} cx={scaleX(p.val)} cy={scaleY(p.jitter)} r="5" fill={p.color} opacity="0.75" stroke="#1f2937" strokeWidth="1" className="transition-all duration-300" />
                   ))}
                </svg>
                <div className="absolute top-2 right-4 flex flex-col gap-2 bg-gray-900/90 p-3 rounded-lg border border-gray-700 shadow-lg backdrop-blur-sm">
                  {inferenceSamples.map(s => (
                    <div key={s.id} className="flex items-center gap-2">
                      <span className="w-3 h-3 rounded-full" style={{backgroundColor: s.color}}></span>
                      <span className="text-gray-200 text-xs font-bold">{s.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          };

          // --- Data & Analysis Engines ---
          const generateChartData = (domainMin, domainMax, resolution, dists) => {
            const data = [];
            let maxY = 0;
            const step = (domainMax - domainMin) / resolution;

            dists.forEach(dist => {
              const points = [];
              const isDiscrete = isDiscreteDist(dist.type) || dist.type === 'likelihood_discrete';
              const startX = isDiscrete ? Math.ceil(domainMin) : domainMin;
              const endX = isDiscrete ? Math.floor(domainMax) : domainMax;
              const xStep = isDiscrete ? 1 : step;

              for (let x = startX; x <= endX; x += xStep) {
                let y = 0;
                switch (dist.type) {
                  case 'normal': y = normalPDF(x, dist.params.mu, dist.params.sigma); break;
                  case 'beta': y = betaPDF(x, dist.params.alpha, dist.params.beta); break;
                  case 'gamma': y = gammaPDF(x, dist.params.alpha, dist.params.beta); break;
                  case 'exponential': y = exponentialPDF(x, dist.params.lambda); break;
                  case 'uniform': y = uniformPDF(x, dist.params.a, dist.params.b); break;
                  case 'laplace': y = laplacePDF(x, dist.params.mu, dist.params.b); break;
                  case 'cauchy': y = cauchyPDF(x, dist.params.x0, dist.params.gammaVal); break;
                  case 'lognormal': y = lognormalPDF(x, dist.params.mu, dist.params.sigma); break;
                  case 'weibull': y = weibullPDF(x, dist.params.k, dist.params.lambda); break;
                  case 'pareto': y = paretoPDF(x, dist.params.xm, dist.params.alpha); break;
                  case 'logistic': y = logisticPDF(x, dist.params.mu, dist.params.s); break;
                  case 'rayleigh': y = rayleighPDF(x, dist.params.sigma); break;
                  case 'student_t': y = studentTPDF(x, dist.params.nu); break;
                  case 'f_dist': y = fDistPDF(x, dist.params.d1, dist.params.d2); break;
                  case 'chisquare': y = chiSquarePDF(x, dist.params.k); break;
                  case 'binomial': y = binomialPMF(x, dist.params.n, dist.params.p); break;
                  case 'poisson': y = poissonPMF(x, dist.params.lambda); break;
                  case 'bernoulli': y = bernoulliPMF(x, dist.params.p); break;
                  case 'geometric': y = geometricPMF(x, dist.params.p); break;
                  case 'negative_binomial': y = negBinomialPMF(x, dist.params.r, dist.params.p); break;
                  case 'hypergeometric': y = hypergeometricPMF(x, dist.params.N, dist.params.K, dist.params.n); break;
                  case 'discrete_uniform': y = discreteUniformPMF(x, dist.params.a, dist.params.b); break;
                  case 'likelihood':
                  case 'likelihood_discrete':
                    if (dist.params.lType === 'binomial') y = Math.pow(x, dist.params.k) * Math.pow(1 - x, dist.params.n - dist.params.k) * dist.params.scale;
                    else if (dist.params.lType === 'poisson') y = Math.pow(x, dist.params.k) * Math.exp(-dist.params.n * x) * dist.params.scale;
                    else if (dist.params.lType === 'exponential') y = Math.pow(x, dist.params.n) * Math.exp(-x * dist.params.sumX) * dist.params.scale;
                    else if (dist.params.lType === 'normal') y = normalPDF(x, dist.params.xBar, dist.params.sigma / Math.sqrt(dist.params.n)) * dist.params.scale;
                    break;
                  default: y = 0;
                }
                if (!isNaN(y) && isFinite(y) && y >= 0) {
                  points.push({ x, y });
                  if (y > maxY) maxY = y;
                }
              }
              data.push({ ...dist, points, isDiscrete });
            });
            return { data, maxY: maxY > 0 ? maxY * 1.15 : 1 }; 
          };

          const explorerData = useMemo(() => {
            return generateChartData(xAxisBounds.min, xAxisBounds.max, 400, distributions);
          }, [distributions, xAxisBounds]);

          const bayesianAnalysis = useMemo(() => {
            let domainMin = 0, domainMax = 1;
            let curves = [];
            let fisherInfo = 0;
            let posteriorPDF = null;
            let credibleInterval = [0, 1];
            let posteriorMean = 0;
            const { type, prior1, prior2, data1, data2, data3, ciLevel } = bayesState;
            const alphaLevel = (1 - ciLevel) / 2;

            if (type === 'beta-binomial' || type === 'jeffreys-binomial') {
              domainMax = 1;
              const postAlpha = prior1 + data2;
              const postBeta = prior2 + data1 - data2;
              const scaleFactor = gamma(data1 + 2) / (gamma(data2 + 1) * gamma(data1 - data2 + 1));

              posteriorPDF = (x) => betaPDF(x, postAlpha, postBeta);
              credibleInterval = [findQuantile(posteriorPDF, 0.001, 0.999, alphaLevel), findQuantile(posteriorPDF, 0.001, 0.999, 1 - alphaLevel)];
              posteriorMean = postAlpha / (postAlpha + postBeta);
              fisherInfo = data1 / (posteriorMean * (1 - posteriorMean));

              curves = [
                { type: 'beta', color: '#9ca3af', params: { alpha: prior1, beta: prior2 }, name: 'Prior', isDashed: true },
                { type: 'likelihood', color: '#f59e0b', params: { k: data2, n: data1, scale: scaleFactor, lType: 'binomial' }, name: 'Likelihood (Scaled)' },
                { type: 'beta', color: '#10b981', params: { alpha: postAlpha, beta: postBeta }, name: 'Posterior' }
              ];
            } else if (type === 'gamma-poisson') {
              const postAlpha = prior1 + data2;
              const postRate = prior2 + data1;
              posteriorMean = postAlpha / postRate;
              domainMax = Math.max(5, Math.ceil(posteriorMean + 4 * Math.sqrt(postAlpha) / postRate));
              const scaleFactor = Math.pow(data1, data2 + 1) / gamma(data2 + 1);

              posteriorPDF = (x) => gammaPDF(x, postAlpha, postRate);
              credibleInterval = [findQuantile(posteriorPDF, 0.001, domainMax, alphaLevel), findQuantile(posteriorPDF, 0.001, domainMax, 1 - alphaLevel)];
              fisherInfo = data1 / posteriorMean; 

              curves = [
                { type: 'gamma', color: '#9ca3af', params: { alpha: prior1, beta: prior2 }, name: 'Prior', isDashed: true },
                { type: 'likelihood', color: '#f59e0b', params: { k: data2, n: data1, scale: scaleFactor, lType: 'poisson' }, name: 'Likelihood (Scaled)' },
                { type: 'gamma', color: '#10b981', params: { alpha: postAlpha, beta: postRate }, name: 'Posterior' }
              ];
            } else if (type === 'gamma-exponential') {
              const postAlpha = prior1 + data1;
              const postRate = prior2 + data2;
              posteriorMean = postAlpha / postRate;
              domainMax = Math.max(5, Math.ceil(posteriorMean + 4 * Math.sqrt(postAlpha) / postRate));
              const scaleFactor = Math.pow(data2, data1 + 1) / gamma(data1 + 1);

              posteriorPDF = (x) => gammaPDF(x, postAlpha, postRate);
              credibleInterval = [findQuantile(posteriorPDF, 0.001, domainMax, alphaLevel), findQuantile(posteriorPDF, 0.001, domainMax, 1 - alphaLevel)];
              fisherInfo = data1 / (posteriorMean * posteriorMean);

              curves = [
                { type: 'gamma', color: '#9ca3af', params: { alpha: prior1, beta: prior2 }, name: 'Prior', isDashed: true },
                { type: 'likelihood', color: '#f59e0b', params: { n: data1, sumX: data2, scale: scaleFactor, lType: 'exponential' }, name: 'Likelihood (Scaled)' },
                { type: 'gamma', color: '#10b981', params: { alpha: postAlpha, beta: postRate }, name: 'Posterior' }
              ];
            } else if (type === 'normal-normal') {
              const postVar = 1 / ((1 / (prior2 * prior2)) + (data1 / (data3 * data3)));
              const postStd = Math.sqrt(postVar);
              posteriorMean = postVar * ((prior1 / (prior2 * prior2)) + ((data1 * data2) / (data3 * data3)));
              
              domainMin = Math.min(prior1 - 3*prior2, data2 - 3*(data3/Math.sqrt(data1)));
              domainMax = Math.max(prior1 + 3*prior2, data2 + 3*(data3/Math.sqrt(data1)));
              
              posteriorPDF = (x) => normalPDF(x, posteriorMean, postStd);
              const zScore = getZScore(ciLevel);
              credibleInterval = [posteriorMean - zScore * postStd, posteriorMean + zScore * postStd]; 
              fisherInfo = data1 / (data3 * data3);

              curves = [
                { type: 'normal', color: '#9ca3af', params: { mu: prior1, sigma: prior2 }, name: 'Prior', isDashed: true },
                { type: 'likelihood', color: '#f59e0b', params: { xBar: data2, n: data1, sigma: data3, scale: 1, lType: 'normal' }, name: 'Likelihood (Scaled)' },
                { type: 'normal', color: '#10b981', params: { mu: posteriorMean, sigma: postStd }, name: 'Posterior' }
              ];
            }

            const chartData = generateChartData(domainMin, domainMax, 300, curves);
            const testValue = posteriorPDF ? posteriorPDF(bayesState.testPoint) : 0;
            const isPlausible = bayesState.testPoint >= credibleInterval[0] && bayesState.testPoint <= credibleInterval[1];

            return { chartData, domainMin, domainMax, fisherInfo, credibleInterval, testValue, isPlausible, posteriorMean, curves };
          }, [bayesState]);

          const inferenceResults = useMemo(() => {
            const { testType, target1, target2, anovaTargets, hypoMean, knownVar1, knownVar2, tails, ciLevel } = testConfig;
            const s1 = inferenceSamples.find(s => s.id === parseInt(target1));
            const s2 = inferenceSamples.find(s => s.id === parseInt(target2));
            
            const getStats = (data) => {
              if (!data || data.length === 0) return { n: 0, mean: 0, var: 0, std: 0 };
              const n = data.length;
              const mean = data.reduce((a, b) => a + b, 0) / n;
              const variance = n > 1 ? data.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (n - 1) : 0;
              return { n, mean, var: variance, std: Math.sqrt(variance) };
            };

            const calcPValue = (stat, dist, df) => {
              let p = 0;
              if (dist === 'Z') {
                const cdf = normalCDF(stat);
                if (tails === 'two') p = 2 * Math.min(cdf, 1 - cdf);
                else if (tails === 'left') p = cdf;
                else if (tails === 'right') p = 1 - cdf;
              } else if (dist === 'T') {
                const cdf = tCDF(stat, df);
                if (tails === 'two') p = 2 * Math.min(cdf, 1 - cdf);
                else if (tails === 'left') p = cdf;
                else if (tails === 'right') p = 1 - cdf;
              } else if (dist === 'F') {
                p = 1 - fCDF(stat, df.d1, df.d2);
              }
              return p;
            };

            let result = { 
              statName: '', statVal: 0, pValue: 0, df: null, 
              baseEq: '', subEq: '', ciBase: '', ciSub: '', ci: [0,0], decision: '',
              anovaTable: null 
            };

            const alpha = 1 - ciLevel;
            const zCrit = getZScore(ciLevel);

            if (testType === '1_sample_z' && s1?.data.length > 0) {
              const { n, mean } = getStats(s1.data);
              const se = knownVar1 / Math.sqrt(n);
              const z = (mean - hypoMean) / se;
              result.statName = 'Z'; result.statVal = z; result.pValue = calcPValue(z, 'Z');
              result.baseEq = 'Z = (x̄ - μ₀) / (σ / √n)';
              result.subEq = `Z = (${fmt(mean)} - ${hypoMean}) / (${knownVar1} / √${n}) = ${fmt(z)}`;
              result.ciBase = 'CI = x̄ ± Z * (σ / √n)';
              result.ciSub = `CI = ${fmt(mean)} ± ${fmt(zCrit)} * (${knownVar1} / √${n})`;
              result.ci = [mean - zCrit * se, mean + zCrit * se];
            } 
            else if (testType === '1_sample_t' && s1?.data.length > 1) {
              const { n, mean, std } = getStats(s1.data);
              const se = std / Math.sqrt(n);
              const t = (mean - hypoMean) / se;
              const df = n - 1;
              const tCrit = getTCrit(ciLevel, df);
              result.statName = 't'; result.statVal = t; result.df = df; result.pValue = calcPValue(t, 'T', df);
              result.baseEq = 't = (x̄ - μ₀) / (s / √n)';
              result.subEq = `t = (${fmt(mean)} - ${hypoMean}) / (${fmt(std)} / √${n}) = ${fmt(t)}`;
              result.ciBase = 'CI = x̄ ± t * (s / √n)';
              result.ciSub = `CI = ${fmt(mean)} ± ${fmt(tCrit)} * (${fmt(std)} / √${n})`;
              result.ci = [mean - tCrit * se, mean + tCrit * se];
            }
            else if (testType === '2_sample_z' && s1?.data.length > 0 && s2?.data.length > 0) {
              const st1 = getStats(s1.data); const st2 = getStats(s2.data);
              const se = Math.sqrt((knownVar1*knownVar1)/st1.n + (knownVar2*knownVar2)/st2.n);
              const z = (st1.mean - st2.mean - hypoMean) / se;
              result.statName = 'Z'; result.statVal = z; result.pValue = calcPValue(z, 'Z');
              result.baseEq = 'Z = (x̄₁ - x̄₂ - d₀) / √(σ₁²/n₁ + σ₂²/n₂)';
              result.subEq = `Z = (${fmt(st1.mean)} - ${fmt(st2.mean)} - ${hypoMean}) / √(${knownVar1}²/${st1.n} + ${knownVar2}²/${st2.n}) = ${fmt(z)}`;
              result.ciBase = 'CI = (x̄₁ - x̄₂) ± Z * SE';
              result.ciSub = `CI = ${fmt(st1.mean - st2.mean)} ± ${fmt(zCrit)} * ${fmt(se)}`;
              result.ci = [(st1.mean - st2.mean) - zCrit * se, (st1.mean - st2.mean) + zCrit * se];
            }
            else if (testType === '2_sample_t_eq' && s1?.data.length > 1 && s2?.data.length > 1) {
              const st1 = getStats(s1.data); const st2 = getStats(s2.data);
              const df = st1.n + st2.n - 2;
              const sp2 = ((st1.n - 1)*st1.var + (st2.n - 1)*st2.var) / df;
              const sp = Math.sqrt(sp2);
              const se = sp * Math.sqrt(1/st1.n + 1/st2.n);
              const t = (st1.mean - st2.mean - hypoMean) / se;
              const tCrit = getTCrit(ciLevel, df);
              result.statName = 't'; result.statVal = t; result.df = df; result.pValue = calcPValue(t, 'T', df);
              result.baseEq = 't = (x̄₁ - x̄₂ - d₀) / (S_p √(1/n₁ + 1/n₂))';
              result.subEq = `t = (${fmt(st1.mean)} - ${fmt(st2.mean)} - ${hypoMean}) / (${fmt(sp)} √(1/${st1.n} + 1/${st2.n})) = ${fmt(t)}`;
              result.ciBase = 'CI = (x̄₁ - x̄₂) ± t * SE';
              result.ciSub = `CI = ${fmt(st1.mean - st2.mean)} ± ${fmt(tCrit)} * ${fmt(se)}`;
              result.ci = [(st1.mean - st2.mean) - tCrit * se, (st1.mean - st2.mean) + tCrit * se];
            }
            else if (testType === '2_sample_t_uneq' && s1?.data.length > 1 && s2?.data.length > 1) {
              const st1 = getStats(s1.data); const st2 = getStats(s2.data);
              const se = Math.sqrt(st1.var/st1.n + st2.var/st2.n);
              const t = (st1.mean - st2.mean - hypoMean) / se;
              const v1 = st1.var/st1.n; const v2 = st2.var/st2.n;
              const df = Math.pow(v1 + v2, 2) / (Math.pow(v1, 2)/(st1.n-1) + Math.pow(v2, 2)/(st2.n-1));
              const tCrit = getTCrit(ciLevel, df);
              result.statName = 't'; result.statVal = t; result.df = df; result.pValue = calcPValue(t, 'T', df);
              result.baseEq = "t = (x̄₁ - x̄₂ - d₀) / √(s₁²/n₁ + s₂²/n₂) [Welch's]";
              result.subEq = `t = (${fmt(st1.mean)} - ${fmt(st2.mean)} - ${hypoMean}) / √(${fmt(st1.var)}/${st1.n} + ${fmt(st2.var)}/${st2.n}) = ${fmt(t)}`;
              result.ciBase = 'CI = (x̄₁ - x̄₂) ± t * SE';
              result.ciSub = `CI = ${fmt(st1.mean - st2.mean)} ± ${fmt(tCrit)} * ${fmt(se)}`;
              result.ci = [(st1.mean - st2.mean) - tCrit * se, (st1.mean - st2.mean) + tCrit * se];
            }
            else if (testType === '1_sample_prop' && s1?.data.length > 0) {
              const n = s1.data.length;
              const successes = s1.data.filter(x => x > 0).length; 
              const pHat = successes / n;
              const p0 = hypoMean;
              const se = Math.sqrt((p0 * (1 - p0)) / n);
              const z = (pHat - p0) / se;
              result.statName = 'Z'; result.statVal = z; result.pValue = calcPValue(z, 'Z');
              result.baseEq = 'Z = (p̂ - p₀) / √( p₀(1-p₀)/n )';
              result.subEq = `Z = (${fmt(pHat)} - ${p0}) / √( ${p0}(${1-p0})/${n} ) = ${fmt(z)}`;
              const seCI = Math.sqrt((pHat * (1 - pHat)) / n);
              result.ciBase = 'CI = p̂ ± Z * √( p̂(1-p̂)/n )';
              result.ciSub = `CI = ${fmt(pHat)} ± ${fmt(zCrit)} * ${fmt(seCI)}`;
              result.ci = [pHat - zCrit * seCI, pHat + zCrit * seCI];
            }
            else if (testType === '2_sample_prop' && s1?.data.length > 0 && s2?.data.length > 0) {
              const n1 = s1.data.length; const succ1 = s1.data.filter(x => x > 0).length; const p1 = succ1/n1;
              const n2 = s2.data.length; const succ2 = s2.data.filter(x => x > 0).length; const p2 = succ2/n2;
              const pPool = (succ1 + succ2) / (n1 + n2);
              const se = Math.sqrt(pPool * (1 - pPool) * (1/n1 + 1/n2));
              const z = (p1 - p2) / se;
              result.statName = 'Z'; result.statVal = z; result.pValue = calcPValue(z, 'Z');
              result.baseEq = 'Z = (p̂₁ - p̂₂) / √( p_pool(1-p_pool)(1/n₁ + 1/n₂) )';
              result.subEq = `Z = (${fmt(p1)} - ${fmt(p2)}) / √( ${fmt(pPool)}(${fmt(1-pPool)})(1/${n1} + 1/${n2}) ) = ${fmt(z)}`;
              const seCI = Math.sqrt(p1*(1-p1)/n1 + p2*(1-p2)/n2);
              result.ciBase = 'CI = (p̂₁ - p̂₂) ± Z * SE';
              result.ciSub = `CI = ${fmt(p1 - p2)} ± ${fmt(zCrit)} * ${fmt(seCI)}`;
              result.ci = [(p1 - p2) - zCrit * seCI, (p1 - p2) + zCrit * seCI];
            }
            else if (testType === 'anova' && anovaTargets.length >= 3) {
              const selected = inferenceSamples.filter(s => anovaTargets.includes(s.id));
              const stats = selected.map(s => getStats(s.data));
              const k = stats.length;
              let N = 0, sumMean = 0;
              stats.forEach(st => { N += st.n; sumMean += st.mean * st.n; });
              const grandMean = sumMean / N;
              let sst = 0, sse = 0;
              stats.forEach(st => {
                sst += st.n * Math.pow(st.mean - grandMean, 2);
                sse += (st.n - 1) * st.var;
              });
              const dfT = k - 1;
              const dfE = N - k;
              const mst = sst / dfT;
              const mse = sse / dfE;
              const f = mst / mse;
              const ssTotal = sst + sse;
              const dfTotal = dfT + dfE;
              result.statName = 'F'; result.statVal = f; result.df = `${dfT}, ${dfE}`;
              result.pValue = calcPValue(f, 'F', {d1: dfT, d2: dfE});
              result.baseEq = 'F = MST / MSE';
              result.subEq = `F = ${fmt(mst)} / ${fmt(mse)} = ${fmt(f)}`;
              result.ciBase = 'N/A for ANOVA Omnibus';
              result.ciSub = '';
              result.ci = [NaN, NaN];
              result.anovaTable = { sst, sse, ssTotal, dfT, dfE, dfTotal, mst, mse, f, p: result.pValue };
            }

            if (result.pValue < alpha) result.decision = `Reject Null Hypothesis (Significant at ${fmt(alpha)})`;
            else result.decision = `Fail to Reject Null Hypothesis (Not Significant)`;

            return result;
          }, [testConfig, inferenceSamples]);

          // --- Plotter Component ---
          const Plotter = ({ chartData, domainMin, domainMax, xLabel }) => {
            const width = 800;
            const height = 400;
            const padding = 50;
            const innerWidth = width - padding * 2;
            const innerHeight = height - padding * 2;

            const maxY = yAxisConfig.auto ? chartData.maxY : yAxisConfig.max;
            const minY = yAxisConfig.auto ? 0 : yAxisConfig.min;

            const scaleX = (x) => padding + ((x - domainMin) / (domainMax - domainMin)) * innerWidth;
            const scaleY = (y) => height - padding - ((y - minY) / (maxY - minY)) * innerHeight;

            const gridLines = [];
            for (let i = 0; i <= 10; i++) {
                const xVal = domainMin + (domainMax - domainMin) * (i / 10);
                gridLines.push(
                    <g key={`grid-x-${i}`}>
                        <line x1={scaleX(xVal)} y1={padding} x2={scaleX(xVal)} y2={height - padding} stroke="#374151" strokeWidth="1" />
                        <text x={scaleX(xVal)} y={height - padding + 20} fill="#9ca3af" fontSize="12" textAnchor="middle">
                          {Math.abs(xVal) < 0.01 ? "0" : fmt(xVal)}
                        </text>
                    </g>
                );
            }

            if (yAxisConfig.show) {
              for (let i = 0; i <= 5; i++) {
                const yVal = minY + (maxY - minY) * (i / 5);
                gridLines.push(
                  <g key={`grid-y-${i}`}>
                    <line x1={padding} y1={scaleY(yVal)} x2={width - padding} y2={scaleY(yVal)} stroke="#374151" strokeWidth="1" strokeDasharray="4,4" />
                    <text x={padding - 10} y={scaleY(yVal) + 4} fill="#9ca3af" fontSize="12" textAnchor="end">{fmt(yVal)}</text>
                  </g>
                );
              }
            }

            return (
              <div className="relative w-full overflow-hidden bg-gray-900 rounded-xl border border-gray-700 shadow-2xl p-4">
                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                  {gridLines}
                  <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />
                  <text x={width / 2} y={height - 5} fill="#d1d5db" fontSize="14" textAnchor="middle">{xLabel}</text>
                  {yAxisConfig.show && <line x1={padding} y1={padding} x2={padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />}
                  
                  {activeTab === 'bayesian' && bayesianAnalysis.credibleInterval && (
                    <rect 
                      x={scaleX(bayesianAnalysis.credibleInterval[0])} 
                      y={padding} 
                      width={scaleX(bayesianAnalysis.credibleInterval[1]) - scaleX(bayesianAnalysis.credibleInterval[0])} 
                      height={innerHeight} 
                      fill="#10b981" opacity="0.1" 
                    />
                  )}

                  {chartData.data.map((dist, i) => {
                    if (dist.points.length === 0) return null;
                    if (dist.isDiscrete) {
                      return (
                        <g key={`discrete-${i}`}>
                          {dist.points.map((p, idx) => (
                            <g key={idx}>
                              <line x1={scaleX(p.x)} y1={scaleY(0)} x2={scaleX(p.x)} y2={scaleY(p.y)} stroke={dist.color} strokeWidth="3" strokeDasharray={dist.isDashed ? "5,5" : "none"} opacity={0.8} />
                              <circle cx={scaleX(p.x)} cy={scaleY(p.y)} r="4" fill={dist.color} />
                            </g>
                          ))}
                        </g>
                      );
                    } else {
                      const pathData = dist.points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${scaleX(p.x)} ${scaleY(Math.max(minY, Math.min(maxY, p.y)))}`).join(' ');
                      return <path key={`cont-${i}`} d={pathData} fill="none" stroke={dist.color} strokeWidth="3" strokeDasharray={dist.isDashed ? "5,5" : "none"} />;
                    }
                  })}

                  {activeTab === 'bayesian' && (
                    <circle cx={scaleX(bayesState.testPoint)} cy={scaleY(bayesianAnalysis.testValue)} r="6" fill="#ef4444" stroke="white" strokeWidth="2" />
                  )}
                </svg>

                <div className="absolute top-6 right-6 flex flex-col gap-2 bg-gray-800/90 p-3 rounded-lg border border-gray-700 backdrop-blur-sm">
                  {chartData.data.map((dist, i) => (
                    <div key={i} className="flex items-center gap-2">
                      <div className="w-4 h-1" style={{ backgroundColor: dist.color, borderBottom: dist.isDashed ? '2px dashed white' : 'none' }}></div>
                      <span className="text-gray-200 text-sm font-bold">{dist.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          };

          const getEquationTexts = (dist) => {
            const p = dist.params;
            let base = null, param = null;
            switch (dist.type) {
              case 'normal':
                base = <>f(x) = (1 / &sigma;&radic;(2&pi;)) e<sup>-&frac12; ((x-&mu;)/&sigma;)&sup2;</sup></>;
                param = <>f(x) = (1 / {fmt(p.sigma)}&radic;(2&pi;)) e<sup>-&frac12; ((x-{fmt(p.mu)})/{fmt(p.sigma)})&sup2;</sup></>;
                break;
              case 'beta':
                base = <>f(x) = [ x<sup>&alpha;-1</sup> (1-x)<sup>&beta;-1</sup> ] / B(&alpha;, &beta;)</>;
                param = <>f(x) = [ x<sup>{fmt(p.alpha - 1)}</sup> (1-x)<sup>{fmt(p.beta - 1)}</sup> ] / B({fmt(p.alpha)}, {fmt(p.beta)})</>;
                break;
              case 'gamma':
                base = <>f(x) = &beta;<sup>&alpha;</sup> x<sup>&alpha;-1</sup> e<sup>-&beta;x</sup> / &Gamma;(&alpha;)</>;
                param = <>f(x) = {fmt(p.beta)}<sup>{fmt(p.alpha)}</sup> x<sup>{fmt(p.alpha - 1)}</sup> e<sup>-{fmt(p.beta)}x</sup> / &Gamma;({fmt(p.alpha)})</>;
                break;
              case 'exponential':
                base = <>f(x) = &lambda; e<sup>-&lambda;x</sup></>;
                param = <>f(x) = {fmt(p.lambda)} e<sup>-{fmt(p.lambda)}x</sup></>;
                break;
              case 'uniform':
                base = <>f(x) = 1 / (b - a)</>;
                param = <>f(x) = 1 / ({fmt(p.b)} - {fmt(p.a)}) = {fmt(1 / (p.b - p.a))}</>;
                break;
              case 'laplace':
                base = <>f(x) = (1 / 2b) e<sup>-|x-&mu;|/b</sup></>;
                param = <>f(x) = (1 / {fmt(2 * p.b)}) e<sup>-|x-{fmt(p.mu)}|/{fmt(p.b)}</sup></>;
                break;
              case 'lognormal':
                base = <>f(x) = (1 / x&sigma;&radic;(2&pi;)) e<sup>-(ln(x)-&mu;)&sup2; / (2&sigma;&sup2;)</sup></>;
                param = <>f(x) = (1 / x({fmt(p.sigma)})&radic;(2&pi;)) e<sup>-(ln(x)-{fmt(p.mu)})&sup2; / (2({fmt(p.sigma)})&sup2;)</sup></>;
                break;
              case 'cauchy':
                base = <>f(x) = 1 / (&pi;&gamma;[1 + ((x-x₀)/&gamma;)&sup2;])</>;
                param = <>f(x) = 1 / (&pi;({fmt(p.gammaVal)})[1 + ((x-{fmt(p.x0)})/{fmt(p.gammaVal)})&sup2;])</>;
                break;
              case 'weibull':
                base = <>f(x) = (k/&lambda;) (x/&lambda;)<sup>k-1</sup> e<sup>-(x/&lambda;)<sup>k</sup></sup></>;
                param = <>f(x) = ({fmt(p.k)}/{fmt(p.lambda)}) (x/{fmt(p.lambda)})<sup>{fmt(p.k - 1)}</sup> e<sup>-(x/{fmt(p.lambda)})<sup>{fmt(p.k)}</sup></sup></>;
                break;
              case 'pareto':
                base = <>f(x) = (&alpha; x<sub>m</sub><sup>&alpha;</sup>) / x<sup>&alpha;+1</sup></>;
                param = <>f(x) = ({fmt(p.alpha)} &middot; {fmt(p.xm)}<sup>{fmt(p.alpha)}</sup>) / x<sup>{fmt(p.alpha + 1)}</sup></>;
                break;
              case 'logistic':
                base = <>f(x) = e<sup>-(x-&mu;)/s</sup> / (s(1 + e<sup>-(x-&mu;)/s</sup>)&sup2;)</>;
                param = <>f(x) = e<sup>-(x-{fmt(p.mu)})/{fmt(p.s)}</sup> / ({fmt(p.s)}(1 + e<sup>-(x-{fmt(p.mu)})/{fmt(p.s)}</sup>)&sup2;)</>;
                break;
              case 'rayleigh':
                base = <>f(x) = (x/&sigma;&sup2;) e<sup>-x&sup2;/(2&sigma;&sigma;)</sup></>;
                param = <>f(x) = (x/{fmt(p.sigma * p.sigma)}) e<sup>-x&sup2;/{fmt(2 * p.sigma * p.sigma)}</sup></>;
                break;
              case 'student_t':
                base = <>f(t) = C &middot; (1 + t&sup2;/&nu;)<sup>-(&nu;+1)/2</sup></>;
                param = <>f(t) = C &middot; (1 + t&sup2;/{fmt(p.nu)})<sup>-{fmt((p.nu + 1) / 2)}</sup></>;
                break;
              case 'f_dist':
                base = <>f(x) = C &middot; &radic;( (d<sub>1</sub>x)<sup>d<sub>1</sub></sup> d<sub>2</sub><sup>d<sub>2</sub></sup> / (d<sub>1</sub>x + d<sub>2</sub>)<sup>d<sub>1</sub>+d<sub>2</sub></sup> ) / x</>;
                param = <>f(x) = C &middot; &radic;( ({fmt(p.d1)}x)<sup>{fmt(p.d1)}</sup> {fmt(p.d2)}<sup>{fmt(p.d2)}</sup> / ({fmt(p.d1)}x + {fmt(p.d2)})<sup>{fmt(p.d1 + p.d2)}</sup> ) / x</>;
                break;
              case 'chisquare':
                base = <>f(x) = C &middot; x<sup>k/2 - 1</sup> e<sup>-x/2</sup></>;
                param = <>f(x) = C &middot; x<sup>{fmt(p.k / 2 - 1)}</sup> e<sup>-x/2</sup></>;
                break;
              case 'poisson':
                base = <>P(X=x) = &lambda;<sup>x</sup> e<sup>-&lambda;</sup> / x!</>;
                param = <>P(X=x) = {fmt(p.lambda)}<sup>x</sup> e<sup>-{fmt(p.lambda)}</sup> / x!</>;
                break;
              case 'binomial':
                base = <>P(X=x) = C(n, x) p<sup>x</sup> (1-p)<sup>n-x</sup></>;
                param = <>P(X=x) = C({fmt(p.n)}, x) {fmt(p.p)}<sup>x</sup> {fmt(1 - p.p)}<sup>{fmt(p.n)}-x</sup></>;
                break;
              case 'bernoulli':
                base = <>P(X=x) = p<sup>x</sup> (1-p)<sup>1-x</sup></>;
                param = <>P(X=x) = {fmt(p.p)}<sup>x</sup> {fmt(1 - p.p)}<sup>1-x</sup></>;
                break;
              case 'geometric':
                base = <>P(X=x) = p(1-p)<sup>x-1</sup></>;
                param = <>P(X=x) = {fmt(p.p)}({fmt(1 - p.p)})<sup>x-1</sup></>;
                break;
              case 'negative_binomial':
                base = <>P(X=x) = C(x-1, r-1) p<sup>r</sup> (1-p)<sup>x-r</sup></>;
                param = <>P(X=x) = C(x-1, {fmt(p.r - 1)}) {fmt(p.p)}<sup>{fmt(p.r)}</sup> {fmt(1 - p.p)}<sup>x-{fmt(p.r)}</sup></>;
                break;
              case 'hypergeometric':
                base = <>P(X=x) = [C(K,x) C(N-K, n-x)] / C(N,n)</>;
                param = <>P(X=x) = [C({fmt(p.K)},x) C({fmt(p.N - p.K)}, {fmt(p.n)}-x)] / C({fmt(p.N)},{fmt(p.n)})</>;
                break;
              case 'discrete_uniform':
                base = <>P(X=x) = 1 / (b - a + 1)</>;
                param = <>P(X=x) = 1 / ({fmt(p.b)} - {fmt(p.a)} + 1) = {fmt(1 / (p.b - p.a + 1))}</>;
                break;
              case 'likelihood':
              case 'likelihood_discrete':
                if (p.lType === 'binomial') {
                  base = <>L(p|data) &prop; p<sup>k</sup> (1-p)<sup>n-k</sup></>;
                  param = <>L(p) &prop; p<sup>{fmt(p.k)}</sup> (1-p)<sup>{fmt(p.n - p.k)}</sup></>;
                } else if (p.lType === 'poisson') {
                  base = <>L(&lambda;|data) &prop; &lambda;<sup>&Sigma;x</sup> e<sup>-n&lambda;</sup></>;
                  param = <>L(&lambda;) &prop; &lambda;<sup>{fmt(p.k)}</sup> e<sup>-{fmt(p.n)}&lambda;</sup></>;
                } else if (p.lType === 'exponential') {
                  base = <>L(&lambda;|data) &prop; &lambda;<sup>n</sup> e<sup>-&lambda;&Sigma;x</sup></>;
                  param = <>L(&lambda;) &prop; &lambda;<sup>{fmt(p.n)}</sup> e<sup>-{fmt(p.sumX)}&lambda;</sup></>;
                } else if (p.lType === 'normal') {
                  base = <>L(&mu;|data) &prop; e<sup>-(n/2&sigma;&sup2;) (x̄-&mu;)&sup2;</sup></>;
                  param = <>L(&mu;) &prop; e<sup>-({fmt(p.n)} / 2({fmt(p.sigma)})&sup2;) ({fmt(p.xBar)} - &mu;)&sup2;</sup></>;
                }
                break;
              default:
                base = <>Equation not available</>;
                param = <>N/A</>;
            }
            return { base, param };
          };

          const EquationsTable = () => {
            if (activeTab === 'inference') return null;
            const distsToRender = activeTab === 'bayesian' ? bayesianAnalysis.curves : distributions;
            return (
              <div className="mt-8 bg-gray-900 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
                <div className="bg-gray-800 p-4 border-b border-gray-700">
                  <h2 className="text-xl font-bold text-blue-400">Mathematical Equations</h2>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm text-gray-300">
                    <thead className="bg-gray-800/50 text-gray-400">
                      <tr>
                        <th className="p-4 font-semibold w-1/4">Distribution / Curve</th>
                        <th className="p-4 font-semibold w-1/3">Base Equation</th>
                        <th className="p-4 font-semibold">Parameterized Equation</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-800">
                      {distsToRender.map((dist, idx) => {
                        const { base, param } = getEquationTexts(dist);
                        return (
                          <tr key={idx} className="hover:bg-gray-800/20 transition-colors">
                            <td className="p-4 font-medium flex items-center gap-2">
                              <span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: dist.color}}></span>
                              <span>{dist.name}</span>
                            </td>
                            <td className="p-4 font-serif text-base md:text-lg tracking-wider italic text-pink-300">{base}</td>
                            <td className="p-4 font-serif text-base md:text-lg tracking-wider italic text-emerald-300">{param}</td>
                          </tr>
                        );
                      })}
                      {distsToRender.length === 0 && (
                        <tr><td colSpan="3" className="p-4 text-center text-gray-500">No distributions active.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const renderDistributionParams = (dist) => {
            const p = dist.params;
            const update = (name, val) => updateDistParam(dist.id, name, val);
            switch (dist.type) {
              case 'normal': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Mean (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Std Dev (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'student_t': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>df (ν)</span> <span>{fmt(p.nu)}</span></label><input type="range" min="1" max="30" step="1" value={p.nu} onChange={(e) => update('nu', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'f_dist': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Num df (d1)</span> <span>{fmt(p.d1)}</span></label><input type="range" min="1" max="30" step="1" value={p.d1} onChange={(e) => update('d1', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Denom df (d2)</span> <span>{fmt(p.d2)}</span></label><input type="range" min="1" max="30" step="1" value={p.d2} onChange={(e) => update('d2', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'beta': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Alpha (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Beta (β)</span> <span>{fmt(p.beta)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={p.beta} onChange={(e) => update('beta', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'gamma': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="10" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Rate (β)</span> <span>{fmt(p.beta)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.beta} onChange={(e) => update('beta', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'exponential': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Rate (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'uniform': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Min (a)</span> <span>{fmt(p.a)}</span></label><input type="range" min="-10" max="10" step="1" value={p.a} onChange={(e) => update('a', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Max (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="-10" max="10" step="1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'laplace': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Location (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'cauchy': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Location (x₀)</span> <span>{fmt(p.x0)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.x0} onChange={(e) => update('x0', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (γ)</span> <span>{fmt(p.gammaVal)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.gammaVal} onChange={(e) => update('gammaVal', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'lognormal': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Log-Mean (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-5" max="5" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Log-Std (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="3" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'weibull': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (k)</span> <span>{fmt(p.k)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.k} onChange={(e) => update('k', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'pareto': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Min (xm)</span> <span>{fmt(p.xm)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.xm} onChange={(e) => update('xm', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'logistic': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Location (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (s)</span> <span>{fmt(p.s)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.s} onChange={(e) => update('s', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'rayleigh': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Scale (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'chisquare': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>df (k)</span> <span>{fmt(p.k)}</span></label><input type="range" min="1" max="20" step="1" value={p.k} onChange={(e) => update('k', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'poisson': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Rate (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="1" max="30" step="1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'binomial': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Trials (n)</span> <span>{fmt(p.n)}</span></label><input type="range" min="1" max="50" step="1" value={p.n} onChange={(e) => update('n', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0" max="1" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'bernoulli': case 'geometric': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0.05" max="1" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'negative_binomial': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Successes (r)</span> <span>{fmt(p.r)}</span></label><input type="range" min="1" max="20" step="1" value={p.r} onChange={(e) => update('r', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0.05" max="0.95" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'hypergeometric': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Pop (N)</span> <span>{fmt(p.N)}</span></label><input type="range" min="1" max="100" step="1" value={p.N} onChange={(e) => { update('N', e.target.value); if (p.K > e.target.value) update('K', e.target.value); if (p.n > e.target.value) update('n', e.target.value); }} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Succ in Pop (K)</span> <span>{fmt(p.K)}</span></label><input type="range" min="0" max={p.N} step="1" value={p.K} onChange={(e) => update('K', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sample (n)</span> <span>{fmt(p.n)}</span></label><input type="range" min="1" max={p.N} step="1" value={p.n} onChange={(e) => update('n', e.target.value)} className="w-full accent-blue-500" /></>
              );
              case 'discrete_uniform': return (
                <><label className="text-sm text-gray-400 flex justify-between"><span>Min (a)</span> <span>{fmt(p.a)}</span></label><input type="range" min="-10" max="10" step="1" value={p.a} onChange={(e) => update('a', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Max (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="-10" max="20" step="1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></>
              );
              default: return null;
            }
          };

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans p-6" dir="ltr">
              {infoModal && (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                  <div className="bg-gray-900 border border-blue-500/30 rounded-2xl max-w-2xl w-full p-6 shadow-2xl relative">
                    <button onClick={() => setInfoModal(null)} className="absolute top-4 left-4 text-gray-400 hover:text-white text-2xl">&times;</button>
                    <h2 className="text-3xl font-bold text-blue-400 mb-4">{DIST_INFO[infoModal]?.name || 'Statistical Info'}</h2>
                    <div className="space-y-4 text-gray-300">
                      <p><strong className="text-white">Description:</strong> {DIST_INFO[infoModal]?.desc}</p>
                      <p><strong className="text-white">Parameters/Assumptions:</strong> {DIST_INFO[infoModal]?.params}</p>
                      <div className="bg-gray-950 p-3 rounded font-mono text-pink-400 text-left" dir="ltr">{DIST_INFO[infoModal]?.formula}</div>
                      <p><strong className="text-white">Common Uses:</strong> {DIST_INFO[infoModal]?.uses}</p>
                      <p className="text-sm text-gray-400 italic border-t border-gray-700 pt-2">Notes: {DIST_INFO[infoModal]?.notes}</p>
                    </div>
                  </div>
                </div>
              )}

              <div className="max-w-7xl mx-auto">
                <header className="mb-8 text-center">
                  <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-2">
                    Advanced Statistics & Inference Lab
                  </h1>
                  <p className="text-gray-400">Perform rigorous statistical tests, explore distributions, and update beliefs dynamically.</p>
                </header>

                <div className="flex flex-wrap justify-center gap-4 mb-8">
                  <button onClick={() => setActiveTab('explorer')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'explorer' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Distributions Explorer</button>
                  <button onClick={() => setActiveTab('inference')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'inference' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Applied Inference & Testing</button>
                  <button onClick={() => setActiveTab('bayesian')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'bayesian' ? 'bg-pink-600 text-white shadow-lg shadow-pink-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Bayesian Inference</button>
                </div>

                {activeTab === 'explorer' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                      <Plotter chartData={explorerData} domainMin={xAxisBounds.min} domainMax={xAxisBounds.max} xLabel="Variable Value (X / t / F)" />
                      <div className="flex flex-wrap gap-4 bg-gray-900 p-4 rounded-xl border border-gray-800 justify-center items-center text-sm">
                        <div className="flex items-center gap-2">
