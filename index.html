                  <button onClick={() => setActiveTab('clt')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'clt' ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>CLT Simulator</button>
                  <button onClick={() => setActiveTab('power')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'power' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Power & Errors</button>
                  <button onClick={() => setActiveTab('inference')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'inference' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Applied Inference</button>
                  <button onClick={() => setActiveTab('bayesian')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'bayesian' ? 'bg-pink-600 text-white shadow-lg shadow-pink-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Bayesian Inference</button>
                </div>

                {/* --- TAB: ADVANCED REGRESSION LAB --- */}
                {activeTab === 'regression' && (() => {
                    const regResults = calculateAdvancedRegression(regressionPoints, regConfig.type, regConfig.ciLevel);
                    const plotWidth = 800;
                    const plotHeight = 400;
                    const padding = 50;
                    const innerW = plotWidth - padding * 2;
                    const innerH = plotHeight - padding * 2;
                    
                    const minX = parseFloat(regConfig.xMin) || 0;
                    const maxX = parseFloat(regConfig.xMax) || 10;
                    const minY = parseFloat(regConfig.yMin) || 0;
                    const maxY = parseFloat(regConfig.yMax) || 15;
                    
                    const scaleX = (x) => padding + ((x - minX) / (maxX - minX)) * innerW;
                    const scaleY = (y) => plotHeight - padding - ((y - minY) / (maxY - minY)) * innerH;
                    const unscaleX = (sx) => minX + ((sx - padding) / innerW) * (maxX - minX);
                    const unscaleY = (sy) => minY + ((plotHeight - padding - sy) / innerH) * (maxY - minY);
                    
                    const handleSvgClick = (e) => {
                        if (draggingPoint) return;
                        const svg = e.currentTarget;
                        const pt = svg.createSVGPoint();
                        pt.x = e.clientX; pt.y = e.clientY;
                        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                        const newX = unscaleX(svgP.x); const newY = unscaleY(svgP.y);
                        
                        if(newX >= minX && newX <= maxX && newY >= minY && newY <= maxY) {
                             const newId = regressionPoints.length > 0 ? Math.max(...regressionPoints.map(p => p.id)) + 1 : 1;
                             setRegressionPoints([...regressionPoints, { id: newId, x: newX, y: newY }]);
                        }
                    };

                    const handleMouseDown = (e, id) => { e.stopPropagation(); setDraggingPoint(id); };
                    const handleMouseMove = (e) => {
                        if (!draggingPoint) return;
                        const svg = e.currentTarget;
                        const pt = svg.createSVGPoint();
                        pt.x = e.clientX; pt.y = e.clientY;
                        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                        let newX = unscaleX(svgP.x); let newY = unscaleY(svgP.y);
                        newX = Math.max(minX, Math.min(maxX, newX)); newY = Math.max(minY, Math.min(maxY, newY));
                        setRegressionPoints(prev => prev.map(p => p.id === draggingPoint ? { ...p, x: newX, y: newY } : p));
                    };
                    const handleMouseUp = () => setDraggingPoint(null);
                    const handleDoubleClick = (e, id) => {
                        e.stopPropagation(); setRegressionPoints(prev => prev.filter(p => p.id !== id));
                    };

                    const gridLines = [];
                    for (let i = 0; i <= 10; i++) {
                        const xVal = minX + (maxX - minX) * (i / 10);
                        const yVal = minY + (maxY - minY) * (i / 10);
                        gridLines.push(<g key={`rgx-${i}`}><line x1={scaleX(xVal)} y1={padding} x2={scaleX(xVal)} y2={plotHeight - padding} stroke="#374151" /><text x={scaleX(xVal)} y={plotHeight - padding + 20} fill="#9ca3af" fontSize="12" textAnchor="middle">{xVal.toFixed(1)}</text></g>);
                        gridLines.push(<g key={`rgy-${i}`}><line x1={padding} y1={scaleY(yVal)} x2={plotWidth - padding} y2={scaleY(yVal)} stroke="#374151" strokeDasharray="4,4" /><text x={padding - 10} y={scaleY(yVal) + 4} fill="#9ca3af" fontSize="12" textAnchor="end">{yVal.toFixed(1)}</text></g>);
                    }

                    // --- Calculate Curve and CI Bands ---
                    let curvePath = "";
                    let ciPath = "";
                    if (regResults) {
                        const steps = 150;
                        const stepX = (maxX - minX) / steps;
                        const curvePts = [];
                        const ciUpper = [];
                        const ciLower = [];
                        
                        for (let i = 0; i <= steps; i++) {
                            const x = minX + i * stepX;
                            if (regConfig.type === 'logarithmic' && x <= 0) continue; 
                            
                            const yP = regResults.predict(x);
                            curvePts.push({ x, y: yP });
                            
                            if (regConfig.showCI) {
                                const ci = regResults.getCI(x);
                                ciUpper.push({ x, y: ci.upper });
                                ciLower.push({ x, y: ci.lower });
                            }
                        }
                        
                        if(curvePts.length > 0) {
                            curvePath = curvePts.map((p, i) => `${i===0?'M':'L'} ${scaleX(p.x)} ${scaleY(Math.max(minY, Math.min(maxY, p.y)))}`).join(' ');
                        }
                        
                        if (regConfig.showCI && ciUpper.length > 0) {
                            const upperStr = ciUpper.map((p, i) => `${i===0?'M':'L'} ${scaleX(p.x)} ${scaleY(Math.max(minY, Math.min(maxY, p.y)))}`).join(' ');
                            const lowerStr = ciLower.reverse().map(p => `L ${scaleX(p.x)} ${scaleY(Math.max(minY, Math.min(maxY, p.y)))}`).join(' ');
                            ciPath = `${upperStr} ${lowerStr} Z`;
                        }
                    }

                    return (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-8 space-y-6">
                                <div className="bg-gray-900 p-6 rounded-xl border border-teal-500/30 shadow-xl select-none">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-bold text-teal-400 flex items-center gap-2">Interactive Advanced Regression</h2>
                                        <span className="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded">Click: Add | Drag: Move | Dbl-Click: Remove</span>
                                    </div>
                                    
                                    {/* Control panel for dynamic axes */}
                                    <div className="flex flex-wrap gap-4 mb-4 bg-gray-950 p-3 rounded-lg border border-gray-800 text-sm justify-center items-center">
                                        <div className="flex gap-2 items-center">
                                            <span className="text-gray-400">X-Axis:</span>
                                            <input type="number" value={regConfig.xMin} onChange={e => setRegConfig({...regConfig, xMin: e.target.value})} className="w-16 bg-gray-800 text-white p-1 rounded text-center border border-gray-600 focus:border-teal-500" />
                                            <span>to</span>
                                            <input type="number" value={regConfig.xMax} onChange={e => setRegConfig({...regConfig, xMax: e.target.value})} className="w-16 bg-gray-800 text-white p-1 rounded text-center border border-gray-600 focus:border-teal-500" />
                                        </div>
                                        <div className="w-px h-6 bg-gray-700 hidden md:block"></div>
                                        <div className="flex gap-2 items-center">
                                            <span className="text-gray-400">Y-Axis:</span>
                                            <input type="number" value={regConfig.yMin} onChange={e => setRegConfig({...regConfig, yMin: e.target.value})} className="w-16 bg-gray-800 text-white p-1 rounded text-center border border-gray-600 focus:border-teal-500" />
                                            <span>to</span>
                                            <input type="number" value={regConfig.yMax} onChange={e => setRegConfig({...regConfig, yMax: e.target.value})} className="w-16 bg-gray-800 text-white p-1 rounded text-center border border-gray-600 focus:border-teal-500" />
                                        </div>
                                    </div>

                                    <div className="relative w-full overflow-hidden bg-gray-950 rounded-xl border border-gray-700">
                                        <svg 
                                            viewBox={`0 0 ${plotWidth} ${plotHeight}`} 
                                            className={`w-full h-auto ${draggingPoint ? 'cursor-grabbing' : 'cursor-crosshair'}`}
                                            onClick={handleSvgClick} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
                                        >
                                            {gridLines}
                                            <line x1={padding} y1={plotHeight - padding} x2={plotWidth - padding} y2={plotHeight - padding} stroke="#6b7280" strokeWidth="2" />
                                            <line x1={padding} y1={padding} x2={padding} y2={plotHeight - padding} stroke="#6b7280" strokeWidth="2" />
                                            <text x={plotWidth / 2} y={plotHeight - 10} fill="#d1d5db" fontSize="14" textAnchor="middle">Independent Variable (X)</text>
                                            <text x={15} y={plotHeight / 2} fill="#d1d5db" fontSize="14" textAnchor="middle" transform={`rotate(-90 15 ${plotHeight/2})`}>Dependent Variable (Y)</text>

                                            {/* Confidence Interval Band */}
                                            {regResults && regConfig.showCI && ciPath && (
                                                <path d={ciPath} fill="#14b8a6" opacity="0.15" />
                                            )}

                                            {/* Regression Curve */}
                                            {regResults && curvePath && (
                                                <path d={curvePath} fill="none" stroke="#14b8a6" strokeWidth="3" className="transition-all duration-75" />
                                            )}

                                            {/* Residual Lines */}
                                            {regResults && regressionPoints.map(p => {
                                                if(regConfig.type === 'logarithmic' && p.x <= 0) return null;
                                                const yPred = regResults.predict(p.x);
                                                return <line key={`err-${p.id}`} x1={scaleX(p.x)} y1={scaleY(p.y)} x2={scaleX(p.x)} y2={scaleY(yPred)} stroke="#ef4444" strokeWidth="1.5" strokeDasharray="3,3" opacity="0.6" />;
                                            })}

                                            {/* Data Points */}
                                            {regressionPoints.map(p => (
                                                <circle 
                                                    key={p.id} cx={scaleX(p.x)} cy={scaleY(p.y)} r={p.id === draggingPoint ? "8" : "6"} 
                                                    fill={p.id === draggingPoint ? "#f59e0b" : "#3b82f6"} stroke="#fff" strokeWidth="2"
                                                    onMouseDown={(e) => handleMouseDown(e, p.id)} onDoubleClick={(e) => handleDoubleClick(e, p.id)}
                                                    className="cursor-grab transition-colors duration-150"
                                                />
                                            ))}
                                        </svg>
                                    </div>
                                    
                                    <div className="flex justify-between items-center mt-4">
                                        <button onClick={() => setRegressionPoints([])} className="text-sm text-red-400 hover:text-red-300 bg-gray-800 px-3 py-1 rounded">Clear Points</button>
                                        <button onClick={() => setRegressionPoints([{ id: 1, x: 1, y: 2 }, { id: 2, x: 2, y: 4 }, { id: 3, x: 3, y: 5 }, { id: 4, x: 4, y: 4 }, { id: 5, x: 5, y: 7 }, { id: 6, x: 6, y: 8 }, { id: 7, x: 7, y: 7 }, { id: 8, x: 8, y: 9 }, { id: 9, x: 9, y: 11 }])} className="text-sm text-teal-400 hover:text-teal-300 bg-gray-800 px-3 py-1 rounded">Reset Default</button>
                                    </div>
                                </div>

                                {/* Diagnostics Panel: QQ Plot and Residuals */}
                                <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl mt-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-bold text-gray-300">Model Diagnostics</h3>
                                        <div className="bg-gray-800 rounded p-1 flex text-sm">
                                            <button onClick={() => setRegConfig({...regConfig, diagView: 'residuals'})} className={`px-4 py-1 rounded ${regConfig.diagView==='residuals'?'bg-teal-600 text-white':'text-gray-400 hover:text-white'}`}>Residuals</button>
                                            <button onClick={() => setRegConfig({...regConfig, diagView: 'qq'})} className={`px-4 py-1 rounded ${regConfig.diagView==='qq'?'bg-teal-600 text-white':'text-gray-400 hover:text-white'}`}>Normality (Q-Q)</button>
                                        </div>
                                    </div>

                                    <div className="relative w-full h-56 bg-gray-950 rounded-xl border border-gray-700 p-4 overflow-hidden">
                                        {/* Residuals View */}
                                        {regResults && regConfig.diagView === 'residuals' && (
                                            <svg viewBox={`0 0 ${plotWidth} 180`} className="w-full h-full">
                                                <line x1={padding} y1={90} x2={plotWidth - padding} y2={90} stroke="#14b8a6" strokeWidth="2" strokeDasharray="5,5" />
                                                <text x={padding - 10} y={90 + 4} fill="#9ca3af" fontSize="12" textAnchor="end">0</text>
                                                {(() => {
                                                    const maxRes = Math.max(0.1, ...regResults.residuals.map(r => Math.abs(r.y)));
                                                    const resScaleY = (y) => 90 - (y / maxRes) * 70;
                                                    return regResults.residuals.map((r, i) => (
                                                        <g key={`res-${i}`}>
                                                            <line x1={scaleX(r.x)} y1={90} x2={scaleX(r.x)} y2={resScaleY(r.y)} stroke="#ef4444" strokeWidth="2" opacity="0.7" />
                                                            <circle cx={scaleX(r.x)} cy={resScaleY(r.y)} r="5" fill="#ef4444" />
                                                        </g>
                                                    ));
                                                })()}
                                            </svg>
                                        )}

                                        {/* Q-Q Plot and Normality Test View */}
                                        {regResults && regConfig.diagView === 'qq' && (
                                            <div className="w-full h-full flex">
                                                <div className="flex-1 relative">
                                                    <svg viewBox="0 0 400 200" className="w-full h-full">
                                                        {(() => {
                                                            const maxR = Math.max(0.1, ...regResults.qqPoints.map(p=>Math.abs(p.res)));
                                                            const scZ = (z) => 200 + (z / 3) * 150;
                                                            const scR = (r) => 100 - (r / maxR) * 80;
                                                            return (
                                                                <>
                                                                    <line x1={200} y1={20} x2={200} y2={180} stroke="#374151" />
                                                                    <line x1={50} y1={100} x2={350} y2={100} stroke="#374151" />
                                                                    <text x={200} y={195} fill="#9ca3af" fontSize="10" textAnchor="middle">Theoretical Quantiles (Z)</text>
                                                                    
                                                                    {/* Reference Line */}
                                                                    <line x1={scZ(-2.5)} y1={scR(-2.5*regResults.stdRes)} x2={scZ(2.5)} y2={scR(2.5*regResults.stdRes)} stroke="#14b8a6" strokeWidth="2" strokeDasharray="4,4" opacity="0.5"/>
                                                                    
                                                                    {/* Q-Q Points */}
                                                                    {regResults.qqPoints.map((p,i) => (
                                                                        <circle key={`qq-${i}`} cx={scZ(p.z)} cy={scR(p.res)} r="4" fill="#8b5cf6" />
                                                                    ))}
                                                                </>
                                                            );
                                                        })()}
                                                    </svg>
                                                </div>
                                                <div className="w-64 border-l border-gray-700 pl-4 flex flex-col justify-center text-sm">
                                                    <div className="font-bold text-gray-300 mb-2 border-b border-gray-700 pb-1">Ryan-Joiner Test (Shapiro Proxy)</div>
                                                    <div className="flex justify-between text-gray-400 mb-1"><span>Test Statistic (R):</span><span className="text-white font-mono">{regResults.rjCorrel.toFixed(4)}</span></div>
                                                    <div className="flex justify-between text-gray-400 mb-4"><span>Status:</span>
                                                        {regResults.isNormal ? <span className="text-emerald-400 font-bold">Normal ✓</span> : <span className="text-red-400 font-bold">Non-Normal ✗</span>}
                                                    </div>
                                                    <p className="text-[10px] text-gray-500">Points following the straight line indicate normally distributed residuals. Essential for valid Confidence Intervals.</p>
                                                </div>
                                            </div>
                                        )}
                                        {!regResults && <div className="flex h-full items-center justify-center text-gray-600">Need at least 3 points</div>}
                                    </div>
                                </div>
                            </div>

                            {/* Configuration and Metrics Panel */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-gray-900 p-6 rounded-xl border border-teal-500/30 shadow-xl">
                                    <h2 className="text-xl font-bold text-teal-400 mb-4 border-b border-gray-800 pb-2">Regression Configuration</h2>
                                    
                                    <div className="space-y-4 mb-6">
                                        <div>
                                            <label className="text-xs text-gray-400 block mb-1">Regression Model Type</label>
                                            <select value={regConfig.type} onChange={e => setRegConfig({...regConfig, type: e.target.value})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:border-teal-500 outline-none">
                                                <option value="linear">Linear ( y = ax + b )</option>
                                                <option value="quadratic">Quadratic ( y = ax² + bx + c )</option>
                                                <option value="exponential">Exponential ( y = a e^(bx) )</option>
                                                <option value="logarithmic">Logarithmic ( y = a + b ln(x) )</option>
                                            </select>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs text-gray-400 block mb-1">Confidence Bounds</label>
                                                <select value={regConfig.ciLevel} onChange={e => setRegConfig({...regConfig, ciLevel: parseFloat(e.target.value)})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:border-teal-500 outline-none">
                                                    <option value={0.90}>90% CI</option>
                                                    <option value={0.95}>95% CI</option>
                                                    <option value={0.99}>99% CI</option>
                                                </select>
                                            </div>
                                            <div className="flex items-end pb-2">
                                                <label className="flex items-center gap-2 cursor-pointer bg-gray-800 p-2 rounded w-full justify-center border border-gray-700">
                                                    <input type="checkbox" checked={regConfig.showCI} onChange={e => setRegConfig({...regConfig, showCI: e.target.checked})} className="accent-teal-500 w-4 h-4" />
                                                    <span className="text-sm text-gray-300">Draw Area</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <h2 className="text-xl font-bold text-teal-400 mb-4 border-b border-gray-800 pb-2">Model Metrics</h2>
                                    {regResults ? (
                                        <div className="space-y-4">
                                            <div className="bg-gray-800 p-4 rounded-lg text-center">
                                                <div className="text-xs text-gray-400 mb-1 uppercase font-bold">Fitted Equation</div>
                                                <div className="text-lg font-serif text-teal-300" style={{ direction: 'ltr' }}>
                                                    {regResults.equation}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-gray-800 p-3 rounded-lg border-t-2 border-emerald-500 text-center">
                                                    <div className="text-xs text-gray-400 mb-1" title="Coefficient of Determination">R-Squared (R²)</div>
                                                    <div className="text-2xl font-mono font-bold text-emerald-400">{regResults.rSquared.toFixed(4)}</div>
                                                </div>
                                                <div className="bg-gray-800 p-3 rounded-lg border-t-2 border-red-500 text-center">
                                                    <div className="text-xs text-gray-400 mb-1" title="Mean Squared Error">MSE</div>
                                                    <div className="text-2xl font-mono font-bold text-red-400">{regResults.mse.toFixed(2)}</div>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-gray-800 p-4 rounded-lg mt-4 text-sm text-gray-300">
                                                <p className="mb-2"><strong className="text-emerald-400">Analysis:</strong></p>
                                                <p className="text-xs">
                                                    The {regConfig.type} model explains <strong>{(regResults.rSquared * 100).toFixed(1)}%</strong> of the variance in Y.
                                                    {regResults.rSquared > 0.8 ? " This is an excellent fit." : regResults.rSquared > 0.5 ? " This is a moderate fit." : " This is a poor fit."}
                                                </p>
                                                {!regResults.isNormal && (
                                                    <p className="text-[11px] text-red-400 mt-2 font-bold leading-tight">⚠️ Warning: Residuals are not normally distributed (via Ryan-Joiner test). Confidence intervals may be inaccurate.</p>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-gray-500 text-center py-8">Add at least 3 points to calculate regression.</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                })()}

                {/* --- TAB: EXPLORER --- */}
                {activeTab === 'explorer' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                      <Plotter chartData={explorerData} domainMin={safeXMin} domainMax={safeXMax} xLabel="Variable Value (X)" yConfig={yAxisConfig} />
                      <div className="flex flex-wrap gap-4 bg-gray-900 p-4 rounded-xl border border-gray-800 justify-center items-center text-sm">
                        <span className="text-gray-400">X-Axis:</span>
                        <input type="number" value={xAxisBounds.min} onChange={e => setXAxisBounds({ ...xAxisBounds, min: e.target.value })} className="w-20 bg-gray-800 text-white p-1 border border-gray-700 text-center" />
                        <span>to</span>
                        <input type="number" value={xAxisBounds.max} onChange={e => setXAxisBounds({ ...xAxisBounds, max: e.target.value })} className="w-20 bg-gray-800 text-white p-1 border border-gray-700 text-center" />
                        <div className="w-px h-6 bg-gray-700 hidden md:block"></div>
                        <label className="flex items-center gap-1 cursor-pointer"><input type="checkbox" checked={yAxisConfig.show} onChange={e => setYAxisConfig({...yAxisConfig, show: e.target.checked})} className="accent-blue-500" /><span className="text-gray-400">Show Y</span></label>
                        <select value={yAxisConfig.auto ? 'auto' : 'manual'} onChange={e => setYAxisConfig({...yAxisConfig, auto: e.target.value === 'auto'})} className="bg-gray-800 border-gray-700 text-white p-1 rounded"><option value="auto">Auto</option><option value="manual">Manual Max</option></select>
                        {!yAxisConfig.auto && <input type="number" step="0.1" value={yAxisConfig.max} onChange={e => setYAxisConfig({...yAxisConfig, max: parseFloat(e.target.value) || 1})} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />}
                      </div>
                    </div>
                    
                    <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col gap-4 max-h-[800px] overflow-y-auto">
                      <div className="flex justify-between items-center border-b border-gray-700 pb-2"><h2 className="text-xl font-bold text-blue-400">Control Panel</h2><button onClick={addDistribution} className="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded shadow">+ Add Dist</button></div>
                      {distributions.map((dist) => (
                        <div key={dist.id} className="bg-gray-800 p-4 rounded-lg border border-gray-700 relative">
                          <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: dist.color}}></span>
                              <input type="text" value={dist.name} onChange={(e) => setDistributions(distributions.map(d => d.id === dist.id ? { ...d, name: e.target.value } : d))} className="bg-transparent text-white font-bold w-20 outline-none border-b border-gray-600 focus:border-blue-500 text-sm" />
                              <select value={dist.type} onChange={(e) => updateDistType(dist.id, e.target.value)} className="bg-gray-900 text-white text-xs border border-gray-600 rounded p-1 w-24">
                                <optgroup label="Continuous"><option value="normal">Normal</option><option value="beta">Beta</option><option value="gamma">Gamma</option><option value="exponential">Exponential</option><option value="uniform">Uniform</option><option value="laplace">Laplace</option><option value="lognormal">Log-Normal</option><option value="cauchy">Cauchy</option><option value="weibull">Weibull</option><option value="pareto">Pareto</option><option value="logistic">Logistic</option><option value="rayleigh">Rayleigh</option></optgroup>
                                <optgroup label="Discrete"><option value="binomial">Binomial</option><option value="poisson">Poisson</option><option value="bernoulli">Bernoulli</option><option value="geometric">Geometric</option><option value="negative_binomial">Negative Binomial</option><option value="hypergeometric">Hypergeometric</option><option value="discrete_uniform">Discrete Uniform</option></optgroup>
                                <optgroup label="Sampling"><option value="student_t">Student's t</option><option value="f_dist">F-Dist</option><option value="chisquare">Chi-Square</option></optgroup>
                              </select>
                              <button onClick={() => setInfoModal(dist.type)} className="text-blue-400 bg-gray-900 rounded-full w-5 h-5 flex justify-center items-center">ℹ</button>
                            </div>
                            <button onClick={() => removeDistribution(dist.id)} className="text-red-400 hover:text-red-300 text-xl leading-none">&times;</button>
                          </div>
                          {renderParams(dist, (name, val) => updateDistParam(dist.id, name, val))}
                        </div>
                      ))}
                      {distributions.length === 0 && (
                         <div className="text-center text-gray-500 py-4">Click Add to insert distributions</div>
                      )}
                    </div>
                  </div>
                )}

                {/* --- TAB: CLT SIMULATOR --- */}
                {activeTab === 'clt' && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-8 space-y-6">
                            
                            <div className="bg-gray-900 p-4 rounded-xl border border-cyan-800/50 shadow-lg text-center">
                               <div className="font-serif text-lg text-pink-300">Population: <span className="font-mono">X ~ Dist(μ, σ²)</span></div>
                               <div className="font-serif text-lg text-emerald-300 my-1">Sample Mean: <span className="font-mono">X̄ = (1/n) Σ Xᵢ</span></div>
                               <div className="font-serif text-xl text-cyan-300 mt-2 p-2 bg-gray-950 rounded inline-block border border-gray-800">
                                   CLT: <span className="font-mono">X̄ → Normal(μ, σ²/n)</span> as n → ∞
                               </div>
                            </div>

                            <div className="bg-gray-900 p-6 rounded-xl border border-cyan-500/30 shadow-xl relative">
                                {cltState.isAnimating && (
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gray-800 rounded-t-xl overflow-hidden">
                                        <div className="h-full bg-cyan-500 transition-all duration-100" style={{ width: `${(cltState.progress / cltState.numSamples) * 100}%` }}></div>
                                    </div>
                                )}
                                
                                <h2 className="text-xl font-bold text-cyan-400 mb-2 flex justify-between items-center">
                                    <span>Central Limit Theorem (CLT)</span>
                                    <span className="text-sm font-mono bg-gray-800 px-3 py-1 rounded text-gray-300">Samples drawn: {cltState.progress} / {cltState.numSamples}</span>
                                </h2>
                                <p className="text-sm text-gray-400 mb-6">
                                    Notice how the distribution of <strong>Sample Means</strong> (bottom) approximates a Normal (Gaussian) shape, regardless of how skewed or irregular the <strong>Original Population</strong> (top) is.
                                </p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="flex flex-col gap-2">
                                      <HistogramPlotter 
                                          data={cltState.popData} 
                                          domainMin={isNaN(cltState.theoreticalMean) ? -10 : cltState.theoreticalMean - cltState.theoreticalSE * Math.sqrt(cltState.sampleSize) * 4} 
                                          domainMax={isNaN(cltState.theoreticalMean) ? 10 : cltState.theoreticalMean + cltState.theoreticalSE * Math.sqrt(cltState.sampleSize) * 4} 
                                          color="#f59e0b" 
                                          title="1. Original Population Distribution" 
                                      />
                                      <div className="bg-gray-800 p-2 rounded-lg text-center text-xs">
                                          <div className="text-pink-300 font-serif mb-1">{cltPopEq.base}</div>
                                          <div className="text-emerald-300 font-serif">{cltPopEq.param}</div>
                                      </div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-2">
                                      <HistogramPlotter 
                                          data={cltState.sampleMeans} 
                                          domainMin={isNaN(cltState.theoreticalMean) ? -10 : cltState.theoreticalMean - cltState.theoreticalSE * 4} 
                                          domainMax={isNaN(cltState.theoreticalMean) ? 10 : cltState.theoreticalMean + cltState.theoreticalSE * 4} 
                                          color="#06b6d4" 
                                          title={`2. Distribution of Sample Means (n=${cltState.sampleSize})`} 
                                          overlayNormal={{ show: cltState.progress > 5, mean: cltState.theoreticalMean, se: cltState.theoreticalSE }}
                                      />
                                      <div className="bg-gray-800 p-2 rounded-lg text-center text-xs">
                                          <div className="text-pink-300 font-serif mb-1">
                                              CLT: X̄ ~ N(μ, σ²/n)
                                          </div>
                                          <div className="text-emerald-300 font-serif">
                                              X̄ ~ N({fmt(cltState.theoreticalMean)}, {fmt(Math.pow(cltState.theoreticalSE, 2))})
                                          </div>
                                      </div>
                                    </div>
                                </div>

                                <div className="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-gray-800 p-4 rounded-lg border-l-2 border-amber-500">
                                        <div className="text-xs text-gray-500 mb-1 uppercase font-bold">Theoretical Expected Values</div>
                                        <div className="flex justify-between mb-1"><span className="text-gray-300">Population Mean (μ):</span> <span className="font-mono text-white">{fmt(cltState.theoreticalMean)}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-300">Standard Error (σ/√n):</span> <span className="font-mono text-white">{fmt(cltState.theoreticalSE)}</span></div>
                                    </div>
                                    <div className="bg-gray-800 p-4 rounded-lg border-l-2 border-cyan-500">
                                        <div className="text-xs text-gray-500 mb-1 uppercase font-bold">Empirical Simulation Results</div>
                                        <div className="flex justify-between mb-1"><span className="text-gray-300">Mean of Means:</span> <span className="font-mono text-cyan-300 font-bold">{fmt(cltState.empiricalMean)}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-300">Std Dev of Means (SE):</span> <span className="font-mono text-cyan-300 font-bold">{fmt(cltState.empiricalSE)}</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                                <h2 className="text-xl font-bold text-cyan-400 mb-4 border-b border-gray-800 pb-2">Simulation Engine</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm text-gray-400 block mb-1">Population Distribution</label>
                                        <select 
                                            value={cltState.dist.type} 
                                            onChange={(e) => updateCltDistType(e.target.value)} 
                                            className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:border-cyan-500 outline-none"
                                            disabled={cltState.isAnimating}
                                        >
                                            <optgroup label="Continuous">
                                              <option value="normal">Normal</option>
                                              <option value="beta">Beta</option>
                                              <option value="gamma">Gamma</option>
                                              <option value="exponential">Exponential</option>
                                              <option value="uniform">Uniform</option>
                                              <option value="laplace">Laplace</option>
                                              <option value="lognormal">Log-Normal</option>
                                              <option value="cauchy">Cauchy (CLT Fails!)</option>
                                              <option value="weibull">Weibull</option>
                                              <option value="pareto">Pareto</option>
                                              <option value="logistic">Logistic</option>
                                              <option value="rayleigh">Rayleigh</option>
                                            </optgroup>
                                            <optgroup label="Discrete">
                                              <option value="binomial">Binomial</option>
                                              <option value="poisson">Poisson</option>
                                              <option value="bernoulli">Bernoulli</option>
                                              <option value="geometric">Geometric</option>
                                              <option value="negative_binomial">Negative Binomial</option>
                                              <option value="hypergeometric">Hypergeometric</option>
                                              <option value="discrete_uniform">Discrete Uniform</option>
                                            </optgroup>
                                            <optgroup label="Sampling">
                                              <option value="student_t">Student's t</option>
                                              <option value="f_dist">F-Dist</option>
                                              <option value="chisquare">Chi-Square</option>
                                            </optgroup>
                                        </select>
                                    </div>

                                    <div className={`bg-gray-800 p-3 rounded-lg space-y-3 ${cltState.isAnimating ? 'opacity-50 pointer-events-none' : ''}`}>
                                        {renderParams(cltState.dist, (name, val) => updateCltDistParam(name, val))}
                                    </div>

                                    <div className={`border-t border-gray-700 pt-4 ${cltState.isAnimating ? 'opacity-50 pointer-events-none' : ''}`}>
                                        <label className="text-sm text-cyan-300 font-bold block mb-1">Sample Size (n)</label>
                                        <p className="text-xs text-gray-500 mb-2">Observations per sample (Larger n = tighter bell curve)</p>
                                        <input type="range" min="2" max="100" step="1" value={cltState.sampleSize} onChange={e => setCltState({...cltState, sampleSize: parseInt(e.target.value)})} className="w-full accent-cyan-500" />
                                        <div className="text-center text-white font-mono mt-1">n = {cltState.sampleSize}</div>
                                    </div>

                                    <div className={cltState.isAnimating ? 'opacity-50 pointer-events-none' : ''}>
                                        <label className="text-sm text-gray-400 flex justify-between"><span>Total Samples to Draw (N)</span><span>{cltState.numSamples}</span></label>
                                        <input type="range" min="100" max="5000" step="100" value={cltState.numSamples} onChange={e => setCltState({...cltState, numSamples: parseInt(e.target.value)})} className="w-full accent-gray-500" />
                                    </div>

                                    <button 
                                        onClick={startCLTSimulation} 
                                        disabled={cltState.isAnimating}
                                        className={`w-full py-3 rounded font-bold mt-4 transition-colors shadow-lg ${cltState.isAnimating ? 'bg-gray-600 text-gray-400 cursor-not-allowed' : 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-cyan-500/20'}`}
                                    >
                                        {cltState.isAnimating ? 'SIMULATING...' : 'START SIMULATION'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* --- TAB: POWER & ERRORS LAB --- */}
                {activeTab === 'power' && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-8 space-y-6">
                            <div className="bg-gray-900 p-4 rounded-xl border border-indigo-800/50 shadow-lg text-center flex flex-wrap gap-4 justify-center">
                               <div className="font-serif text-lg text-gray-300">
                                   Alpha (<span className="text-red-400">α</span>): False Positive Rate
                               </div>
                               <div className="font-serif text-lg text-gray-300">
                                   Beta (<span className="text-amber-400">β</span>): False Negative Rate
                               </div>
                               <div className="font-serif text-lg font-bold text-emerald-400 p-1 px-3 bg-gray-950 rounded border border-gray-800">
                                   Power = 1 - <span className="text-amber-400">β</span>
                               </div>
                            </div>

                            <div className="bg-gray-900 p-6 rounded-xl border border-indigo-500/30 shadow-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-indigo-400 flex items-center gap-2">
                                        Type I/II Errors & Statistical Power <button onClick={() => setInfoModal('power_lab')} className="text-blue-400 bg-gray-800 rounded-full w-5 h-5 flex justify-center items-center text-sm">ℹ</button>
                                    </h2>
                                </div>
                                <PowerPlotter mu0={powerState.mu0} muA={powerState.muA} sigma={powerState.sigma} n={powerState.n} alphaLevel={powerState.alpha} />
                                
                                <div className="mt-6 grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-gray-800 p-3 rounded-lg border-t-2 border-red-500 text-center">
                                        <div className="text-xs text-gray-400 mb-1">Alpha (α) / P(Type I)</div>
                                        <div className="text-xl font-mono font-bold text-red-400">{powerState.alpha.toFixed(3)}</div>
                                    </div>
                                    <div className="bg-gray-800 p-3 rounded-lg border-t-2 border-amber-500 text-center">
                                        <div className="text-xs text-gray-400 mb-1">Beta (β) / P(Type II)</div>
                                        <div className="text-xl font-mono font-bold text-amber-400">
                                            {normalCDF((powerState.mu0 + inverseNormalCDF(1 - powerState.alpha) * (powerState.sigma / Math.sqrt(powerState.n)) - powerState.muA) / (powerState.sigma / Math.sqrt(powerState.n))).toFixed(3)}
                                        </div>
                                    </div>
                                    <div className="bg-gray-800 p-3 rounded-lg border-t-2 border-emerald-500 text-center col-span-2">
                                        <div className="text-xs text-gray-400 mb-1">Statistical Power (1 - β)</div>
                                        <div className="text-2xl font-mono font-bold text-emerald-400">
                                            {(1 - normalCDF((powerState.mu0 + inverseNormalCDF(1 - powerState.alpha) * (powerState.sigma / Math.sqrt(powerState.n)) - powerState.muA) / (powerState.sigma / Math.sqrt(powerState.n)))).toFixed(3)}
                                            <span className="text-sm ml-2 text-gray-500">({((1 - normalCDF((powerState.mu0 + inverseNormalCDF(1 - powerState.alpha) * (powerState.sigma / Math.sqrt(powerState.n)) - powerState.muA) / (powerState.sigma / Math.sqrt(powerState.n)))) * 100).toFixed(1)}%)</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                                <h2 className="text-xl font-bold text-indigo-400 mb-4 border-b border-gray-800 pb-2">Experimental Design</h2>
                                <div className="space-y-6">
                                    <div className="bg-gray-800 p-4 rounded-lg">
                                        <label className="text-sm text-indigo-300 font-bold flex justify-between mb-2">
                                            <span>True Effect Size (μₐ)</span> <span>{powerState.muA}</span>
                                        </label>
                                        <p className="text-[10px] text-gray-500 mb-2">Distance from Null (μ₀ = 100). Larger effect = higher power.</p>
                                        <input type="range" min="100" max="130" step="1" value={powerState.muA} onChange={e => setPowerState({...powerState, muA: parseFloat(e.target.value)})} className="w-full accent-indigo-500" />
                                    </div>

                                    <div className="bg-gray-800 p-4 rounded-lg">
                                        <label className="text-sm text-cyan-300 font-bold flex justify-between mb-2">
                                            <span>Sample Size (n)</span> <span>{powerState.n}</span>
                                        </label>
                                        <p className="text-[10px] text-gray-500 mb-2">More samples narrow the curves, reducing overlap.</p>
                                        <input type="range" min="5" max="200" step="5" value={powerState.n} onChange={e => setPowerState({...powerState, n: parseInt(e.target.value)})} className="w-full accent-cyan-500" />
                                    </div>

                                    <div className="bg-gray-800 p-4 rounded-lg">
                                        <label className="text-sm text-gray-300 font-bold flex justify-between mb-2">
                                            <span>Pop. Std Deviation (σ)</span> <span>{powerState.sigma}</span>
                                        </label>
                                        <p className="text-[10px] text-gray-500 mb-2">More noise (variance) increases overlap and reduces power.</p>
                                        <input type="range" min="5" max="40" step="1" value={powerState.sigma} onChange={e => setPowerState({...powerState, sigma: parseFloat(e.target.value)})} className="w-full accent-gray-400" />
                                    </div>

                                    <div className="bg-gray-800 p-4 rounded-lg border border-red-900/50">
                                        <label className="text-sm text-red-400 font-bold flex justify-between mb-2">
                                            <span>Significance Level (α)</span> <span>{powerState.alpha.toFixed(3)}</span>
                                        </label>
                                        <p className="text-[10px] text-gray-500 mb-2">Lowering alpha makes it harder to reject H₀, thus lowering power.</p>
                                        <input type="range" min="0.001" max="0.200" step="0.001" value={powerState.alpha} onChange={e => setPowerState({...powerState, alpha: parseFloat(e.target.value)})} className="w-full accent-red-500" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* --- TAB: INFERENCE --- */}
                {activeTab === 'inference' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div className="lg:col-span-7 space-y-6">
                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
                          <h2 className="text-xl font-bold text-purple-400 mb-4">Samples Visualization (Overlapping Scatter)</h2>
                          <div className="border border-gray-700 h-64 relative mb-4 rounded-lg bg-gray-950 flex flex-col justify-between py-2 overflow-hidden">
                              <ScatterPlot scatterPlotData={scatterPlotData} inferenceSamples={inferenceSamples} />
                          </div>
                       </div>

                       {testConfig.testType === 'anova' && testConfig.anovaTargets.length < 3 && (
                          <div className="bg-red-900/40 border border-red-500 text-red-300 p-4 rounded-lg text-center font-bold">
                              Please select at least 3 samples to perform One-Way ANOVA.
                          </div>
                       )}

                       {inferenceResults?.statVal !== null && !inferenceResults.error && (
                       <div className="bg-gray-900 p-6 rounded-xl border border-purple-500/30 shadow-xl">
                          <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                            <h2 className="text-xl font-bold text-purple-400 flex items-center gap-2">Hypothesis Testing Results <button onClick={() => setInfoModal(testConfig.testType)} className="text-blue-400 bg-gray-800 rounded-full w-5 h-5 flex justify-center items-center">ℹ</button></h2>
                          </div>
                          <div className="space-y-6">
                              <div className="bg-gray-800 p-4 rounded-lg">
                                <div className="text-xs text-gray-500 mb-2 uppercase font-bold">Mathematical Equations</div>
                                <div className="space-y-2 flex flex-col">
                                  <span className="font-serif text-lg text-pink-300 tracking-wider bg-gray-950 p-2 rounded">{inferenceResults.baseEq}</span>
                                  <span className="font-serif text-lg text-emerald-300 tracking-wider bg-gray-950 p-2 rounded">{inferenceResults.subEq}</span>
                                </div>
                              </div>

                              {testConfig.testType === 'anova' && inferenceResults.anovaTable && (
                                <div className="bg-gray-800 p-4 rounded-lg border-t-2 border-purple-500">
                                  <div className="text-xs text-gray-500 mb-2 uppercase font-bold">ANOVA Table</div>
                                  <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm text-gray-300 border-collapse">
                                      <thead className="bg-gray-950 text-gray-400"><tr><th className="p-2 border border-gray-700">Source</th><th className="p-2 border border-gray-700">SS</th><th className="p-2 border border-gray-700">df</th><th className="p-2 border border-gray-700">MS</th><th className="p-2 border border-gray-700">F</th><th className="p-2 border border-gray-700">P-value</th></tr></thead>
                                      <tbody className="divide-y divide-gray-700">
                                        <tr className="bg-gray-800 hover:bg-gray-750"><td className="p-2 border border-gray-700 font-medium">Treatment</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.sst)}</td><td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfT}</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.mst)}</td><td className="p-2 border border-gray-700 font-mono text-purple-400 font-bold">{fmt(inferenceResults.anovaTable.f)}</td><td className="p-2 border border-gray-700 font-mono font-bold text-amber-400">{fmt(inferenceResults.anovaTable.p)}</td></tr>
                                        <tr className="bg-gray-800 hover:bg-gray-750"><td className="p-2 border border-gray-700 font-medium">Error</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.sse)}</td><td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfE}</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.mse)}</td><td className="p-2 border border-gray-700 bg-gray-900/50"></td><td className="p-2 border border-gray-700 bg-gray-900/50"></td></tr>
                                        <tr className="bg-gray-900 font-bold"><td className="p-2 border border-gray-700">Total</td><td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.ssTotal)}</td><td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfTotal}</td><td className="p-2 border border-gray-700 bg-gray-900/50"></td><td className="p-2 border border-gray-700 bg-gray-900/50"></td><td className="p-2 border border-gray-700 bg-gray-900/50"></td></tr>
                                      </tbody>
                                    </table>
                                  </div>
                                  <div className={`mt-3 p-2 rounded text-center text-sm font-bold ${inferenceResults.pValue < (1-testConfig.ciLevel) ? 'bg-red-900/30 text-red-400' : 'bg-emerald-900/30 text-emerald-400'}`}>{inferenceResults.decision}</div>
                                </div>
                              )}

                              {testConfig.testType !== 'anova' && (
                                <>
                                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                      <div className="bg-gray-800 p-3 rounded-lg border-l-2 border-purple-500"><div className="text-xs text-gray-400">Stat ({inferenceResults.statName})</div><div className="text-xl text-white font-mono">{fmt(inferenceResults.statVal)}</div></div>
                                      <div className="bg-gray-800 p-3 rounded-lg border-l-2 border-purple-500"><div className="text-xs text-gray-400">df</div><div className="text-xl text-white font-mono">{inferenceResults.df !== null ? fmt(inferenceResults.df) : 'N/A'}</div></div>
                                      <div className={`bg-gray-800 p-3 rounded-lg border-l-2 col-span-2 ${inferenceResults.pValue < (1-testConfig.ciLevel) ? 'border-red-500' : 'border-emerald-500'}`}><div className="text-xs text-gray-400">P-Value ({testConfig.tails} tail)</div><div className="text-xl text-white font-mono">{fmt(inferenceResults.pValue)}</div><div className="text-xs mt-1 text-gray-300">{inferenceResults.decision}</div></div>
                                  </div>

                                  {!isNaN(inferenceResults.ci[0]) && (
                                    <div className="bg-gray-800 p-4 rounded-lg border-t-2 border-blue-500 flex flex-col md:flex-row justify-between items-center gap-4">
                                      <div className="flex-grow"><div className="text-xs text-gray-500 mb-1 uppercase font-bold">{(testConfig.ciLevel * 100).toFixed(0)}% Confidence Interval</div><div className="font-serif text-sm text-pink-300 bg-gray-950 p-1.5 rounded mb-1">{inferenceResults.ciBase}</div><div className="font-serif text-sm text-emerald-300 bg-gray-950 p-1.5 rounded">{inferenceResults.ciSub}</div></div>
                                      <span className="text-xl text-blue-400 font-mono bg-gray-950 p-3 rounded-lg min-w-[150px] text-center">[{fmt(inferenceResults.ci[0])}, {fmt(inferenceResults.ci[1])}]</span>
                                    </div>
                                  )}
                                </>
                              )}
                            </div>
                       </div>
                       )}
                    </div>

                    <div className="lg:col-span-5 space-y-6 max-h-[90vh] overflow-y-auto pr-2">
                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                          <h2 className="text-xl font-bold text-blue-400 mb-4 border-b border-gray-800 pb-2">1. Configure Test</h2>
                          <div className="space-y-4">
                              <div>
                                <label className="text-xs text-gray-400 mb-1 block">Statistical Test</label>
                                <select value={testConfig.testType} onChange={(e) => setTestConfig({...testConfig, testType: e.target.value})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:border-blue-500 outline-none">
                                    <optgroup label="One Sample"><option value="1_sample_z">1-Sample Z-Test</option><option value="1_sample_t">1-Sample T-Test</option><option value="1_sample_prop">1-Proportion Z-Test</option></optgroup>
                                    <optgroup label="Two Samples"><option value="2_sample_z">2-Sample Z-Test</option><option value="2_sample_t_eq">2-Sample T-Test (Pooled)</option><option value="2_sample_t_uneq">2-Sample Welch's T-Test</option><option value="2_sample_prop">2-Proportion Z-Test</option></optgroup>
                                    <optgroup label="Multi Sample"><option value="anova">One-Way ANOVA</option></optgroup>
                                </select>
                              </div>

                              {testConfig.testType !== 'anova' ? (
                                <div className="flex gap-2">
                                  <div className="flex-1"><label className="text-xs text-gray-400 block mb-1">Sample 1</label><select value={testConfig.target1} onChange={e => setTestConfig({...testConfig, target1: e.target.value})} className="w-full bg-gray-800 text-white rounded p-2">{inferenceSamples.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                                  {testConfig.testType.startsWith('2_') && <div className="flex-1"><label className="text-xs text-gray-400 block mb-1">Sample 2</label><select value={testConfig.target2} onChange={e => setTestConfig({...testConfig, target2: e.target.value})} className="w-full bg-gray-800 text-white rounded p-2">{inferenceSamples.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>}
                                </div>
                              ) : (
                                <div>
                                  <label className="text-xs text-gray-400 block mb-1">Select Samples for ANOVA</label>
                                  <div className="flex flex-wrap gap-2">{inferenceSamples.map(s => (<label key={s.id} className="flex items-center gap-1 bg-gray-800 px-2 py-1 rounded cursor-pointer"><input type="checkbox" checked={testConfig.anovaTargets.includes(s.id)} onChange={(e) => setTestConfig({...testConfig, anovaTargets: e.target.checked ? [...testConfig.anovaTargets, s.id] : testConfig.anovaTargets.filter(id => id !== s.id)})} className="accent-blue-500" /><span className="text-sm">{s.name}</span></label>))}</div>
                                </div>
                              )}
                              
                              {testConfig.testType !== 'anova' && (
                                <div className="grid grid-cols-2 gap-4">
                                  <div><label className="text-xs text-gray-400 block mb-1">Hypo Mean (μ₀/d₀/p₀)</label><input type="number" step={testConfig.testType.includes('prop') ? 0.05 : 1} value={testConfig.hypoMean} onChange={(e) => setTestConfig({...testConfig, hypoMean: e.target.value})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" /></div>
                                  <div><label className="text-xs text-gray-400 block mb-1">Tails</label><select value={testConfig.tails} onChange={e => setTestConfig({...testConfig, tails: e.target.value})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700"><option value="two">Two-Tailed (≠)</option><option value="left">Left-Tailed (&lt;)</option><option value="right">Right-Tailed (&gt;)</option></select></div>
                                </div>
                              )}

                              {(testConfig.testType === '1_sample_z' || testConfig.testType === '2_sample_z') && (
                                <div className="grid grid-cols-2 gap-4">
                                  <div><label className="text-xs text-gray-400 block mb-1">Known σ₁</label><input type="number" min="0.1" value={testConfig.knownVar1} onChange={(e) => setTestConfig({...testConfig, knownVar1: e.target.value})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" /></div>
                                  {testConfig.testType === '2_sample_z' && <div><label className="text-xs text-gray-400 block mb-1">Known σ₂</label><input type="number" min="0.1" value={testConfig.knownVar2} onChange={(e) => setTestConfig({...testConfig, knownVar2: e.target.value})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" /></div>}
                                </div>
                              )}

                              <div>
                                 <label className="text-xs text-gray-400 block mb-1">Confidence Level</label>
                                 <select value={testConfig.ciLevel} onChange={(e) => setTestConfig({...testConfig, ciLevel: parseFloat(e.target.value)})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2">
                                    <option value={0.90}>90% (α = 0.10)</option><option value={0.95}>95% (α = 0.05)</option><option value={0.99}>99% (α = 0.01)</option>
                                 </select>
                              </div>
                          </div>
                       </div>

                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                          <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2"><h2 className="text-xl font-bold text-emerald-400">2. Samples Manager</h2><button onClick={addInferenceSample} className="bg-emerald-600 text-white text-xs px-3 py-1 rounded shadow">+ Add Sample</button></div>
                          <div className="space-y-4">
                            {inferenceSamples.map(samp => (
                              <div key={samp.id} className="bg-gray-800 p-3 rounded-lg relative">
                                <button onClick={() => removeInferenceSample(samp.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-300">&times;</button>
                                <div className="flex items-center gap-2 mb-2">
                                  <span className="w-3 h-3 rounded-full" style={{backgroundColor: samp.color}}></span>
                                  <input type="text" value={samp.name} onChange={e => setInferenceSamples(inferenceSamples.map(s => s.id === samp.id ? {...s, name: e.target.value} : s))} className="bg-transparent text-white font-bold w-24 outline-none border-b border-gray-600 focus:border-emerald-500" />
                                  <span className="text-xs text-gray-400 ml-auto mr-4">n=</span>
                                  <input type="number" min="2" max="1000" value={samp.size} onChange={e => setInferenceSamples(inferenceSamples.map(s => s.id === samp.id ? {...s, size: parseInt(e.target.value)||2} : s))} className="w-16 bg-gray-900 text-white p-1 rounded text-center text-xs" />
                                </div>
                                <select value={samp.type} onChange={e => updateSampleType(samp.id, e.target.value)} className="w-full bg-gray-900 text-gray-300 text-xs rounded p-1 mb-2">
                                  <optgroup label="Continuous"><option value="normal">Normal</option><option value="uniform">Uniform</option><option value="exponential">Exponential</option></optgroup>
                                  <optgroup label="Discrete"><option value="binomial">Binomial</option><option value="poisson">Poisson</option></optgroup>
                                </select>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                  {renderParams(samp, (name, val) => updateSampleParam(samp.id, name, val))}
                                </div>
                              </div>
                            ))}
                          </div>
                          <button onClick={generateDataForSamples} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded font-bold mt-4 transition-colors">GENERATE NEW DATA</button>
                       </div>
                    </div>
                  </div>
                )}

                {/* --- TAB: BAYESIAN --- */}
                {activeTab === 'bayesian' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                      
                      <Plotter 
                        chartData={bayesianAnalysis.chartData} 
                        domainMin={bayesianAnalysis.domainMin} 
                        domainMax={bayesianAnalysis.domainMax} 
                        xLabel="Parameter Space (θ)" 
                        yConfig={bayesYAxisConfig}
                        showCI={true}
                        credibleInterval={bayesianAnalysis.credibleInterval}
                        testPoint={bayesState.testPoint}
                        testValue={bayesianAnalysis.testValue}
                      />
                      
                      <div className="flex flex-wrap gap-4 bg-gray-900 p-4 rounded-xl border border-gray-800 justify-center items-center text-sm">
                        <label className="flex items-center gap-1 cursor-pointer">
                          <input type="checkbox" checked={bayesYAxisConfig.show} onChange={e => setBayesYAxisConfig({...bayesYAxisConfig, show: e.target.checked})} className="accent-pink-500" />
                          <span className="text-gray-400">Show Y Axis</span>
                        </label>
                        <div className="w-px h-6 bg-gray-700 hidden md:block"></div>
                        <select 
                          value={bayesYAxisConfig.auto ? 'auto' : 'manual'} 
                          onChange={e => {
                            const isAuto = e.target.value === 'auto';
                            setBayesYAxisConfig({
                              ...bayesYAxisConfig, 
                              auto: isAuto,
                              max: isAuto ? 1 : bayesianAnalysis.chartData.maxY
                            });
                          }} 
                          className="bg-gray-800 border-gray-700 text-white p-1 rounded"
                        >
                          <option value="auto">Auto Scale</option>
                          <option value="manual">Manual Max</option>
                        </select>
                        {!bayesYAxisConfig.auto && <input type="number" step="0.1" value={bayesYAxisConfig.max} onChange={e => setBayesYAxisConfig({...bayesYAxisConfig, max: parseFloat(e.target.value) || 1})} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />}
                      </div>
                      
                      <div className="bg-gray-900 p-6 rounded-xl border border-pink-500/30 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                          <h3 className="text-lg font-bold text-pink-400 mb-3 border-b border-gray-700 pb-1">Confidence & Information</h3>
                          <div className="space-y-3 text-sm">
                            <div className="flex justify-between items-center bg-gray-800 p-2 rounded">
                              <span className="text-gray-400">Credible Interval (HDI):</span>
                              <select value={bayesState.ciLevel} onChange={e => updateBayesState('ciLevel', parseFloat(e.target.value))} className="bg-gray-900 text-white border border-gray-600 rounded px-1">
                                <option value={0.90}>90%</option><option value={0.95}>95%</option><option value={0.99}>99%</option>
                              </select>
                            </div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded"><span className="text-gray-400">CI Bounds:</span><span className="font-mono text-emerald-400">[{fmt(bayesianAnalysis.credibleInterval[0])}, {fmt(bayesianAnalysis.credibleInterval[1])}]</span></div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded"><span className="text-gray-400">Posterior Mean:</span><span className="font-mono text-white">{fmt(bayesianAnalysis.posteriorMean)}</span></div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded"><span className="text-gray-400" title="Amount of information data carries about parameter">Fisher Information I(θ):</span><span className="font-mono text-amber-400">{fmt(bayesianAnalysis.fisherInfo)}</span></div>
                          </div>
                        </div>
                        <div>
                          <h3 className="text-lg font-bold text-blue-400 mb-3 border-b border-gray-700 pb-1">Hypothesis Testing</h3>
                          <div className="space-y-3 text-sm bg-gray-800 p-3 rounded">
                              <label className="flex justify-between items-center mb-2"><span className="text-gray-400">Test Point (H₀: θ = ?):</span><input type="number" step="0.05" value={bayesState.testPoint} onChange={(e) => updateBayesState('testPoint', e.target.value)} className="w-20 bg-gray-900 text-white p-1 border border-gray-600 rounded text-center" /></label>
                              <div className="flex justify-between items-center mt-3"><span className="text-gray-500">Status:</span>{bayesianAnalysis.isPlausible ? <span className="text-emerald-400 font-bold">Plausible ✓</span> : <span className="text-red-400 font-bold">Rejected ✗</span>}</div>
                              <div className="flex justify-between items-center mt-2"><span className="text-gray-500">Density at Point:</span><span className="font-mono text-white">{fmt(bayesianAnalysis.testValue)}</span></div>
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col gap-6 max-h-[800px] overflow-y-auto">
                      <div className="border-b border-gray-700 pb-4">
                        <h2 className="text-xl font-bold text-pink-400 mb-3">Bayesian Update Model</h2>
                        <select value={bayesState.type} onChange={(e) => switchBayesCase(e.target.value)} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-pink-500">
                          <option value="beta-binomial">Beta - Binomial</option><option value="jeffreys-binomial">Jeffreys' Prior - Binomial</option><option value="gamma-poisson">Gamma - Poisson</option><option value="gamma-exponential">Gamma - Exponential</option><option value="normal-normal">Normal - Normal (Known Var)</option>
                        </select>
                      </div>
                      
                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-gray-400">
                        <div className="flex justify-between items-center mb-2"><h3 className="font-bold text-gray-300">1. Prior Belief</h3></div>
                        {['beta-binomial', 'jeffreys-binomial'].includes(bayesState.type) && (
