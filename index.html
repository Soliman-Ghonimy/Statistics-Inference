<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Basic Math Utilities ---
        const gamma = (z) => {
          let g = 7;
          let p = [0.99999999999980993, 676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
          if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
          z -= 1;
          let x = p[0];
          for (let i = 1; i < g + 2; i++) x += p[i] / (z + i);
          let t = z + g + 0.5;
          return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
        };

        const betaFunc = (x, y) => (gamma(x) * gamma(y)) / gamma(x + y);
        const factorial = (n) => {
          if (n < 0) return 0; if (n === 0 || n === 1) return 1;
          let res = 1; for (let i = 2; i <= n; i++) res *= i; return res;
        };
        const combinations = (n, k) => {
          if (k < 0 || k > n) return 0; if (k === 0 || k === n) return 1;
          let c = 1; for (let i = 1; i <= k; i++) c = (c * (n - i + 1)) / i; return c;
        };
        const fmt = (v) => (isNaN(v) || v === null || v === undefined || v === '') ? 'N/A' : parseFloat(Number(v).toFixed(4)).toString();

        const inverseNormalCDF = (p) => {
            const a1 = -39.6968302866538, a2 = 220.946098424521, a3 = -275.928510446969, a4 = 138.357751867269, a5 = -30.6647980661472, a6 = 2.50662827745924;
            const b1 = -54.4760987982241, b2 = 161.585836858041, b3 = -155.698979859887, b4 = 66.8013118877197, b5 = -13.2806815528857;
            const c1 = -0.00778489400243029, c2 = -0.322396458041136, c3 = -2.40075827716184, c4 = -2.54973253934373, c5 = 4.37466414146497, c6 = 2.93816398269878;
            const d1 = 0.00778469570904146, d2 = 0.32246712907004, d3 = 2.445134137143, d4 = 3.75440866190742;
            const p_low = 0.02425, p_high = 1 - p_low;
            let q, r;
            if (p < p_low) {
                q = Math.sqrt(-2 * Math.log(p));
                return (((((c1 * q + c2) * q + c3) * q + c4) * q + c5) * q + c6) / ((((d1 * q + d2) * q + d3) * q + d4) * q + 1);
            } else if (p <= p_high) {
                q = p - 0.5; r = q * q;
                return (((((a1 * r + a2) * r + a3) * r + a4) * r + a5) * r + a6) * q / (((((b1 * r + b2) * r + b3) * r + b4) * r + b5) * r + 1);
            } else {
                q = Math.sqrt(-2 * Math.log(1 - p));
                return -(((((c1 * q + c2) * q + c3) * q + c4) * q + c5) * q + c6) / ((((d1 * q + d2) * q + d3) * q + d4) * q + 1);
            }
        };

        // --- Continuous PDFs ---
        const normalPDF = (x, mu, sigma) => (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
        const betaPDF = (x, alpha, beta) => (x <= 0 || x >= 1) ? 0 : (Math.pow(x, alpha - 1) * Math.pow(1 - x, beta - 1)) / betaFunc(alpha, beta);
        const exponentialPDF = (x, lambda) => x < 0 ? 0 : lambda * Math.exp(-lambda * x);
        const gammaPDF = (x, alpha, beta) => x <= 0 ? 0 : (Math.pow(beta, alpha) * Math.pow(x, alpha - 1) * Math.exp(-beta * x)) / gamma(alpha);
        const uniformPDF = (x, a, b) => (x >= a && x <= b) ? 1 / (b - a) : 0;
        const laplacePDF = (x, mu, b) => (1 / (2 * b)) * Math.exp(-Math.abs(x - mu) / b);
        const cauchyPDF = (x, x0, gammaVal) => 1 / (Math.PI * gammaVal * (1 + Math.pow((x - x0) / gammaVal, 2)));
        const lognormalPDF = (x, mu, sigma) => x <= 0 ? 0 : (1 / (x * sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-Math.pow(Math.log(x) - mu, 2) / (2 * sigma * sigma));
        const weibullPDF = (x, k, lambda) => x < 0 ? 0 : (k / lambda) * Math.pow(x / lambda, k - 1) * Math.exp(-Math.pow(x / lambda, k));
        const paretoPDF = (x, xm, alpha) => x < xm ? 0 : (alpha * Math.pow(xm, alpha)) / Math.pow(x, alpha + 1);
        const logisticPDF = (x, mu, s) => { const ex = Math.exp(-(x - mu) / s); return ex / (s * Math.pow(1 + ex, 2)); };
        const rayleighPDF = (x, sigma) => x < 0 ? 0 : (x / (sigma * sigma)) * Math.exp(-(x * x) / (2 * sigma * sigma));

        // --- Sampling PDFs ---
        const chiSquarePDF = (x, k) => gammaPDF(x, k / 2, 0.5);
        const studentTPDF = (x, nu) => (gamma((nu + 1) / 2) / (Math.sqrt(nu * Math.PI) * gamma(nu / 2))) * Math.pow(1 + (x * x) / nu, -(nu + 1) / 2);
        const fDistPDF = (x, d1, d2) => x <= 0 ? 0 : Math.sqrt(Math.pow(d1 * x, d1) * Math.pow(d2, d2) / Math.pow(d1 * x + d2, d1 + d2)) / (x * betaFunc(d1 / 2, d2 / 2));

        // --- Discrete PMFs ---
        const binomialPMF = (x, n, p) => (x < 0 || x > n || !Number.isInteger(x)) ? 0 : combinations(n, x) * Math.pow(p, x) * Math.pow(1 - p, n - x);
        const poissonPMF = (x, lambda) => (x < 0 || !Number.isInteger(x)) ? 0 : (Math.pow(lambda, x) * Math.exp(-lambda)) / factorial(x);
        const bernoulliPMF = (x, p) => binomialPMF(x, 1, p);
        const geometricPMF = (x, p) => (x < 1 || !Number.isInteger(x)) ? 0 : p * Math.pow(1 - p, x - 1);
        const negBinomialPMF = (x, r, p) => (x < r || !Number.isInteger(x)) ? 0 : combinations(x - 1, r - 1) * Math.pow(p, r) * Math.pow(1 - p, x - r);
        const hypergeometricPMF = (x, N, K, n) => {
          if (!Number.isInteger(x) || x < Math.max(0, n - (N - K)) || x > Math.min(n, K)) return 0;
          return (combinations(K, x) * combinations(N - K, n - x)) / combinations(N, n);
        };
        const discreteUniformPMF = (x, a, b) => (x >= a && x <= b && Number.isInteger(x)) ? 1 / (b - a + 1) : 0;
        const isDiscreteDist = (type) => ['binomial', 'poisson', 'bernoulli', 'geometric', 'negative_binomial', 'hypergeometric', 'discrete_uniform'].includes(type);

        // --- Numerical Integration & CDFs ---
        const integrate = (pdf, min, max, steps = 300) => {
          let sum = 0; const step = (max - min) / steps;
          for (let i = 0; i < steps; i++) sum += pdf(min + i * step + step / 2) * step;
          return sum;
        };
        const findQuantile = (pdf, min, max, targetArea) => {
          let low = min, high = max, mid; const totalArea = integrate(pdf, min, max, 500);
          for (let i = 0; i < 25; i++) {
            mid = (low + high) / 2;
            if (integrate(pdf, min, mid, 300) / totalArea < targetArea) low = mid; else high = mid;
          }
          return mid;
        };
        const erf = (x) => {
          const sign = x >= 0 ? 1 : -1; x = Math.abs(x);
          const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
          const t = 1.0 / (1.0 + p * x);
          return sign * (1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x));
        };
        const normalCDF = (x, mu = 0, sigma = 1) => 0.5 * (1 + erf((x - mu) / (sigma * Math.sqrt(2))));
        const tCDF = (t, df) => {
          if (t === 0) return 0.5;
          const area = integrate(x => studentTPDF(x, df), 0, Math.abs(t), 1000);
          return t > 0 ? 0.5 + area : 0.5 - area;
        };
        const fCDF = (f, d1, d2) => f <= 0 ? 0 : integrate(x => fDistPDF(x, d1, d2), 0.00001, f, 2000);
        const getZScore = (ci) => ci === 0.90 ? 1.645 : ci === 0.95 ? 1.960 : ci === 0.99 ? 2.576 : 1.96;
        const getTCrit = (ci, df) => {
          const z = getZScore(ci);
          return df > 100 ? z : z * (1 + (z*z + 1)/(4*df));
        };

        // --- Advanced Regression Engine ---
        // Added multiple regression types, dynamic CI bounds, and normality tests
        const calculateAdvancedRegression = (points, type, ciLevel) => {
            if (points.length < 3) return null;
            
            // Filter invalid points based on regression type
            let pts = points;
            if (type === 'exponential') pts = points.filter(p => p.y > 0);
            if (type === 'logarithmic') pts = points.filter(p => p.x > 0);
            const n = pts.length;
            if (n < 3) return null;

            const sumX = pts.reduce((s, p) => s + p.x, 0);
            const sumY = pts.reduce((s, p) => s + p.y, 0);
            const meanX = sumX / n;
            const meanY = sumY / n;

            let predict = (x) => 0;
            let getCI = (x, tCrit, mse) => ({ lower: 0, upper: 0 });
            let equation = '';
            let rSquared = 0, mse = 0, sse = 0, sst = 0;
            const residuals = [];

            if (type === 'linear') {
                const sumXY = pts.reduce((s, p) => s + p.x * p.y, 0);
                const sumX2 = pts.reduce((s, p) => s + p.x * p.x, 0);
                const ssX = sumX2 - n * meanX * meanX;
                const slope = ssX === 0 ? 0 : (sumXY - n * meanX * meanY) / ssX;
                const intercept = meanY - slope * meanX;
                predict = (x) => slope * x + intercept;
                equation = `Y = ${slope.toFixed(3)} X ${intercept >= 0 ? '+' : '-'} ${Math.abs(intercept).toFixed(3)}`;
                getCI = (x, tC, m) => {
                    const seFit = Math.sqrt(m * (1/n + Math.pow(x - meanX, 2) / Math.max(0.0001, ssX)));
                    const yP = predict(x);
                    return { lower: yP - tC * seFit, upper: yP + tC * seFit };
                };
            } 
            else if (type === 'logarithmic') {
                const sumLnX = pts.reduce((s, p) => s + Math.log(p.x), 0);
                const meanLnX = sumLnX / n;
                const sumLnXY = pts.reduce((s, p) => s + Math.log(p.x) * p.y, 0);
                const sumLnX2 = pts.reduce((s, p) => s + Math.pow(Math.log(p.x), 2), 0);
                const ssLnX = sumLnX2 - n * meanLnX * meanLnX;
                const b = ssLnX === 0 ? 0 : (sumLnXY - n * meanLnX * meanY) / ssLnX;
                const a = meanY - b * meanLnX;
                predict = (x) => x > 0 ? a + b * Math.log(x) : 0;
                equation = `Y = ${a.toFixed(3)} ${b >= 0 ? '+' : '-'} ${Math.abs(b).toFixed(3)} ln(X)`;
                getCI = (x, tC, m) => {
                    if(x <= 0) return { lower: 0, upper: 0 };
                    const seFit = Math.sqrt(m * (1/n + Math.pow(Math.log(x) - meanLnX, 2) / Math.max(0.0001, ssLnX)));
                    const yP = predict(x);
                    return { lower: yP - tC * seFit, upper: yP + tC * seFit };
                };
            } 
            else if (type === 'exponential') {
                const sumLnY = pts.reduce((s, p) => s + Math.log(p.y), 0);
                const meanLnY = sumLnY / n;
                const sumXLnY = pts.reduce((s, p) => s + p.x * Math.log(p.y), 0);
                const sumX2 = pts.reduce((s, p) => s + p.x * p.x, 0);
                const ssX = sumX2 - n * meanX * meanX;
                const b = ssX === 0 ? 0 : (sumXLnY - n * meanX * meanLnY) / ssX;
                const lnA = meanLnY - b * meanX;
                const a = Math.exp(lnA);
                predict = (x) => a * Math.exp(b * x);
                equation = `Y = ${a.toFixed(3)} e^(${b.toFixed(3)} X)`;
                getCI = (x, tC, mLog) => {
                    const seFitLog = Math.sqrt(mLog * (1/n + Math.pow(x - meanX, 2) / Math.max(0.0001, ssX)));
                    const logYPred = lnA + b * x;
                    return { lower: Math.exp(logYPred - tC * seFitLog), upper: Math.exp(logYPred + tC * seFitLog) };
                };
            } 
            else if (type === 'quadratic') {
                let sX = 0, sX2 = 0, sX3 = 0, sX4 = 0, sY = 0, sXY = 0, sX2Y = 0;
                pts.forEach(p => {
                    const x2 = p.x * p.x;
                    sX += p.x; sX2 += x2; sX3 += x2 * p.x; sX4 += x2 * x2;
                    sY += p.y; sXY += p.x * p.y; sX2Y += x2 * p.y;
                });
                const A = [[n, sX, sX2], [sX, sX2, sX3], [sX2, sX3, sX4]];
                const B = [sY, sXY, sX2Y];
                const det3 = (M) => M[0][0]*(M[1][1]*M[2][2]-M[1][2]*M[2][1]) - M[0][1]*(M[1][0]*M[2][2]-M[1][2]*M[2][0]) + M[0][2]*(M[1][0]*M[2][1]-M[1][1]*M[2][0]);
                const D = det3(A);
                const replaceCol = (M, col, V) => M.map((row, i) => row.map((val, j) => j===col ? V[i] : val));
                let c=0, b=0, a=0;
                if(D !== 0) {
                    c = det3(replaceCol(A, 0, B))/D;
                    b = det3(replaceCol(A, 1, B))/D;
                    a = det3(replaceCol(A, 2, B))/D;
                }
                predict = (x) => a*x*x + b*x + c;
                equation = `Y = ${a.toFixed(3)} X² ${b >= 0 ? '+' : '-'} ${Math.abs(b).toFixed(3)} X ${c >= 0 ? '+' : '-'} ${Math.abs(c).toFixed(3)}`;
                getCI = (x, tC, m) => {
                    const seFit = Math.sqrt(m * (3/n)); // Approximation for quadratic band visualization
                    const yP = predict(x);
                    return { lower: yP - tC * seFit, upper: yP + tC * seFit };
                };
            }

            let mseLog = 0;
            if (type === 'exponential') {
                let sseLog = 0;
                pts.forEach(p => {
                    const yP = predict(p.x);
                    residuals.push({ x: p.x, y: p.y - yP, actualY: p.y });
                    sse += Math.pow(p.y - yP, 2);
                    sst += Math.pow(p.y - meanY, 2);
                    sseLog += Math.pow(Math.log(p.y) - Math.log(yP), 2);
                });
                mseLog = sseLog / Math.max(1, n - 2);
            } else {
                pts.forEach(p => {
                    const yP = predict(p.x);
                    residuals.push({ x: p.x, y: p.y - yP, actualY: p.y });
                    sse += Math.pow(p.y - yP, 2);
                    sst += Math.pow(p.y - meanY, 2);
                });
            }
            
            rSquared = sst === 0 ? 1 : Math.max(0, 1 - (sse / sst));
            mse = sse / Math.max(1, n - (type === 'quadratic' ? 3 : 2));
            const df = Math.max(1, n - (type === 'quadratic' ? 3 : 2));
            const tCrit = getTCrit(ciLevel, df);

            // --- Normality Test (Ryan-Joiner proxy for Shapiro-Wilk) ---
            const sortedRes = [...residuals].map(r => r.y).sort((a,b) => a - b);
            const qqPoints = sortedRes.map((res, i) => {
                const z = inverseNormalCDF((i + 1 - 0.375) / (n + 0.25));
                return { z, res };
            });
            const meanZ = qqPoints.reduce((s, p) => s + p.z, 0) / n;
            const meanR = qqPoints.reduce((s, p) => s + p.res, 0) / n;
            let sumZr = 0, sumZ2 = 0, sumR2 = 0;
            qqPoints.forEach(p => {
                sumZr += (p.z - meanZ) * (p.res - meanR);
                sumZ2 += Math.pow(p.z - meanZ, 2);
                sumR2 += Math.pow(p.res - meanR, 2);
            });
            const rjCorrel = (sumZ2 > 0 && sumR2 > 0) ? sumZr / Math.sqrt(sumZ2 * sumR2) : 0;
            
            // Critical value approximation
            const isNormal = rjCorrel > (1.0063 - 0.1288 / Math.sqrt(n) - 0.6118 / n + 1.3505 / (n * n)); 

            return { 
                type, predict, equation, rSquared, mse, residuals, sse, sst, n, 
                getCI: (x) => getCI(x, tCrit, type === 'exponential' ? mseLog : mse), 
                qqPoints, rjCorrel, isNormal, stdRes: Math.sqrt(mse)
            };
        };

        // --- Random Data Generation ---
        const randNormal = (mu, sigma) => {
            let u = 0, v = 0; while(u === 0) u = Math.random(); while(v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v) * sigma + mu;
        };
        
        const randomFromDist = (type, p) => {
            const u = Math.random();
            switch (type) {
                case 'normal': return randNormal(p.mu, p.sigma);
                case 'uniform': return p.a + u * (p.b - p.a);
                case 'exponential': return -Math.log(1 - u) / Math.max(0.001, p.lambda);
                case 'laplace': return p.mu - p.b * Math.sign(u - 0.5) * Math.log(1 - 2 * Math.abs(u - 0.5));
                case 'cauchy': return p.x0 + p.gammaVal * Math.tan(Math.PI * (u - 0.5));
                case 'lognormal': return Math.exp(randNormal(p.mu, p.sigma));
                case 'weibull': return p.lambda * Math.pow(-Math.log(1 - u), 1 / Math.max(0.001, p.k));
                case 'pareto': return p.xm / Math.pow(1 - u, 1 / Math.max(0.001, p.alpha));
                case 'logistic': return p.mu + p.s * Math.log(u / (1 - u));
                case 'rayleigh': return p.sigma * Math.sqrt(-2 * Math.log(1 - u));
                case 'bernoulli': return u < p.p ? 1 : 0;
                case 'binomial': { let succ = 0; for(let i=0; i<p.n; i++) if(Math.random()<p.p) succ++; return succ; }
                case 'poisson': { let L = Math.exp(-p.lambda), k = 0, prob = 1; do { k++; prob *= Math.random(); } while (prob > L); return k - 1; }
                case 'geometric': return Math.ceil(Math.log(1 - u) / Math.log(1 - Math.min(0.999, p.p)));
                case 'negative_binomial': { let succ = 0, fails = 0; while(succ < p.r) { if(Math.random() < p.p) succ++; else fails++; } return fails + p.r; }
                case 'discrete_uniform': return Math.floor(p.a + u * (p.b - p.a + 1));
                case 'beta': { 
                   let x, y; const M = 5; 
                   do { x = Math.random(); y = Math.random() * M; } while(y > betaPDF(x, p.alpha, p.beta)); 
                   return x; 
                }
                case 'gamma': {
                   const mean = p.alpha / p.beta; const peakX = Math.max(0, (p.alpha - 1) / p.beta);
                   const M = gammaPDF(peakX === 0 ? 0.01 : peakX, p.alpha, p.beta) * 2;
                   let rx, ry; do { rx = Math.random() * mean * 5; ry = Math.random() * M; } while(ry > gammaPDF(rx, p.alpha, p.beta));
                   return rx;
                }
                case 'chisquare': { let sum = 0; for(let i=0; i<p.k; i++) { const z = randNormal(0,1); sum += z*z; } return sum; }
                case 'student_t': { let sum = 0; for(let i=0; i<p.nu; i++) { const z = randNormal(0,1); sum += z*z; } return randNormal(0,1) / Math.sqrt(sum / p.nu); }
                case 'f_dist': { 
                   let sum1 = 0; for(let i=0; i<p.d1; i++) { const z = randNormal(0,1); sum1 += z*z; }
                   let sum2 = 0; for(let i=0; i<p.d2; i++) { const z = randNormal(0,1); sum2 += z*z; }
                   return (sum1 / p.d1) / (sum2 / p.d2);
                }
                case 'hypergeometric': {
                   let N = p.N, K = p.K, succ = 0;
                   for(let i=0; i<p.n; i++) { if(Math.random() < K/N) { succ++; K--; } N--; }
                   return succ;
                }
                default: return randNormal(0, 1);
            }
        };

        const getDistStats = (type, p) => {
            switch(type) {
                case 'normal': return { mean: p.mu, var: p.sigma * p.sigma };
                case 'uniform': return { mean: (p.a + p.b)/2, var: Math.pow(p.b - p.a, 2)/12 };
                case 'exponential': return { mean: 1/p.lambda, var: 1/(p.lambda*p.lambda) };
                case 'poisson': return { mean: p.lambda, var: p.lambda };
                case 'binomial': return { mean: p.n * p.p, var: p.n * p.p * (1 - p.p) };
                case 'beta': return { mean: p.alpha/(p.alpha+p.beta), var: (p.alpha*p.beta)/(Math.pow(p.alpha+p.beta, 2)*(p.alpha+p.beta+1)) };
                case 'gamma': return { mean: p.alpha / p.beta, var: p.alpha / (p.beta * p.beta) };
                case 'chisquare': return { mean: p.k, var: 2 * p.k };
                case 'student_t': return { mean: 0, var: p.nu > 2 ? p.nu / (p.nu - 2) : Infinity };
                case 'laplace': return { mean: p.mu, var: 2 * p.b * p.b };
                case 'cauchy': return { mean: NaN, var: NaN }; 
                case 'lognormal': return { mean: Math.exp(p.mu + p.sigma*p.sigma/2), var: (Math.exp(p.sigma*p.sigma)-1)*Math.exp(2*p.mu + p.sigma*p.sigma) };
                case 'weibull': return { mean: p.lambda * gamma(1 + 1/p.k), var: p.lambda*p.lambda * (gamma(1 + 2/p.k) - Math.pow(gamma(1 + 1/p.k), 2)) };
                case 'pareto': return { mean: p.alpha > 1 ? (p.alpha * p.xm)/(p.alpha - 1) : Infinity, var: p.alpha > 2 ? (p.xm*p.xm * p.alpha) / (Math.pow(p.alpha-1, 2)*(p.alpha-2)) : Infinity };
                case 'logistic': return { mean: p.mu, var: (p.s*p.s * Math.PI*Math.PI)/3 };
                case 'rayleigh': return { mean: p.sigma * Math.sqrt(Math.PI/2), var: ((4-Math.PI)/2)*p.sigma*p.sigma };
                case 'bernoulli': return { mean: p.p, var: p.p*(1-p.p) };
                case 'geometric': return { mean: 1/p.p, var: (1-p.p)/(p.p*p.p) };
                case 'negative_binomial': return { mean: p.r/p.p, var: (p.r*(1-p.p))/(p.p*p.p) };
                case 'discrete_uniform': return { mean: (p.a+p.b)/2, var: ((p.b-p.a+1)*(p.b-p.a+1)-1)/12 };
                case 'hypergeometric': return { mean: p.n * (p.K/p.N), var: p.n * (p.K/p.N) * ((p.N-p.K)/p.N) * ((p.N-p.n)/(p.N-1)) };
                case 'f_dist': return { mean: p.d2 > 2 ? p.d2/(p.d2-2) : Infinity, var: p.d2 > 4 ? (2*p.d2*p.d2*(p.d1+p.d2-2))/(p.d1*Math.pow(p.d2-2, 2)*(p.d2-4)) : Infinity };
                default: return { mean: 0, var: 1 };
            }
        };

        const DIST_INFO = {
          normal: { name: "Normal (Gaussian)", desc: "The most important continuous distribution in statistics, describing symmetrical, bell-shaped data.", params: "Mean (μ), Standard Deviation (σ).", formula: "f(x) = (1 / σ√(2π)) * exp(-0.5 * ((x-μ)/σ)²)", uses: "Heights, measurement errors.", notes: "Symmetric. Skewness and Excess Kurtosis are 0." },
          beta: { name: "Beta", desc: "Models random variables limited to intervals of 0 and 1.", params: "Shape parameters α and β.", formula: "f(x) ∝ x^(α-1) * (1-x)^(β-1)", uses: "Prior distribution for binomial proportions.", notes: "Uniform when α=1, β=1." },
          gamma: { name: "Gamma", desc: "Models the waiting time until α events occur.", params: "Shape (α) and Rate (β).", formula: "f(x) = (β^α * x^(α-1) * e^(-βx)) / Γ(α)", uses: "Waiting times, rainfall amounts.", notes: "Reduces to Exponential when α=1." },
          exponential: { name: "Exponential", desc: "Models the time between events.", params: "Rate (λ).", formula: "f(x) = λ * e^(-λx)", uses: "Time until failure.", notes: "Memoryless property." },
          student_t: { name: "Student's t", desc: "Sampling distribution for estimating the mean when sample size is small.", params: "Degrees of Freedom (ν).", formula: "f(t) ∝ (1 + t²/ν)^-(ν+1)/2", uses: "T-tests.", notes: "Approaches Normal as ν increases." },
          f_dist: { name: "F-Distribution", desc: "Sampling distribution of the ratio of two scaled chi-square variables.", params: "Numerator df (d1), Denominator df (d2).", formula: "Based on Beta function.", uses: "ANOVA.", notes: "Always positive and right-skewed." },
          chisquare: { name: "Chi-Square", desc: "Sum of the squares of k independent standard normal random variables.", params: "Degrees of Freedom (k).", formula: "f(x) ∝ x^(k/2 - 1) * e^(-x/2)", uses: "Goodness-of-fit tests.", notes: "Special case of the Gamma distribution." },
          poisson: { name: "Poisson", desc: "Discrete distribution for the number of events occurring in a fixed interval.", params: "Rate (λ).", formula: "P(X=x) = (λ^x * e^-λ) / x!", uses: "Call center traffic.", notes: "Mean = Variance = λ." },
          binomial: { name: "Binomial", desc: "Number of successes in n independent Bernoulli trials.", params: "Trials (n), Probability (p).", formula: "P(X=x) = C(n,x) * p^x * (1-p)^(n-x)", uses: "Coin flips, quality control.", notes: "Approaches Poisson for large n, small p." },
          laplace: { name: "Laplace (Double Exponential)", desc: "Represents the difference between two independent, identically distributed exponential variables.", params: "Location (μ) and Scale (b).", formula: "f(x) = (1 / 2b) * exp(-|x - μ| / b)", uses: "Robust regression (L1 regularization/Lasso).", notes: "Sharper peak and fatter tails than Normal." },
          cauchy: { name: "Cauchy (Lorentz)", desc: "A distribution with undefined mean and variance due to its extreme heavy tails.", params: "Location (x₀) and Scale (γ).", formula: "f(x) = 1 / (πγ * [1 + ((x-x₀)/γ)²])", uses: "Physics (resonance behavior).", notes: "Law of Large Numbers does not apply." },
          lognormal: { name: "Log-Normal", desc: "A distribution of a variable whose logarithm is normally distributed.", params: "Log-Scale Mean (μ) and Log-Scale Std Dev (σ).", formula: "f(x) = (1 / xσ√(2π)) * exp(-(ln(x) - μ)² / (2σ²))", uses: "Stock prices, income distribution.", notes: "Always positive and right-skewed." },
          weibull: { name: "Weibull", desc: "Versatile distribution used extensively in reliability engineering.", params: "Shape (k) and Scale (λ).", formula: "f(x) = (k/λ) * (x/λ)^(k-1) * e^-(x/λ)^k", uses: "Lifespan of components, wind speed.", notes: "Reduces to Exponential when k=1." },
          pareto: { name: "Pareto", desc: "Power-law distribution demonstrating the 80-20 rule.", params: "Scale/Minimum (xm) and Shape (α).", formula: "f(x) = (α * xm^α) / x^(α+1)", uses: "Wealth distribution, internet traffic.", notes: "Heavy-tailed." },
          logistic: { name: "Logistic", desc: "Similar to the normal distribution but with heavier tails.", params: "Location (μ) and Scale (s).", formula: "f(x) = e^-(x-μ)/s / (s * (1 + e^-(x-μ)/s)²)", uses: "Logistic regression.", notes: "CDF is the standard logistic function." },
          rayleigh: { name: "Rayleigh", desc: "Distribution of the magnitude of a 2D vector whose components are independent normals.", params: "Scale (σ).", formula: "f(x) = (x / σ²) * exp(-x² / 2σ²)", uses: "Wind speed, signal processing.", notes: "Related to Chi-Square." },
          bernoulli: { name: "Bernoulli", desc: "Simplest discrete distribution; represents a single trial with two outcomes.", params: "Probability of success (p).", formula: "P(X=x) = p^x * (1-p)^(1-x)", uses: "A single coin toss.", notes: "Special case of Binomial with n=1." },
          geometric: { name: "Geometric", desc: "Number of trials needed to get the first success.", params: "Probability of success (p).", formula: "P(X=x) = p * (1-p)^(x-1)", uses: "Reliability, time until first failure.", notes: "Memoryless property." },
          negative_binomial: { name: "Negative Binomial", desc: "Number of trials needed to get r successes.", params: "Target successes (r) and Probability (p).", formula: "P(X=x) = C(x-1, r-1) * p^r * (1-p)^(x-r)", uses: "Overdispersed count data.", notes: "Generalizes the geometric distribution." },
          hypergeometric: { name: "Hypergeometric", desc: "Number of successes in n draws WITHOUT replacement from a population of size N.", params: "Population (N), Successes in Pop (K), Draws (n).", formula: "P(X=x) = [C(K,x) * C(N-K, n-x)] / C(N,n)", uses: "Quality control without replacement.", notes: "Approaches Binomial when N is large." },
          discrete_uniform: { name: "Discrete Uniform", desc: "A discrete distribution where a finite number of values are equally likely.", params: "Minimum (a) and Maximum (b).", formula: "P(X=x) = 1 / (b - a + 1)", uses: "Rolling a fair die.", notes: "Mean is (a+b)/2." },
          '1_sample_z': { name: "1-Sample Z-Test", desc: "Tests if sample mean differs from population mean (Variance KNOWN).", params: "Requires Known Population Variance.", formula: "Z = (x̄ - μ₀) / (σ / √n)", uses: "Large samples.", notes: "Central Limit Theorem." },
          '1_sample_t': { name: "1-Sample T-Test", desc: "Tests if sample mean differs from population mean (Variance UNKNOWN).", params: "Uses sample std dev (s).", formula: "t = (x̄ - μ₀) / (s / √n)", uses: "Small samples (n < 30).", notes: "Assumes normality." },
          '2_sample_z': { name: "2-Sample Z-Test", desc: "Tests if two sample means differ, assuming both population variances are KNOWN.", params: "Known variances σ₁² and σ₂².", formula: "Z = (x̄₁ - x̄₂ - d₀) / √(σ₁²/n₁ + σ₂²/n₂)", uses: "Comparing two distinct populations with historical variance data.", notes: "Rarely used in practice as variances are usually unknown." },
          '2_sample_t_eq': { name: "2-Sample T-Test (Equal Variance)", desc: "Tests if two sample means differ, assuming variances are unknown but EQUAL (Pooled).", params: "Uses Pooled Standard Deviation (Sp).", formula: "t = (x̄₁ - x̄₂ - d₀) / [Sp √(1/n₁ + 1/n₂)]", uses: "Comparing groups with similar dispersion.", notes: "Requires Levene's or F-test to confirm equal variance first." },
          '2_sample_t_uneq': { name: "Welch's T-Test", desc: "Tests if two sample means differ (Unequal Variances).", params: "Does not pool variances.", formula: "t = (x̄₁ - x̄₂) / √(s₁²/n₁ + s₂²/n₂)", uses: "Default 2-sample comparison.", notes: "Adjusts Degrees of Freedom." },
          '1_sample_prop': { name: "1-Proportion Z-Test", desc: "Tests if a sample proportion differs from a hypothesized population proportion.", params: "Assumes sample follows a binomial distribution.", formula: "Z = (p̂ - p₀) / √(p₀(1-p₀)/n)", uses: "Click-through rates, defect rates.", notes: "Requires n*p > 10 and n*(1-p) > 10." },
          '2_sample_prop': { name: "2-Proportion Z-Test", desc: "Tests if two sample proportions differ.", params: "Uses a pooled proportion estimate (p̂_pool) under H0.", formula: "Z = (p̂₁ - p̂₂) / √(p̂_pool(1-p̂_pool)(1/n₁ + 1/n₂))", uses: "A/B testing conversion rates.", notes: "Large sample assumption applies." },
          'anova': { name: "One-Way ANOVA", desc: "Tests if means of 3+ independent groups are different.", params: "Assumes normality and equal variances.", formula: "F = MST / MSE", uses: "Comparing multiple groups.", notes: "Requires post-hoc tests if significant." },
          'power_lab': { name: "Power & Errors Lab", desc: "Visualizes the tradeoff between Type I error (α), Type II error (β), and Statistical Power (1-β).", params: "Effect Size, Sample Size, Population Variance, Alpha level.", formula: "Power = P(Reject H0 | H1 is true)", uses: "Experimental design, Sample size calculation.", notes: "Lowering alpha increases beta. Increasing sample size reduces both." },
        };
        const TYPE_LABELS = { normal: 'Normal', beta: 'Beta', gamma: 'Gamma', exponential: 'Exponential', uniform: 'Uniform', laplace: 'Laplace', cauchy: 'Cauchy', lognormal: 'Log-Normal', weibull: 'Weibull', pareto: 'Pareto', logistic: 'Logistic', rayleigh: 'Rayleigh', binomial: 'Binomial', poisson: 'Poisson', bernoulli: 'Bernoulli', geometric: 'Geometric', negative_binomial: 'Neg Binomial', hypergeometric: 'Hypergeometric', discrete_uniform: 'Disc Uniform', student_t: "Student's t", f_dist: 'F-Dist', chisquare: 'Chi-Square' };

        const generateChartData = (domainMin, domainMax, resolution, dists) => {
            const data = []; let maxY = 0; const step = (domainMax - domainMin) / resolution;
            dists.forEach(dist => {
              const points = []; const isDiscrete = isDiscreteDist(dist.type) || dist.type === 'likelihood_discrete';
              const startX = isDiscrete ? Math.ceil(domainMin) : domainMin;
              const endX = isDiscrete ? Math.floor(domainMax) : domainMax;
              const xStep = isDiscrete ? 1 : step;
              const numSteps = isDiscrete ? Math.max(1, endX - startX) : resolution;
              
              for (let i = 0; i <= numSteps; i++) {
                let x = startX + i * xStep;
                
                // Handle floating-point precision to hit bounds accurately preventing Jeffreys curve distortion
                if (!isDiscrete) {
                    x = parseFloat(x.toFixed(8));
                }

                let y = 0;
                switch (dist.type) {
                  case 'normal': y = normalPDF(x, dist.params.mu, dist.params.sigma); break;
                  case 'beta': y = betaPDF(x, dist.params.alpha, dist.params.beta); break;
                  case 'gamma': y = gammaPDF(x, dist.params.alpha, dist.params.beta); break;
                  case 'exponential': y = exponentialPDF(x, dist.params.lambda); break;
                  case 'student_t': y = studentTPDF(x, dist.params.nu); break;
                  case 'chisquare': y = chiSquarePDF(x, dist.params.k); break;
                  case 'f_dist': y = fDistPDF(x, dist.params.d1, dist.params.d2); break;
                  case 'poisson': y = poissonPMF(x, dist.params.lambda); break;
                  case 'binomial': y = binomialPMF(x, dist.params.n, dist.params.p); break;
                  case 'uniform': y = uniformPDF(x, dist.params.a, dist.params.b); break;
                  case 'laplace': y = laplacePDF(x, dist.params.mu, dist.params.b); break;
                  case 'cauchy': y = cauchyPDF(x, dist.params.x0, dist.params.gammaVal); break;
                  case 'lognormal': y = lognormalPDF(x, dist.params.mu, dist.params.sigma); break;
                  case 'weibull': y = weibullPDF(x, dist.params.k, dist.params.lambda); break;
                  case 'pareto': y = paretoPDF(x, dist.params.xm, dist.params.alpha); break;
                  case 'logistic': y = logisticPDF(x, dist.params.mu, dist.params.s); break;
                  case 'rayleigh': y = rayleighPDF(x, dist.params.sigma); break;
                  case 'bernoulli': y = bernoulliPMF(x, dist.params.p); break;
                  case 'geometric': y = geometricPMF(x, dist.params.p); break;
                  case 'negative_binomial': y = negBinomialPMF(x, dist.params.r, dist.params.p); break;
                  case 'hypergeometric': y = hypergeometricPMF(x, dist.params.N, dist.params.K, dist.params.n); break;
                  case 'discrete_uniform': y = discreteUniformPMF(x, dist.params.a, dist.params.b); break;
                  case 'likelihood': if (dist.params.lType === 'binomial') y = Math.pow(x, dist.params.k) * Math.pow(1 - x, dist.params.n - dist.params.k) * dist.params.scale;
                                     else if (dist.params.lType === 'poisson') y = Math.pow(x, dist.params.k) * Math.exp(-dist.params.n * x) * dist.params.scale;
                                     else if (dist.params.lType === 'exponential') y = Math.pow(x, dist.params.n) * Math.exp(-x * dist.params.sumX) * dist.params.scale;
                                     else if (dist.params.lType === 'normal') y = normalPDF(x, dist.params.xBar, dist.params.sigma / Math.sqrt(dist.params.n)) * dist.params.scale; break;
                  default: y = 0; break;
                }
                if (!isNaN(y) && isFinite(y) && y >= 0) { points.push({ x, y }); if (y > maxY) maxY = y; }
              }
              data.push({ ...dist, points, isDiscrete });
            });
            return { data, maxY: maxY > 0 ? maxY * 1.15 : 1 }; 
        };

        const Plotter = ({ chartData, domainMin, domainMax, xLabel, yConfig, showCI = false, credibleInterval = null, testPoint = null, testValue = null }) => {
          const width = 800, height = 400, padding = 50, innerWidth = width - padding * 2, innerHeight = height - padding * 2;
          const maxY = yConfig.auto ? chartData.maxY : yConfig.max, minY = yConfig.auto ? 0 : yConfig.min;
          const scaleX = (x) => padding + ((x - domainMin) / (domainMax - domainMin)) * innerWidth;
          const scaleY = (y) => height - padding - ((y - minY) / (maxY - minY)) * innerHeight;

          const gridLines = [];
          for (let i = 0; i <= 10; i++) {
              const xVal = domainMin + (domainMax - domainMin) * (i / 10);
              gridLines.push(<g key={`grid-x-${i}`}><line x1={scaleX(xVal)} y1={padding} x2={scaleX(xVal)} y2={height - padding} stroke="#374151" /><text x={scaleX(xVal)} y={height - padding + 20} fill="#9ca3af" fontSize="12" textAnchor="middle">{fmt(xVal)}</text></g>);
          }
          if (yConfig.show) {
            for (let i = 0; i <= 5; i++) {
              const yVal = minY + (maxY - minY) * (i / 5);
              gridLines.push(<g key={`grid-y-${i}`}><line x1={padding} y1={scaleY(yVal)} x2={width - padding} y2={scaleY(yVal)} stroke="#374151" strokeDasharray="4,4" /><text x={padding - 10} y={scaleY(yVal) + 4} fill="#9ca3af" fontSize="12" textAnchor="end">{fmt(yVal)}</text></g>);
            }
          }
          return (
            <div className="relative w-full overflow-hidden bg-gray-900 rounded-xl border border-gray-700 shadow-2xl p-4">
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                {gridLines}
                <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />
                <text x={width / 2} y={height - 5} fill="#d1d5db" fontSize="14" textAnchor="middle">{xLabel}</text>
                {yConfig.show && <line x1={padding} y1={padding} x2={padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />}
                
                {showCI && credibleInterval && ( 
                    <rect x={scaleX(credibleInterval[0])} y={padding} width={scaleX(credibleInterval[1]) - scaleX(credibleInterval[0])} height={innerHeight} fill="#10b981" opacity="0.1" /> 
                )}
                
                {chartData.data.map((dist, i) => {
                  if (dist.points.length === 0) return null;
                  if (dist.isDiscrete) return ( <g key={`discrete-${i}`}>{dist.points.map((p, idx) => (<g key={idx}><line x1={scaleX(p.x)} y1={scaleY(0)} x2={scaleX(p.x)} y2={scaleY(p.y)} stroke={dist.color} strokeWidth="3" strokeDasharray={dist.isDashed ? "5,5" : "none"} opacity={0.8} /><circle cx={scaleX(p.x)} cy={scaleY(p.y)} r="4" fill={dist.color} /></g>))}</g>);
                  const pathData = dist.points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${scaleX(p.x)} ${scaleY(Math.max(minY, Math.min(maxY, p.y)))}`).join(' ');
                  return <path key={`cont-${i}`} d={pathData} fill="none" stroke={dist.color} strokeWidth="3" strokeDasharray={dist.isDashed ? "5,5" : "none"} />;
                })}
                
                {showCI && testPoint !== null && testValue !== null && (
                    <circle cx={scaleX(testPoint)} cy={scaleY(testValue)} r="6" fill="#ef4444" stroke="white" strokeWidth="2" />
                )}
              </svg>
              <div className="absolute top-6 right-6 flex flex-col gap-2 bg-gray-800/90 p-3 rounded-lg border border-gray-700 backdrop-blur-sm">
                {chartData.data.map((dist, i) => (
                  <div key={i} className="flex items-center gap-2"><div className="w-4 h-1" style={{ backgroundColor: dist.color, borderBottom: dist.isDashed ? '2px dashed white' : 'none' }}></div><span className="text-gray-200 text-sm font-bold">{dist.name}</span></div>
                ))}
              </div>
            </div>
          );
        };

        const HistogramPlotter = ({ data, domainMin, domainMax, bins = 30, color = "#8b5cf6", title, overlayNormal = null }) => {
            const width = 400, height = 250, padding = 40, innerWidth = width - padding * 2, innerHeight = height - padding * 2;
            
            const binnedData = useMemo(() => {
                if (!data || data.length === 0) return { counts: [], maxCount: 1, step: 1 };
                const step = (domainMax - domainMin) / bins;
                const binCounts = new Array(bins).fill(0);
                
                data.forEach(val => {
                    if (val >= domainMin && val <= domainMax) {
                        let binIndex = Math.floor((val - domainMin) / step);
                        if (binIndex >= bins) binIndex = bins - 1;
                        if (binIndex >= 0) binCounts[binIndex]++;
                    }
                });
                
                const maxCount = Math.max(...binCounts);
                return { counts: binCounts, maxCount: maxCount === 0 ? 1 : maxCount, step };
            }, [data, domainMin, domainMax, bins]);

            const scaleX = (val) => padding + ((val - domainMin) / (domainMax - domainMin)) * innerWidth;
            const scaleY = (count) => height - padding - (count / binnedData.maxCount) * innerHeight;

            const gridLines = [];
            for (let i = 0; i <= 5; i++) {
                const xVal = domainMin + (domainMax - domainMin) * (i / 5);
                gridLines.push(<g key={`grid-x-${i}`}><line x1={scaleX(xVal)} y1={padding} x2={scaleX(xVal)} y2={height - padding} stroke="#374151" strokeDasharray="2,2" /><text x={scaleX(xVal)} y={height - padding + 15} fill="#9ca3af" fontSize="10" textAnchor="middle">{fmt(xVal)}</text></g>);
            }

            let normalPath = "";
            if (overlayNormal && overlayNormal.show && !isNaN(overlayNormal.mean) && overlayNormal.se > 0 && overlayNormal.se !== Infinity) {
                const pathPoints = [];
                for (let i = 0; i <= 100; i++) {
                    const xVal = domainMin + (domainMax - domainMin) * (i / 100);
                    const pdfVal = normalPDF(xVal, overlayNormal.mean, overlayNormal.se);
                    const scaledY = pdfVal * data.length * binnedData.step;
                    pathPoints.push({ x: xVal, y: scaledY });
                }
                normalPath = pathPoints.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${scaleX(p.x)} ${scaleY(p.y)}`).join(' ');
            }

            return (
                <div className="relative w-full overflow-hidden bg-gray-950 rounded-xl border border-gray-800 shadow-inner p-2">
                    <div className="absolute top-2 left-4 text-xs font-bold text-gray-300">{title}</div>
                    {overlayNormal && overlayNormal.show && (
                        <div className="absolute top-2 right-4 flex items-center gap-1 text-[10px] text-red-400">
                            <span className="w-3 h-0.5 bg-red-400 border-b border-dashed border-red-400"></span>
                            Theoretical Normal
                        </div>
                    )}
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto mt-4">
                        {gridLines}
                        <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />
                        
                        {binnedData.counts.map((count, i) => {
                            if (count === 0) return null;
                            const x = scaleX(domainMin + i * binnedData.step);
                            const w = Math.max(1, (innerWidth / bins) * 0.9);
                            const y = scaleY(count);
                            const h = height - padding - y;
                            return <rect key={i} x={x} y={y} width={w} height={h} fill={color} opacity="0.8" stroke={color} strokeWidth="1" className="transition-all duration-300" />;
                        })}

                        {overlayNormal && overlayNormal.show && normalPath && (
                            <path d={normalPath} fill="none" stroke="#ef4444" strokeWidth="2" strokeDasharray="4,4" className="transition-all duration-300" />
                        )}
                    </svg>
                </div>
            );
        };

        const PowerPlotter = ({ mu0, muA, sigma, n, alphaLevel }) => {
            const width = 800, height = 350, padding = 50, innerWidth = width - padding * 2, innerHeight = height - padding * 2;
            const se = sigma / Math.sqrt(n);
            const zCrit = inverseNormalCDF(1 - alphaLevel);
            const xCrit = mu0 + zCrit * se;

            const domainMin = Math.min(mu0, muA) - 4 * se;
            const domainMax = Math.max(mu0, muA) + 4 * se;

            const scaleX = (x) => padding + ((x - domainMin) / (domainMax - domainMin)) * innerWidth;
            const maxY = normalPDF(mu0, mu0, se) * 1.1; 
            const scaleY = (y) => height - padding - (y / maxY) * innerHeight;

            const h0Points = [], haPoints = [];
            const steps = 300;
            const stepSize = (domainMax - domainMin) / steps;
            
            let alphaPathD = `M ${scaleX(xCrit)} ${scaleY(0)} `;
            let betaPathD = `M ${scaleX(domainMin)} ${scaleY(0)} `;
            let powerPathD = `M ${scaleX(xCrit)} ${scaleY(0)} `;

            for (let i = 0; i <= steps; i++) {
                const x = domainMin + i * stepSize;
                const y0 = normalPDF(x, mu0, se);
                const yA = normalPDF(x, muA, se);
                
                const sx = scaleX(x);
                h0Points.push({ x: sx, y: scaleY(y0) });
                haPoints.push({ x: sx, y: scaleY(yA) });

                if (x >= xCrit) {
                    alphaPathD += `L ${sx} ${scaleY(y0)} `;
                    powerPathD += `L ${sx} ${scaleY(yA)} `;
                }
                if (x <= xCrit) {
                    betaPathD += `L ${sx} ${scaleY(yA)} `;
                }
            }

            alphaPathD += `L ${scaleX(domainMax)} ${scaleY(0)} Z`;
            betaPathD += `L ${scaleX(xCrit)} ${scaleY(0)} Z`;
            powerPathD += `L ${scaleX(domainMax)} ${scaleY(0)} Z`;

            const h0PathStr = h0Points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const haPathStr = haPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

            return (
                <div className="relative w-full overflow-hidden bg-gray-900 rounded-xl border border-indigo-500/30 shadow-2xl p-4">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                        <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#6b7280" strokeWidth="2" />
                        <text x={width / 2} y={height - 10} fill="#d1d5db" fontSize="14" textAnchor="middle">Sample Mean (X̄)</text>

                        <path d={powerPathD} fill="#10b981" opacity="0.3" /> 
                        <path d={betaPathD} fill="#f59e0b" opacity="0.4" />  
                        <path d={alphaPathD} fill="#ef4444" opacity="0.6" /> 

                        <path d={h0PathStr} fill="none" stroke="#9ca3af" strokeWidth="3" strokeDasharray="5,5" />
                        <path d={haPathStr} fill="none" stroke="#3b82f6" strokeWidth="3" />

                        <line x1={scaleX(xCrit)} y1={padding} x2={scaleX(xCrit)} y2={height - padding} stroke="#ef4444" strokeWidth="2" />
                        <text x={scaleX(xCrit) + 5} y={padding + 10} fill="#ef4444" fontSize="12" fontWeight="bold">Critical Threshold</text>
                    </svg>

                    <div className="absolute top-4 right-4 bg-gray-800/90 p-3 rounded-lg border border-gray-700 backdrop-blur-sm text-sm">
                        <div className="flex items-center gap-2 mb-1"><div className="w-4 h-1 border-b-2 border-dashed border-gray-400"></div><span className="text-gray-300">H₀ Dist (Null)</span></div>
                        <div className="flex items-center gap-2 mb-2"><div className="w-4 h-1 bg-blue-500"></div><span className="text-gray-300">H₁ Dist (Alternative)</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-red-500 opacity-60"></div><span className="text-red-300">Alpha α (Type I)</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-amber-500 opacity-60"></div><span className="text-amber-300">Beta β (Type II)</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-emerald-500 opacity-40"></div><span className="text-emerald-300">Power (1 - β)</span></div>
                    </div>
                </div>
            );
        };

        const ScatterPlot = ({ scatterPlotData, inferenceSamples }) => {
          if (!scatterPlotData) return <div className="text-center text-gray-600 mt-10">Generate data to visualize</div>;
          const width = 800, height = 250, paddingX = 60, paddingY = 40;
          const innerWidth = width - paddingX * 2, innerHeight = height - paddingY * 2;
          const scaleX = (val) => paddingX + ((val - scatterPlotData.minVal) / (scatterPlotData.maxVal - scatterPlotData.minVal)) * innerWidth;
          const scaleY = (jitter) => paddingY + (jitter + 0.5) * innerHeight;
          const gridLines = Array.from({length: 11}).map((_, i) => {
              const val = scatterPlotData.minVal + (i / 10) * (scatterPlotData.maxVal - scatterPlotData.minVal);
              return (
                  <g key={`x-${i}`}>
                      <line x1={scaleX(val)} y1={paddingY} x2={scaleX(val)} y2={height - paddingY} stroke="#374151" strokeDasharray="4 4" />
                      <text x={scaleX(val)} y={height - paddingY + 20} fill="#9ca3af" fontSize="12" textAnchor="middle">{fmt(val)}</text>
                  </g>
              );
          });
          return (
            <div className="relative w-full h-full flex items-center justify-center">
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                 {gridLines}
                 <line x1={paddingX} y1={height - paddingY} x2={width - paddingX} y2={height - paddingY} stroke="#6b7280" strokeWidth="2" />
                 {scatterPlotData.points.map((p, i) => <circle key={`pt-${i}`} cx={scaleX(p.val)} cy={scaleY(p.jitter)} r="5" fill={p.color} opacity="0.75" stroke="#1f2937" strokeWidth="1" className="transition-all duration-300" />)}
              </svg>
              <div className="absolute top-2 right-4 flex flex-col gap-2 bg-gray-900/90 p-3 rounded-lg border border-gray-700 shadow-lg backdrop-blur-sm">
                {inferenceSamples.map(s => (
                  <div key={s.id} className="flex items-center gap-2">
                    <span className="w-3 h-3 rounded-full" style={{backgroundColor: s.color}}></span>
                    <span className="text-gray-200 text-xs font-bold">{s.name}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const getEquationTexts = (dist) => {
          const p = dist.params; let base = null, param = null;
          switch (dist.type) {
            case 'normal': base = <>f(x) = (1 / &sigma;&radic;(2&pi;)) e<sup>-&frac12; ((x-&mu;)/&sigma;)&sup2;</sup></>; param = <>f(x) = (1 / {fmt(p.sigma)}&radic;(2&pi;)) e<sup>-&frac12; ((x-{fmt(p.mu)})/{fmt(p.sigma)})&sup2;</sup></>; break;
            case 'beta': base = <>f(x) = [ x<sup>&alpha;-1</sup> (1-x)<sup>&beta;-1</sup> ] / B(&alpha;, &beta;)</>; param = <>f(x) = [ x<sup>{fmt(p.alpha - 1)}</sup> (1-x)<sup>{fmt(p.beta - 1)}</sup> ] / B({fmt(p.alpha)}, {fmt(p.beta)})</>; break;
            case 'gamma': base = <>f(x) = &beta;<sup>&alpha;</sup> x<sup>&alpha;-1</sup> e<sup>-&beta;x</sup> / &Gamma;(&alpha;)</>; param = <>f(x) = {fmt(p.beta)}<sup>{fmt(p.alpha)}</sup> x<sup>{fmt(p.alpha - 1)}</sup> e<sup>-{fmt(p.beta)}x</sup> / &Gamma;({fmt(p.alpha)})</>; break;
            case 'exponential': base = <>f(x) = &lambda; e<sup>-&lambda;x</sup></>; param = <>f(x) = {fmt(p.lambda)} e<sup>-{fmt(p.lambda)}x</sup></>; break;
            case 'uniform': base = <>f(x) = 1 / (b - a)</>; param = <>f(x) = 1 / ({fmt(p.b)} - {fmt(p.a)}) = {fmt(1 / (p.b - p.a))}</>; break;
            case 'laplace': base = <>f(x) = (1 / 2b) e<sup>-|x-&mu;|/b</sup></>; param = <>f(x) = (1 / {fmt(2 * p.b)}) e<sup>-|x-{fmt(p.mu)}|/{fmt(p.b)}</sup></>; break;
            case 'lognormal': base = <>f(x) = (1 / x&sigma;&radic;(2&pi;)) e<sup>-(ln(x)-&mu;)&sup2; / (2&sigma;&sup2;)</sup></>; param = <>f(x) = (1 / x({fmt(p.sigma)})&radic;(2&pi;)) e<sup>-(ln(x)-{fmt(p.mu)})&sup2; / (2({fmt(p.sigma)})&sup2;)</sup></>; break;
            case 'cauchy': base = <>f(x) = 1 / (&pi;&gamma;[1 + ((x-x₀)/&gamma;)&sup2;])</>; param = <>f(x) = 1 / (&pi;({fmt(p.gammaVal)})[1 + ((x-{fmt(p.x0)})/{fmt(p.gammaVal)})&sup2;])</>; break;
            case 'weibull': base = <>f(x) = (k/&lambda;) (x/&lambda;)<sup>k-1</sup> e<sup>-(x/&lambda;)<sup>k</sup></sup></>; param = <>f(x) = ({fmt(p.k)}/{fmt(p.lambda)}) (x/{fmt(p.lambda)})<sup>{fmt(p.k - 1)}</sup> e<sup>-(x/{fmt(p.lambda)})<sup>{fmt(p.k)}</sup></sup></>; break;
            case 'pareto': base = <>f(x) = (&alpha; x<sub>m</sub><sup>&alpha;</sup>) / x<sup>&alpha;+1</sup></>; param = <>f(x) = ({fmt(p.alpha)} &middot; {fmt(p.xm)}<sup>{fmt(p.alpha)}</sup>) / x<sup>{fmt(p.alpha + 1)}</sup></>; break;
            case 'logistic': base = <>f(x) = e<sup>-(x-&mu;)/s</sup> / (s(1 + e<sup>-(x-&mu;)/s</sup>)&sup2;)</>; param = <>f(x) = e<sup>-(x-{fmt(p.mu)})/{fmt(p.s)}</sup> / ({fmt(p.s)}(1 + e<sup>-(x-{fmt(p.mu)})/{fmt(p.s)}</sup>)&sup2;)</>; break;
            case 'rayleigh': base = <>f(x) = (x/&sigma;&sup2;) e<sup>-x&sup2;/(2&sigma;&sigma;)</sup></>; param = <>f(x) = (x/{fmt(p.sigma * p.sigma)}) e<sup>-x&sup2;/{fmt(2 * p.sigma * p.sigma)}</sup></>; break;
            case 'student_t': base = <>f(t) = C &middot; (1 + t&sup2;/&nu;)<sup>-(&nu;+1)/2</sup></>; param = <>f(t) = C &middot; (1 + t&sup2;/{fmt(p.nu)})<sup>-{fmt((p.nu + 1) / 2)}</sup></>; break;
            case 'f_dist': base = <>f(x) = C &middot; &radic;( (d<sub>1</sub>x)<sup>d<sub>1</sub></sup> d<sub>2</sub><sup>d<sub>2</sub></sup> / (d<sub>1</sub>x + d<sub>2</sub>)<sup>d<sub>1</sub>+d<sub>2</sub></sup> ) / x</>; param = <>f(x) = C &middot; &radic;( ({fmt(p.d1)}x)<sup>{fmt(p.d1)}</sup> {fmt(p.d2)}<sup>{fmt(p.d2)}</sup> / ({fmt(p.d1)}x + {fmt(p.d2)})<sup>{fmt(p.d1 + p.d2)}</sup> ) / x</>; break;
            case 'chisquare': base = <>f(x) = C &middot; x<sup>k/2 - 1</sup> e<sup>-x/2</sup></>; param = <>f(x) = C &middot; x<sup>{fmt(p.k / 2 - 1)}</sup> e<sup>-x/2</sup></>; break;
            case 'poisson': base = <>P(X=x) = &lambda;<sup>x</sup> e<sup>-&lambda;</sup> / x!</>; param = <>P(X=x) = {fmt(p.lambda)}<sup>x</sup> e<sup>-{fmt(p.lambda)}</sup> / x!</>; break;
            case 'binomial': base = <>P(X=x) = C(n, x) p<sup>x</sup> (1-p)<sup>n-x</sup></>; param = <>P(X=x) = C({fmt(p.n)}, x) {fmt(p.p)}<sup>x</sup> {fmt(1 - p.p)}<sup>{fmt(p.n)}-x</sup></>; break;
            case 'bernoulli': base = <>P(X=x) = p<sup>x</sup> (1-p)<sup>1-x</sup></>; param = <>P(X=x) = {fmt(p.p)}<sup>x</sup> {fmt(1 - p.p)}<sup>1-x</sup></>; break;
            case 'geometric': base = <>P(X=x) = p(1-p)<sup>x-1</sup></>; param = <>P(X=x) = {fmt(p.p)}({fmt(1 - p.p)})<sup>x-1</sup></>; break;
            case 'negative_binomial': base = <>P(X=x) = C(x-1, r-1) p<sup>r</sup> (1-p)<sup>x-r</sup></>; param = <>P(X=x) = C(x-1, {fmt(p.r - 1)}) {fmt(p.p)}<sup>{fmt(p.r)}</sup> {fmt(1 - p.p)}<sup>x-{fmt(p.r)}</sup></>; break;
            case 'hypergeometric': base = <>P(X=x) = [C(K,x) C(N-K, n-x)] / C(N,n)</>; param = <>P(X=x) = [C({fmt(p.K)},x) C({fmt(p.N - p.K)}, {fmt(p.n)}-x)] / C({fmt(p.N)},{fmt(p.n)})</>; break;
            case 'discrete_uniform': base = <>P(X=x) = 1 / (b - a + 1)</>; param = <>P(X=x) = 1 / ({fmt(p.b)} - {fmt(p.a)} + 1) = {fmt(1 / (p.b - p.a + 1))}</>; break;
            case 'likelihood':
            case 'likelihood_discrete':
              if (p.lType === 'binomial') { base = <>L(p|data) &prop; p<sup>k</sup> (1-p)<sup>n-k</sup></>; param = <>L(p) &prop; p<sup>{fmt(p.k)}</sup> (1-p)<sup>{fmt(p.n - p.k)}</sup></>; } 
              else if (p.lType === 'poisson') { base = <>L(&lambda;|data) &prop; &lambda;<sup>&Sigma;x</sup> e<sup>-n&lambda;</sup></>; param = <>L(&lambda;) &prop; &lambda;<sup>{fmt(p.k)}</sup> e<sup>-{fmt(p.n)}&lambda;</sup></>; } 
              else if (p.lType === 'exponential') { base = <>L(&lambda;|data) &prop; &lambda;<sup>n</sup> e<sup>-&lambda;&Sigma;x</sup></>; param = <>L(&lambda;) &prop; &lambda;<sup>{fmt(p.n)}</sup> e<sup>-{fmt(p.sumX)}&lambda;</sup></>; } 
              else if (p.lType === 'normal') { base = <>L(&mu;|data) &prop; e<sup>-(n/2&sigma;&sup2;) (x̄-&mu;)&sup2;</sup></>; param = <>L(&mu;) &prop; e<sup>-({fmt(p.n)} / 2({fmt(p.sigma)})&sup2;) ({fmt(p.xBar)} - &mu;)&sup2;</sup></>; } break;
            default: base = <>Equation not available</>; param = <>N/A</>;
          }
          return { base, param };
        };

        const EquationsTable = ({ distsToRender }) => {
          if (!distsToRender || distsToRender.length === 0) return null;
          return (
            <div className="mt-8 bg-gray-900 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
              <div className="bg-gray-800 p-4 border-b border-gray-700"><h2 className="text-xl font-bold text-blue-400">Mathematical Equations</h2></div>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm text-gray-300">
                  <thead className="bg-gray-800/50 text-gray-400"><tr><th className="p-4 font-semibold w-1/4">Distribution</th><th className="p-4 font-semibold w-1/3">Base Equation</th><th className="p-4 font-semibold">Parameterized Equation</th></tr></thead>
                  <tbody className="divide-y divide-gray-800">
                    {distsToRender.map((dist, idx) => {
                      const { base, param } = getEquationTexts(dist);
                      return (<tr key={idx} className="hover:bg-gray-800/20"><td className="p-4 flex items-center gap-2"><span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: dist.color}}></span><span>{dist.name}</span></td><td className="p-4 font-serif text-base md:text-lg text-pink-300">{base}</td><td className="p-4 font-serif text-base md:text-lg text-emerald-300">{param}</td></tr>);
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        };

        // --- Main Application ---
        function App() {
          const [activeTab, setActiveTab] = useState('regression'); 
          const [infoModal, setInfoModal] = useState(null);
          
          // --- States ---
          const [xAxisBounds, setXAxisBounds] = useState({ min: -5, max: 10 });
          const [yAxisConfig, setYAxisConfig] = useState({ show: true, auto: true, min: 0, max: 1 });
          const [bayesYAxisConfig, setBayesYAxisConfig] = useState({ show: true, auto: true, max: 1 });
          
          const [distributions, setDistributions] = useState([
            { id: 1, type: 'normal', color: '#3b82f6', params: { mu: 0, sigma: 1 }, name: 'Normal 1' },
            { id: 2, type: 'poisson', color: '#ec4899', params: { lambda: 4 }, name: 'Poisson 2' }
          ]);

          const [bayesState, setBayesState] = useState({
            type: 'beta-binomial', prior1: 2, prior2: 2, data1: 10, data2: 7, data3: 1, testPoint: 0.5, ciLevel: 0.95
          });

          const [inferenceSamples, setInferenceSamples] = useState([
            { id: 1, name: 'Sample A', size: 50, type: 'normal', params: { mu: 100, sigma: 15 }, data: [], color: '#8b5cf6' },
            { id: 2, name: 'Sample B', size: 50, type: 'normal', params: { mu: 105, sigma: 15 }, data: [], color: '#ec4899' },
            { id: 3, name: 'Sample C', size: 50, type: 'normal', params: { mu: 110, sigma: 15 }, data: [], color: '#10b981' }
          ]);
          
          const [testConfig, setTestConfig] = useState({
            testType: 'anova', target1: 1, target2: 2, anovaTargets: [1, 2, 3],
            hypoMean: 100, knownVar1: 15, knownVar2: 15, tails: 'two', ciLevel: 0.95
          });

          const [cltState, setCltState] = useState({
              dist: { id: 99, type: 'exponential', params: { lambda: 1 } },
              sampleSize: 30, numSamples: 1000, popData: [], sampleMeans: [], theoreticalMean: 0, theoreticalSE: 0, empiricalMean: 0, empiricalSE: 0, isAnimating: false, progress: 0
          });

          const [powerState, setPowerState] = useState({
              mu0: 100, muA: 105, sigma: 15, n: 30, alpha: 0.05
          });

          // --- Advanced Regression Lab State ---
          const [regConfig, setRegConfig] = useState({
              type: 'linear', 
              ciLevel: 0.95,
              showCI: true,
              diagView: 'residuals',
              xMin: 0, xMax: 10, yMin: 0, yMax: 15
          });

          const [regressionPoints, setRegressionPoints] = useState([
              { id: 1, x: 1, y: 2 }, { id: 2, x: 2, y: 4 }, { id: 3, x: 3, y: 5 },
              { id: 4, x: 4, y: 4 }, { id: 5, x: 5, y: 7 }, { id: 6, x: 6, y: 8 },
              { id: 7, x: 7, y: 7 }, { id: 8, x: 8, y: 9 }, { id: 9, x: 9, y: 11 }
          ]);
          const [draggingPoint, setDraggingPoint] = useState(null);

          // --- General Data Handlers ---
          const addDistribution = () => {
            if (distributions.length >= 6) return;
            const newId = distributions.length > 0 ? Math.max(...distributions.map(d => d.id)) + 1 : 1;
            const colors = ['#f59e0b', '#10b981', '#8b5cf6', '#ef4444', '#06b6d4', '#f472b6'];
            setDistributions([...distributions, { id: newId, type: 'normal', color: colors[newId % colors.length], params: { mu: 0, sigma: 1 }, name: `Normal ${newId}` }]);
          };
          
          const removeDistribution = (id) => setDistributions(distributions.filter(d => d.id !== id));
          
          const getParamsForType = (newType) => {
              switch (newType) {
                  case 'normal': return { mu: 0, sigma: 1 };
                  case 'beta': case 'gamma': return { alpha: 2, beta: 2 };
                  case 'exponential': return { lambda: 1 };
                  case 'uniform': return { a: -2, b: 2 };
                  case 'laplace': return { mu: 0, b: 1 };
                  case 'cauchy': return { x0: 0, gammaVal: 1 };
                  case 'lognormal': return { mu: 0, sigma: 1 };
                  case 'weibull': return { k: 1.5, lambda: 1 };
                  case 'pareto': return { xm: 1, alpha: 3 };
                  case 'logistic': return { mu: 0, s: 1 };
                  case 'rayleigh': return { sigma: 1 };
                  case 'binomial': return { n: 10, p: 0.5 };
                  case 'poisson': return { lambda: 4 };
                  case 'bernoulli': case 'geometric': return { p: 0.5 };
                  case 'negative_binomial': return { r: 3, p: 0.5 };
                  case 'hypergeometric': return { N: 50, K: 10, n: 10 };
                  case 'discrete_uniform': return { a: 1, b: 6 };
                  case 'student_t': return { nu: 5 };
                  case 'f_dist': return { d1: 5, d2: 5 };
                  case 'chisquare': return { k: 5 };
                  default: return { mu: 0, sigma: 1 };
              }
          };

          const updateDistType = (id, newType) => {
            setDistributions(distributions.map(d => {
              if (d.id === id) { return { ...d, type: newType, params: getParamsForType(newType), name: `${TYPE_LABELS[newType] || newType} ${id}` }; }
              return d;
            }));
          };
          
          const updateDistParam = (id, paramName, value) => {
            const parsedValue = value === '' ? '' : parseFloat(value);
            setDistributions(distributions.map(d => d.id === id ? { ...d, params: { ...d.params, [paramName]: isNaN(parsedValue) && parsedValue !== '' ? 0 : parsedValue } } : d));
          };

          const updateCltDistType = (newType) => { setCltState(prev => ({ ...prev, dist: { ...prev.dist, type: newType, params: getParamsForType(newType) }, isAnimating: false })); };
          const updateCltDistParam = (paramName, value) => {
              const parsedValue = value === '' ? '' : parseFloat(value);
              setCltState(prev => ({ ...prev, dist: { ...prev.dist, params: { ...prev.dist.params, [paramName]: isNaN(parsedValue) && parsedValue !== '' ? 0 : parsedValue } }, isAnimating: false }));
          };

          const updateBayesState = (key, value) => {
            const parsedValue = value === '' ? '' : parseFloat(value);
            setBayesState(prev => {
              const newState = { ...prev, [key]: isNaN(parsedValue) && parsedValue !== '' ? 0 : parsedValue };
              if (key === 'data1' && ['beta-binomial', 'jeffreys-binomial'].includes(prev.type) && newState.data2 > newState.data1) newState.data2 = newState.data1;
              return newState;
            });
          };

          const switchBayesCase = (newType) => {
            switch (newType) {
              case 'beta-binomial': setBayesState(p => ({ ...p, type: newType, prior1: 2, prior2: 2, data1: 10, data2: 7, testPoint: 0.5 })); break;
              case 'gamma-poisson': setBayesState(p => ({ ...p, type: newType, prior1: 2, prior2: 1, data1: 5, data2: 15, testPoint: 3 })); break;
              case 'gamma-exponential': setBayesState(p => ({ ...p, type: newType, prior1: 2, prior2: 1, data1: 5, data2: 10, testPoint: 0.5 })); break;
              case 'normal-normal': setBayesState(p => ({ ...p, type: newType, prior1: 0, prior2: 2, data1: 5, data2: 2, data3: 1.5, testPoint: 1 })); break;
              case 'jeffreys-binomial': setBayesState(p => ({ ...p, type: newType, prior1: 0.5, prior2: 0.5, data1: 10, data2: 7, testPoint: 0.5 })); break;
              default: break;
            }
          };

          const addInferenceSample = () => {
            const newId = inferenceSamples.length > 0 ? Math.max(...inferenceSamples.map(s => s.id)) + 1 : 1;
            const colors = ['#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#ef4444'];
            setInferenceSamples([...inferenceSamples, { id: newId, name: `Sample ${newId}`, size: 30, type: 'normal', params: { mu: 50, sigma: 10 }, data: [], color: colors[newId % colors.length] }]);
          };
          
          const removeInferenceSample = (id) => {
            setInferenceSamples(inferenceSamples.filter(s => s.id !== id));
            setTestConfig(prev => ({ ...prev, anovaTargets: prev.anovaTargets.filter(tid => tid !== id), target1: prev.target1 == id ? '' : prev.target1, target2: prev.target2 == id ? '' : prev.target2 }));
          };
          
          const updateSampleType = (id, newType) => {
            setInferenceSamples(inferenceSamples.map(s => {
              if (s.id === id) { return { ...s, type: newType, params: getParamsForType(newType), data: [] }; }
              return s;
            }));
          };
          
          const updateSampleParam = (id, key, val) => {
            const parsedValue = val === '' ? '' : parseFloat(val);
            setInferenceSamples(inferenceSamples.map(s => s.id === id ? { ...s, params: { ...s.params, [key]: isNaN(parsedValue) && parsedValue !== '' ? 0 : parsedValue } } : s));
          };

          const generateDataForSamples = () => {
            setInferenceSamples(prev => prev.map(samp => {
              let newData = [];
              for (let i = 0; i < samp.size; i++) { newData.push(randomFromDist(samp.type, samp.params)); }
              return { ...samp, data: newData };
            }));
          };

          // --- CLT Engine ---
          useEffect(() => {
              const stats = getDistStats(cltState.dist.type, cltState.dist.params);
              let newPopData = [];
              for(let i=0; i<5000; i++) newPopData.push(randomFromDist(cltState.dist.type, cltState.dist.params));
              setCltState(prev => ({
                  ...prev, popData: newPopData, theoreticalMean: stats.mean, theoreticalSE: Math.sqrt(stats.var / prev.sampleSize), sampleMeans: [], empiricalMean: 0, empiricalSE: 0, isAnimating: false, progress: 0
              }));
          }, [cltState.dist.type, JSON.stringify(cltState.dist.params), cltState.sampleSize]);

          const startCLTSimulation = () => { setCltState(prev => ({ ...prev, sampleMeans: [], empiricalMean: 0, empiricalSE: 0, isAnimating: true, progress: 0 })); };

          useEffect(() => {

              const t = (st1.mean - st2.mean - targetHypoMean) / se; const tCrit = getTCrit(ciLevel, df);

              const v1 = st1.var/st1.n, v2 = st2.var/st2.n; const df = Math.pow(v1 + v2, 2) / (Math.pow(v1, 2)/(st1.n-1) + Math.pow(v2, 2)/(st2.n-1)); const tCrit = getTCrit(ciLevel, df);

              const seCI = Math.sqrt(p1*(1-p1)/n1 + p2*(1-p2)/n2); result.ciBase = 'CI = (p̂₁ - p̂₂) ± Z * SE'; result.ciSub = `CI = ${fmt(p1 - p2)} ± ${fmt(zCrit)} * ${fmt(seCI)}`; result.ci = [(p1 - p2) - zCrit * seCI, (p1 - p2) + zCrit * seCI];

              case 'laplace': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Location (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'cauchy': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Location (x₀)</span> <span>{fmt(p.x0)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.x0} onChange={(e) => update('x0', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (γ)</span> <span>{fmt(p.gammaVal)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.gammaVal} onChange={(e) => update('gammaVal', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'lognormal': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Log-Mean (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-5" max="5" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Log-Std (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="3" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'weibull': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Shape (k)</span> <span>{fmt(p.k)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.k} onChange={(e) => update('k', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'pareto': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Min (xm)</span> <span>{fmt(p.xm)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.xm} onChange={(e) => update('xm', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(p.alpha)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.alpha} onChange={(e) => update('alpha', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'logistic': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Location (μ)</span> <span>{fmt(p.mu)}</span></label><input type="range" min="-10" max="10" step="0.5" value={p.mu} onChange={(e) => update('mu', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Scale (s)</span> <span>{fmt(p.s)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.s} onChange={(e) => update('s', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'rayleigh': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Scale (σ)</span> <span>{fmt(p.sigma)}</span></label><input type="range" min="0.1" max="5" step="0.1" value={p.sigma} onChange={(e) => update('sigma', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'poisson': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Rate (λ)</span> <span>{fmt(p.lambda)}</span></label><input type="range" min="1" max="30" step="1" value={p.lambda} onChange={(e) => update('lambda', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'binomial': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Trials (n)</span> <span>{fmt(p.n)}</span></label><input type="range" min="1" max="50" step="1" value={p.n} onChange={(e) => update('n', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0" max="1" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'bernoulli': case 'geometric': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0.05" max="1" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'negative_binomial': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Successes (r)</span> <span>{fmt(p.r)}</span></label><input type="range" min="1" max="20" step="1" value={p.r} onChange={(e) => update('r', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Prob (p)</span> <span>{fmt(p.p)}</span></label><input type="range" min="0.05" max="0.95" step="0.05" value={p.p} onChange={(e) => update('p', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'hypergeometric': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Pop (N)</span> <span>{fmt(p.N)}</span></label><input type="range" min="1" max="100" step="1" value={p.N} onChange={(e) => { update('N', e.target.value); if (p.K > e.target.value) update('K', e.target.value); if (p.n > e.target.value) update('n', e.target.value); }} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Succ in Pop (K)</span> <span>{fmt(p.K)}</span></label><input type="range" min="0" max={p.N} step="1" value={p.K} onChange={(e) => update('K', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Sample (n)</span> <span>{fmt(p.n)}</span></label><input type="range" min="1" max={p.N} step="1" value={p.n} onChange={(e) => update('n', e.target.value)} className="w-full accent-blue-500" /></> );
              case 'discrete_uniform': return ( <><label className="text-sm text-gray-400 flex justify-between"><span>Min (a)</span> <span>{fmt(p.a)}</span></label><input type="range" min="-10" max="10" step="1" value={p.a} onChange={(e) => update('a', e.target.value)} className="w-full accent-blue-500 mb-2" /><label className="text-sm text-gray-400 flex justify-between"><span>Max (b)</span> <span>{fmt(p.b)}</span></label><input type="range" min="-10" max="20" step="1" value={p.b} onChange={(e) => update('b', e.target.value)} className="w-full accent-blue-500" /></> );
              default: return null;
            }
          };

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans p-6" dir="ltr">
              {infoModal && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                  <div className="bg-gray-900 border border-blue-500/30 rounded-2xl max-w-2xl w-full p-6 shadow-2xl relative">
                    <button onClick={() => setInfoModal(null)} className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
                    <h2 className="text-3xl font-bold text-blue-400 mb-4">{DIST_INFO[infoModal]?.name || 'Info'}</h2>
                    <div className="space-y-4 text-gray-300">
                      <p><strong className="text-white">Description:</strong> {DIST_INFO[infoModal]?.desc}</p>
                      <p><strong className="text-white">Params:</strong> {DIST_INFO[infoModal]?.params}</p>
                      <div className="bg-gray-950 p-3 rounded font-mono text-pink-400">{DIST_INFO[infoModal]?.formula}</div>
                      <p><strong className="text-white">Uses:</strong> {DIST_INFO[infoModal]?.uses}</p>
                      <p className="text-sm text-gray-400 italic mt-4 border-t border-gray-800 pt-2">{DIST_INFO[infoModal]?.notes}</p>
                    </div>
                  </div>
                </div>
              )}

              <div className="max-w-7xl mx-auto">
                <header className="mb-8 text-center">
                  <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-2">
                    Advanced Statistics & Inference Lab
                  </h1>
                  <p className="text-gray-400 text-sm max-w-2xl mx-auto mb-2">
                    Interactive platform for exploring probability distributions, hypothesis testing, and advanced regressions.
                  </p>
                  <div className="flex justify-center items-center gap-3 text-xs text-gray-500 font-mono">
                    <span className="bg-gray-800/50 px-2 py-1 rounded border border-gray-800">Version 2.5 - 2026</span>
                    <span>•</span>
                    <span>Powered by Eng. Soliman Ghonimy</span>
                  </div>
                </header>

                <div className="flex flex-wrap justify-center gap-4 mb-8">
                  <button onClick={() => setActiveTab('regression')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'regression' ? 'bg-teal-600 text-white shadow-lg shadow-teal-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Advanced Regression Lab</button>
                  <button onClick={() => setActiveTab('explorer')} className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === 'explorer' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Distributions Explorer</button>
