                          <span className="text-gray-400">X-Axis Bounds:</span>
                          <input type="number" value={xAxisBounds.min} onChange={e => setXAxisBounds({ ...xAxisBounds, min: parseFloat(e.target.value) || 0 })} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />
                          <span>to</span>
                          <input type="number" value={xAxisBounds.max} onChange={e => setXAxisBounds({ ...xAxisBounds, max: parseFloat(e.target.value) || 0 })} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" />
                        </div>
                        <div className="w-px h-6 bg-gray-700 hidden md:block"></div>
                        <div className="flex items-center gap-2">
                          <label className="flex items-center gap-1 cursor-pointer">
                            <input type="checkbox" checked={yAxisConfig.show} onChange={e => setYAxisConfig({...yAxisConfig, show: e.target.checked})} className="accent-blue-500" />
                            <span className="text-gray-400">Show Y-Axis</span>
                          </label>
                          <select value={yAxisConfig.auto ? 'auto' : 'manual'} onChange={e => setYAxisConfig({...yAxisConfig, auto: e.target.value === 'auto'})} className="bg-gray-800 border-gray-700 text-white p-1 rounded">
                            <option value="auto">Auto Scale</option>
                            <option value="manual">Manual Max</option>
                          </select>
                          {!yAxisConfig.auto && (
                            <input type="number" step="0.1" value={yAxisConfig.max} onChange={e => setYAxisConfig({...yAxisConfig, max: parseFloat(e.target.value) || 1})} className="w-16 bg-gray-800 text-white p-1 border border-gray-700 text-center" placeholder="Max Y" />
                          )}
                        </div>
                      </div>
                    </div>
                    
                    <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col gap-4 h-fit max-h-[800px] overflow-y-auto">
                      <div className="flex justify-between items-center border-b border-gray-700 pb-2">
                        <h2 className="text-xl font-bold text-blue-400">Control Panel</h2>
                        <button onClick={addDistribution} className="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded shadow">+ Add Dist</button>
                      </div>
                      
                      {distributions.map((dist) => (
                        <div key={dist.id} className="bg-gray-800 p-4 rounded-lg border border-gray-700 relative">
                          <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2">
                              <span className="w-3 h-3 rounded-full" style={{backgroundColor: dist.color}}></span>
                              <select 
                                value={dist.type} 
                                onChange={(e) => updateDistType(dist.id, e.target.value)}
                                className="bg-gray-900 text-white text-sm border border-gray-600 rounded p-1 w-28"
                              >
                                <optgroup label="Continuous Distributions">
                                  <option value="normal">Normal</option>
                                  <option value="beta">Beta</option>
                                  <option value="gamma">Gamma</option>
                                  <option value="exponential">Exponential</option>
                                  <option value="uniform">Uniform</option>
                                  <option value="laplace">Laplace</option>
                                  <option value="lognormal">Log-Normal</option>
                                  <option value="cauchy">Cauchy</option>
                                  <option value="weibull">Weibull</option>
                                  <option value="pareto">Pareto</option>
                                  <option value="logistic">Logistic</option>
                                  <option value="rayleigh">Rayleigh</option>
                                </optgroup>
                                <optgroup label="Discrete Distributions">
                                  <option value="binomial">Binomial</option>
                                  <option value="poisson">Poisson</option>
                                  <option value="bernoulli">Bernoulli</option>
                                  <option value="geometric">Geometric</option>
                                  <option value="negative_binomial">Negative Binomial</option>
                                  <option value="hypergeometric">Hypergeometric</option>
                                  <option value="discrete_uniform">Discrete Uniform</option>
                                </optgroup>
                                <optgroup label="Sampling Distributions">
                                  <option value="student_t">Student's t</option>
                                  <option value="f_dist">F-Distribution</option>
                                  <option value="chisquare">Chi-Square</option>
                                </optgroup>
                              </select>
                              <button onClick={() => setInfoModal(dist.type)} className="text-blue-400 hover:text-blue-300 text-lg bg-gray-900 rounded-full w-6 h-6 flex justify-center items-center" title="Distribution Info">ℹ</button>
                            </div>
                            <button onClick={() => removeDistribution(dist.id)} className="text-red-400 hover:text-red-300 text-xl leading-none">&times;</button>
                          </div>
                          {renderDistributionParams(dist)}
                        </div>
                      ))}
                      {distributions.length === 0 && (
                         <div className="text-center text-gray-500 py-4">Click Add to insert distributions</div>
                      )}
                    </div>
                  </div>
                )}

                {activeTab === 'inference' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div className="lg:col-span-7 space-y-6">
                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
                          <h2 className="text-xl font-bold text-purple-400 mb-4">Samples Visualization (Overlapping Scatter)</h2>
                          <div className="border border-gray-700 relative mb-4 rounded-lg bg-gray-950 flex flex-col justify-between py-2 overflow-hidden">
                              <ScatterPlot />
                          </div>
                       </div>

                       {inferenceResults?.statVal !== 0 ? (
                       <div className="bg-gray-900 p-6 rounded-xl border border-purple-500/30 shadow-xl">
                          <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                            <h2 className="text-xl font-bold text-purple-400 flex items-center gap-2">
                              Formal Hypothesis Testing
                              <button onClick={() => setInfoModal(testConfig.testType)} className="text-blue-400 hover:text-blue-300 text-sm bg-gray-800 rounded-full w-6 h-6 flex justify-center items-center">ℹ</button>
                            </h2>
                          </div>
                          <div className="space-y-6">
                              <div className="bg-gray-800 p-4 rounded-lg">
                                <div className="text-xs text-gray-500 mb-2 uppercase tracking-wide font-bold">Mathematical Equations</div>
                                <div className="space-y-2">
                                  <div className="flex flex-col">
                                    <span className="text-sm text-gray-400">Base Formula:</span>
                                    <span className="font-serif text-lg text-pink-300 tracking-wider bg-gray-950 p-2 rounded inline-block">{inferenceResults.baseEq}</span>
                                  </div>
                                  <div className="flex flex-col">
                                    <span className="text-sm text-gray-400">Substituted Values:</span>
                                    <span className="font-serif text-lg text-emerald-300 tracking-wider bg-gray-950 p-2 rounded inline-block">{inferenceResults.subEq}</span>
                                  </div>
                                </div>
                              </div>

                              {testConfig.testType === 'anova' && inferenceResults.anovaTable && (
                                <div className="bg-gray-800 p-4 rounded-lg border-t-2 border-purple-500">
                                  <div className="text-xs text-gray-500 mb-2 uppercase tracking-wide font-bold">Analysis of Variance (ANOVA) Table</div>
                                  <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm text-gray-300 border-collapse">
                                      <thead className="bg-gray-950 text-gray-400">
                                        <tr>
                                          <th className="p-2 border border-gray-700 font-semibold">Source of Variation</th>
                                          <th className="p-2 border border-gray-700 font-semibold">Sum of Squares (SS)</th>
                                          <th className="p-2 border border-gray-700 font-semibold">df</th>
                                          <th className="p-2 border border-gray-700 font-semibold">Mean Square (MS)</th>
                                          <th className="p-2 border border-gray-700 font-semibold">F</th>
                                          <th className="p-2 border border-gray-700 font-semibold">P-value</th>
                                        </tr>
                                      </thead>
                                      <tbody className="divide-y divide-gray-700">
                                        <tr className="bg-gray-800 hover:bg-gray-750">
                                          <td className="p-2 border border-gray-700 font-medium">Between Groups (Treatment)</td>
                                          <td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.sst)}</td>
                                          <td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfT}</td>
                                          <td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.mst)}</td>
                                          <td className="p-2 border border-gray-700 font-mono text-purple-400 font-bold">{fmt(inferenceResults.anovaTable.f)}</td>
                                          <td className="p-2 border border-gray-700 font-mono font-bold text-amber-400">{fmt(inferenceResults.anovaTable.p)}</td>
                                        </tr>
                                        <tr className="bg-gray-800 hover:bg-gray-750">
                                          <td className="p-2 border border-gray-700 font-medium">Within Groups (Error)</td>
                                          <td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.sse)}</td>
                                          <td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfE}</td>
                                          <td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.mse)}</td>
                                          <td className="p-2 border border-gray-700 bg-gray-900/50"></td>
                                          <td className="p-2 border border-gray-700 bg-gray-900/50"></td>
                                        </tr>
                                        <tr className="bg-gray-900 font-bold">
                                          <td className="p-2 border border-gray-700">Total</td>
                                          <td className="p-2 border border-gray-700 font-mono">{fmt(inferenceResults.anovaTable.ssTotal)}</td>
                                          <td className="p-2 border border-gray-700 font-mono">{inferenceResults.anovaTable.dfTotal}</td>
                                          <td className="p-2 border border-gray-700 bg-gray-900/50"></td>
                                          <td className="p-2 border border-gray-700 bg-gray-900/50"></td>
                                          <td className="p-2 border border-gray-700 bg-gray-900/50"></td>
                                        </tr>
                                      </tbody>
                                    </table>
                                  </div>
                                  <div className={`mt-3 p-2 rounded text-center text-sm font-bold ${inferenceResults.pValue < (1-testConfig.ciLevel) ? 'bg-red-900/30 text-red-400' : 'bg-emerald-900/30 text-emerald-400'}`}>
                                    {inferenceResults.decision}
                                  </div>
                                </div>
                              )}

                              {testConfig.testType !== 'anova' && (
                                <>
                                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                      <div className="bg-gray-800 p-3 rounded-lg border-l-2 border-purple-500">
                                        <div className="text-xs text-gray-400">Statistic ({inferenceResults.statName})</div>
                                        <div className="text-xl text-white font-mono">{fmt(inferenceResults.statVal)}</div>
                                      </div>
                                      <div className="bg-gray-800 p-3 rounded-lg border-l-2 border-purple-500">
                                        <div className="text-xs text-gray-400">Degrees of Freedom</div>
                                        <div className="text-xl text-white font-mono">{inferenceResults.df !== null ? fmt(inferenceResults.df) : 'N/A'}</div>
                                      </div>
                                      <div className={`bg-gray-800 p-3 rounded-lg border-l-2 col-span-2 ${inferenceResults.pValue < (1-testConfig.ciLevel) ? 'border-red-500' : 'border-emerald-500'}`}>
                                        <div className="text-xs text-gray-400">P-Value ({testConfig.tails} tail)</div>
                                        <div className="text-xl text-white font-mono">{fmt(inferenceResults.pValue)}</div>
                                        <div className="text-xs mt-1 text-gray-300">{inferenceResults.decision}</div>
                                      </div>
                                  </div>

                                  {!isNaN(inferenceResults.ci[0]) && (
                                    <div className="bg-gray-800 p-4 rounded-lg border-t-2 border-blue-500">
                                      <div className="text-xs text-gray-500 mb-2 uppercase tracking-wide font-bold">{(testConfig.ciLevel * 100).toFixed(0)}% Confidence Interval</div>
                                      <div className="flex flex-col md:flex-row justify-between gap-4">
                                        <div className="space-y-2 flex-grow">
                                          <div className="font-serif text-sm text-pink-300 bg-gray-950 p-1.5 rounded">{inferenceResults.ciBase}</div>
                                          <div className="font-serif text-sm text-emerald-300 bg-gray-950 p-1.5 rounded">{inferenceResults.ciSub}</div>
                                        </div>
                                        <div className="flex items-center justify-center bg-gray-950 p-3 rounded-lg flex-shrink-0 min-w-[150px]">
                                          <span className="text-xl text-blue-400 font-mono">[{fmt(inferenceResults.ci[0])}, {fmt(inferenceResults.ci[1])}]</span>
                                        </div>
                                      </div>
                                    </div>
                                  )}
                                </>
                              )}
                            </div>
                       </div>
                       ) : (
                            <div className="text-center text-gray-500 py-10 bg-gray-900 rounded-xl border border-gray-800">Select valid samples and test configuration to view results.</div>
                       )}
                    </div>

                    <div className="lg:col-span-5 space-y-6 max-h-[90vh] overflow-y-auto pr-2">
                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                          <h2 className="text-xl font-bold text-blue-400 mb-4 border-b border-gray-800 pb-2">1. Configure Test</h2>
                          <div className="space-y-4">
                              <div>
                                 <label className="text-xs text-gray-400 mb-1 block">Statistical Test</label>
                                 <select value={testConfig.testType} onChange={(e) => setTestConfig({...testConfig, testType: e.target.value})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:border-blue-500 outline-none">
                                    <optgroup label="One Sample">
                                      <option value="1_sample_z">1-Sample Z-Test (Known Var)</option>
                                      <option value="1_sample_t">1-Sample T-Test (Unknown Var)</option>
                                      <option value="1_sample_prop">1-Proportion Z-Test</option>
                                    </optgroup>
                                    <optgroup label="Two Samples">
                                      <option value="2_sample_z">2-Sample Z-Test (Known Var)</option>
                                      <option value="2_sample_t_eq">2-Sample T-Test (Equal Var / Pooled)</option>
                                      <option value="2_sample_t_uneq">2-Sample T-Test (Unequal Var / Welch)</option>
                                      <option value="2_sample_prop">2-Proportion Z-Test</option>
                                    </optgroup>
                                    <optgroup label="Multi Sample">
                                      <option value="anova">One-Way ANOVA (3+ samples)</option>
                                    </optgroup>
                                 </select>
                              </div>

                              {testConfig.testType !== 'anova' ? (
                                <div className="flex gap-2">
                                  <div className="flex-1">
                                    <label className="text-xs text-gray-400 block mb-1">Target Sample 1</label>
                                    <select value={testConfig.target1} onChange={e => setTestConfig({...testConfig, target1: e.target.value})} className="w-full bg-gray-800 text-white rounded p-2">
                                      {inferenceSamples.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                  </div>
                                  {testConfig.testType.startsWith('2_') && (
                                    <div className="flex-1">
                                      <label className="text-xs text-gray-400 block mb-1">Target Sample 2</label>
                                      <select value={testConfig.target2} onChange={e => setTestConfig({...testConfig, target2: e.target.value})} className="w-full bg-gray-800 text-white rounded p-2">
                                        {inferenceSamples.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                      </select>
                                    </div>
                                  )}
                                </div>
                              ) : (
                                <div>
                                  <label className="text-xs text-gray-400 block mb-1">Select Samples for ANOVA</label>
                                  <div className="flex flex-wrap gap-2">
                                    {inferenceSamples.map(s => (
                                      <label key={s.id} className="flex items-center gap-1 bg-gray-800 px-2 py-1 rounded cursor-pointer">
                                        <input type="checkbox" checked={testConfig.anovaTargets.includes(s.id)} onChange={(e) => {
                                          const newTargets = e.target.checked ? [...testConfig.anovaTargets, s.id] : testConfig.anovaTargets.filter(id => id !== s.id);
                                          setTestConfig({...testConfig, anovaTargets: newTargets});
                                        }} className="accent-blue-500" />
                                        <span className="text-sm">{s.name}</span>
                                      </label>
                                    ))}
                                  </div>
                                </div>
                              )}

                              {testConfig.testType !== 'anova' && (
                                <div className="grid grid-cols-2 gap-4">
                                  <div>
                                    <label className="text-xs text-gray-400 block mb-1">Hypothesized {testConfig.testType.startsWith('2_') ? 'Diff (d₀)' : testConfig.testType.includes('prop') ? 'Prop (p₀)' : 'Mean (μ₀)'}</label>
                                    <input type="number" step={testConfig.testType.includes('prop') ? 0.05 : 1} value={testConfig.hypoMean} onChange={(e) => setTestConfig({...testConfig, hypoMean: parseFloat(e.target.value) || 0})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" />
                                  </div>
                                  <div>
                                    <label className="text-xs text-gray-400 block mb-1">Tails (Direction)</label>
                                    <select value={testConfig.tails} onChange={e => setTestConfig({...testConfig, tails: e.target.value})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700">
                                      <option value="two">Two-Tailed (≠)</option>
                                      <option value="left">Left-Tailed (&lt;)</option>
                                      <option value="right">Right-Tailed (&gt;)</option>
                                    </select>
                                  </div>
                                </div>
                              )}

                              {(testConfig.testType === '1_sample_z' || testConfig.testType === '2_sample_z') && (
                                 <div className="grid grid-cols-2 gap-4">
                                   <div>
                                     <label className="text-xs text-gray-400 block mb-1">Known Std Dev 1 (σ₁)</label>
                                     <input type="number" min="0.1" value={testConfig.knownVar1} onChange={(e) => setTestConfig({...testConfig, knownVar1: parseFloat(e.target.value) || 1})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" />
                                   </div>
                                   {testConfig.testType === '2_sample_z' && (
                                     <div>
                                       <label className="text-xs text-gray-400 block mb-1">Known Std Dev 2 (σ₂)</label>
                                       <input type="number" min="0.1" value={testConfig.knownVar2} onChange={(e) => setTestConfig({...testConfig, knownVar2: parseFloat(e.target.value) || 1})} className="w-full bg-gray-800 text-white p-2 rounded border border-gray-700" />
                                     </div>
                                   )}
                                 </div>
                              )}

                              <div>
                                 <label className="text-xs text-gray-400 block mb-1">Confidence Level (1 - α)</label>
                                 <select value={testConfig.ciLevel} onChange={(e) => setTestConfig({...testConfig, ciLevel: parseFloat(e.target.value)})} className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2">
                                    <option value={0.90}>90% (α = 0.10)</option>
                                    <option value={0.95}>95% (α = 0.05)</option>
                                    <option value={0.99}>99% (α = 0.01)</option>
                                 </select>
                              </div>
                          </div>
                       </div>

                       <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                          <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                            <h2 className="text-xl font-bold text-emerald-400">2. Samples Manager</h2>
                            <button onClick={addInferenceSample} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-3 py-1 rounded shadow">+ Add Sample</button>
                          </div>
                          
                          <div className="space-y-4">
                            {inferenceSamples.map(samp => (
                              <div key={samp.id} className="bg-gray-800 p-3 rounded-lg border border-gray-700 relative">
                                <button onClick={() => removeInferenceSample(samp.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-300">&times;</button>
                                <div className="flex items-center gap-2 mb-2">
                                  <span className="w-3 h-3 rounded-full" style={{backgroundColor: samp.color}}></span>
                                  <input type="text" value={samp.name} onChange={e => setInferenceSamples(inferenceSamples.map(s => s.id === samp.id ? {...s, name: e.target.value} : s))} className="bg-transparent text-white font-bold w-24 outline-none border-b border-gray-600 focus:border-emerald-500" />
                                  <span className="text-xs text-gray-400 ml-auto mr-4">n=</span>
                                  <input type="number" min="2" max="1000" value={samp.size} onChange={e => setInferenceSamples(inferenceSamples.map(s => s.id === samp.id ? {...s, size: parseInt(e.target.value)||2} : s))} className="w-16 bg-gray-900 text-white p-1 rounded text-center text-xs" />
                                </div>
                                
                                <div className="flex gap-2 items-center">
                                  <select value={samp.type} onChange={e => updateSampleType(samp.id, e.target.value)} className="bg-gray-900 text-gray-300 text-xs rounded p-1 flex-1">
                                    <option value="normal">Normal (μ, σ)</option>
                                    <option value="uniform">Uniform (a, b)</option>
                                    <option value="exponential">Exponential (λ)</option>
                                    <option value="poisson">Poisson (λ)</option>
                                    <option value="binomial">Binomial (n, p)</option>
                                  </select>
                                </div>
                                
                                <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                                  {samp.type === 'normal' && (
                                    <>
                                      <label className="flex flex-col text-gray-400">μ <input type="number" value={samp.params.mu} onChange={e => updateSampleParam(samp.id, 'mu', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                      <label className="flex flex-col text-gray-400">σ <input type="number" value={samp.params.sigma} onChange={e => updateSampleParam(samp.id, 'sigma', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                    </>
                                  )}
                                  {samp.type === 'uniform' && (
                                    <>
                                      <label className="flex flex-col text-gray-400">Min <input type="number" value={samp.params.a} onChange={e => updateSampleParam(samp.id, 'a', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                      <label className="flex flex-col text-gray-400">Max <input type="number" value={samp.params.b} onChange={e => updateSampleParam(samp.id, 'b', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                    </>
                                  )}
                                  {samp.type === 'exponential' && (
                                    <label className="flex flex-col text-gray-400 col-span-2">Rate λ <input type="number" step="0.1" value={samp.params.lambda} onChange={e => updateSampleParam(samp.id, 'lambda', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                  )}
                                  {samp.type === 'poisson' && (
                                    <label className="flex flex-col text-gray-400 col-span-2">Lambda λ <input type="number" value={samp.params.lambda} onChange={e => updateSampleParam(samp.id, 'lambda', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                  )}
                                  {samp.type === 'binomial' && (
                                    <>
                                      <label className="flex flex-col text-gray-400">Trials n <input type="number" value={samp.params.n} onChange={e => updateSampleParam(samp.id, 'n', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                      <label className="flex flex-col text-gray-400">Prob p <input type="number" step="0.05" value={samp.params.p} onChange={e => updateSampleParam(samp.id, 'p', e.target.value)} className="bg-gray-900 p-1 rounded mt-1 text-white" /></label>
                                    </>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>

                          <button onClick={generateDataForSamples} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded font-bold shadow-lg mt-4 transition-colors">
                            GENERATE NEW DATA
                          </button>
                       </div>
                    </div>
                  </div>
                )}

                {activeTab === 'bayesian' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                      <Plotter 
                        chartData={bayesianAnalysis.chartData} 
                        domainMin={bayesianAnalysis.domainMin} 
                        domainMax={bayesianAnalysis.domainMax} 
                        xLabel="Unknown Parameter Space (θ)" 
                      />
                      
                      <div className="bg-gray-900 p-6 rounded-xl border border-pink-500/30 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                          <h3 className="text-lg font-bold text-pink-400 mb-3 border-b border-gray-700 pb-1">Confidence & Information</h3>
                          <div className="space-y-3 text-sm">
                            <div className="flex justify-between items-center bg-gray-800 p-2 rounded">
                              <span className="text-gray-400">Credible Interval (HDI):</span>
                              <select value={bayesState.ciLevel} onChange={e => updateBayesState('ciLevel', parseFloat(e.target.value))} className="bg-gray-900 text-white border border-gray-600 rounded px-1">
                                <option value={0.90}>90%</option>
                                <option value={0.95}>95%</option>
                                <option value={0.99}>99%</option>
                              </select>
                            </div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded">
                              <span className="text-gray-400">CI Bounds:</span>
                              <span className="font-mono text-emerald-400">[{fmt(bayesianAnalysis.credibleInterval[0])}, {fmt(bayesianAnalysis.credibleInterval[1])}]</span>
                            </div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded">
                              <span className="text-gray-400">Posterior Mean:</span>
                              <span className="font-mono text-white">{fmt(bayesianAnalysis.posteriorMean)}</span>
                            </div>
                            <div className="flex justify-between bg-gray-800 p-2 rounded">
                              <span className="text-gray-400" title="Amount of information data carries about parameter">Fisher Information I(θ):</span>
                              <span className="font-mono text-amber-400">{fmt(bayesianAnalysis.fisherInfo)}</span>
                            </div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-lg font-bold text-blue-400 mb-3 border-b border-gray-700 pb-1">Hypothesis Testing</h3>
                          <div className="space-y-3 text-sm">
                            <div className="bg-gray-800 p-3 rounded border border-gray-700">
                              <label className="flex justify-between items-center mb-2">
                                <span className="text-gray-400">Test Point (H₀: θ = ?):</span>
                                <input type="number" step="0.05" value={bayesState.testPoint} onChange={(e) => updateBayesState('testPoint', parseFloat(e.target.value) || 0)} className="w-20 bg-gray-900 text-white p-1 border border-gray-600 rounded text-center" />
                              </label>
                              <div className="flex justify-between items-center mt-3">
                                <span className="text-gray-500">Hypothesis Status:</span>
                                {bayesianAnalysis.isPlausible ? 
                                  <span className="text-emerald-400 font-bold bg-emerald-900/30 px-2 py-1 rounded">Plausible (Inside CI) ✓</span> : 
                                  <span className="text-red-400 font-bold bg-red-900/30 px-2 py-1 rounded">Rejected (Outside CI) ✗</span>
                                }
                              </div>
                              <div className="flex justify-between items-center mt-2">
                                <span className="text-gray-500">Density at Point:</span>
                                <span className="font-mono text-white">{fmt(bayesianAnalysis.testValue)}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col gap-6 overflow-y-auto max-h-[800px]">
                      <div className="border-b border-gray-700 pb-4">
                        <h2 className="text-xl font-bold text-pink-400 mb-3">Bayesian Update Model</h2>
                        <select 
                          value={bayesState.type} 
                          onChange={(e) => switchBayesCase(e.target.value)}
                          className="w-full bg-gray-800 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-pink-500"
                        >
                          <option value="beta-binomial">Beta - Binomial (Proportions)</option>
                          <option value="jeffreys-binomial">Jeffreys' Prior - Binomial (Objective)</option>
                          <option value="gamma-poisson">Gamma - Poisson (Count Rates)</option>
                          <option value="gamma-exponential">Gamma - Exponential (Waiting Times)</option>
                          <option value="normal-normal">Normal - Normal (Known Variance)</option>
                        </select>
                      </div>
                      
                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-gray-400">
                        <div className="flex justify-between items-center mb-2">
                          <h3 className="font-bold text-gray-300">1. Prior Belief</h3>
                          {bayesState.type === 'jeffreys-binomial' && <span className="text-xs bg-pink-900/50 text-pink-300 px-2 py-1 rounded">Jeffreys Rule</span>}
                        </div>
                        
                        {['beta-binomial', 'jeffreys-binomial'].includes(bayesState.type) && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Pseudo-Successes (α)</span> <span>{fmt(bayesState.prior1)}</span></label>
                            <input type="range" min="0.1" max="10" step="0.1" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', parseFloat(e.target.value))} className="w-full mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Pseudo-Failures (β)</span> <span>{fmt(bayesState.prior2)}</span></label>
                            <input type="range" min="0.1" max="10" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', parseFloat(e.target.value))} className="w-full" />
                          </>
                        )}
                        {['gamma-poisson', 'gamma-exponential'].includes(bayesState.type) && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Shape (α)</span> <span>{fmt(bayesState.prior1)}</span></label>
                            <input type="range" min="0.1" max="20" step="0.1" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', parseFloat(e.target.value))} className="w-full mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Rate (β)</span> <span>{fmt(bayesState.prior2)}</span></label>
                            <input type="range" min="0.1" max="10" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', parseFloat(e.target.value))} className="w-full" />
                          </>
                        )}
                        {bayesState.type === 'normal-normal' && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Prior Mean (μ₀)</span> <span>{fmt(bayesState.prior1)}</span></label>
                            <input type="range" min="-5" max="10" step="0.5" value={bayesState.prior1} onChange={(e) => updateBayesState('prior1', parseFloat(e.target.value))} className="w-full mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Prior Std Dev (σ₀)</span> <span>{fmt(bayesState.prior2)}</span></label>
                            <input type="range" min="0.1" max="5" step="0.1" value={bayesState.prior2} onChange={(e) => updateBayesState('prior2', parseFloat(e.target.value))} className="w-full" />
                          </>
                        )}
                      </div>

                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-amber-500">
                        <h3 className="font-bold mb-2 text-amber-400">2. Observed Data (Likelihood)</h3>
                        
                        {['beta-binomial', 'jeffreys-binomial'].includes(bayesState.type) && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Trials (n)</span> <span>{fmt(bayesState.data1)}</span></label>
                            <input type="range" min="1" max="50" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Successes (k)</span> <span>{fmt(bayesState.data2)}</span></label>
                            <input type="range" min="0" max={bayesState.data1} step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseInt(e.target.value))} className="w-full accent-amber-500" />
                          </>
                        )}
                        {bayesState.type === 'gamma-poisson' && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Observation Periods (n)</span> <span>{fmt(bayesState.data1)}</span></label>
                            <input type="range" min="1" max="30" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Total Events (Σx)</span> <span>{fmt(bayesState.data2)}</span></label>
                            <input type="range" min="0" max="100" step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseInt(e.target.value))} className="w-full accent-amber-500" />
                          </>
                        )}
                        {bayesState.type === 'gamma-exponential' && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Observations (n)</span> <span>{fmt(bayesState.data1)}</span></label>
                            <input type="range" min="1" max="30" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Sum of Waiting Times (Σx)</span> <span>{fmt(bayesState.data2)}</span></label>
                            <input type="range" min="0" max="100" step="1" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseInt(e.target.value))} className="w-full accent-amber-500" />
                          </>
                        )}
                        {bayesState.type === 'normal-normal' && (
                          <>
                            <label className="text-sm text-gray-400 flex justify-between"><span>Sample Size (n)</span> <span>{fmt(bayesState.data1)}</span></label>
                            <input type="range" min="1" max="50" step="1" value={bayesState.data1} onChange={(e) => updateBayesState('data1', parseInt(e.target.value))} className="w-full accent-amber-500 mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Sample Mean (x̄)</span> <span>{fmt(bayesState.data2)}</span></label>
                            <input type="range" min="-5" max="10" step="0.5" value={bayesState.data2} onChange={(e) => updateBayesState('data2', parseFloat(e.target.value))} className="w-full accent-amber-500 mb-2" />
                            <label className="text-sm text-gray-400 flex justify-between"><span>Known Pop. Std Dev (σ)</span> <span>{fmt(bayesState.data3)}</span></label>
                            <input type="range" min="0.1" max="5" step="0.1" value={bayesState.data3} onChange={(e) => updateBayesState('data3', parseFloat(e.target.value))} className="w-full accent-amber-500" />
                          </>
                        )}
                      </div>
                      
                      <div className="bg-gray-800 p-4 rounded-lg border-l-4 border-emerald-500">
                        <h3 className="font-bold mb-1 text-emerald-400">3. Posterior Knowledge</h3>
                        <p className="text-sm text-gray-300 font-mono text-left bg-gray-900 p-2 rounded">
                          {(bayesState.type === 'beta-binomial' || bayesState.type === 'jeffreys-binomial') && `Beta(α=${fmt(bayesState.prior1 + bayesState.data2)}, β=${fmt(bayesState.prior2 + bayesState.data1 - bayesState.data2)})`}
                          {bayesState.type === 'gamma-poisson' && `Gamma(α=${fmt(bayesState.prior1 + bayesState.data2)}, β=${fmt(bayesState.prior2 + bayesState.data1)})`}
                          {bayesState.type === 'gamma-exponential' && `Gamma(α=${fmt(bayesState.prior1 + bayesState.data1)}, β=${fmt(bayesState.prior2 + bayesState.data2)})`}
                          {bayesState.type === 'normal-normal' && `Normal(μ ≈ ${fmt(bayesianAnalysis.posteriorMean)}, σ ≈ ${fmt(Math.sqrt(1/((1/(bayesState.prior2**2)) + (bayesState.data1/(bayesState.data3**2)))))})`}
                        </p>
                        <p className="text-xs text-gray-500 mt-2">
                          This distribution represents the updated uncertainty combining the Prior belief and Likelihood of the data.
                        </p>
                      </div>
                      
                    </div>
                  </div>
                )}

                {activeTab !== 'inference' && <EquationsTable />}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdvancedStatsLab />);
    </script>
</body>
</html>
